tasks:
  - id: "e1-confidence-rating"
    title: "EINGRIFF 1a: ConfidenceRating() Extension einfuehren"
    description: |
      Neue Extension Method auf DetectionSource die kalibrierte Confidence-Werte liefert,
      GETRENNT von den Enum-Int-Werten. Die Enum-Werte bleiben unveraendert (kein Rewrite).

      DetectionSource wird NIRGENDS serialisiert oder persistiert (verifiziert).
      Die Enum-Werte dienen nur als interne Diskriminatoren und Ordinalzahlen.

      Neue Methode in DetectionHypothesis.cs (DetectionSourceExtensions):
        public static int ConfidenceRating(this DetectionSource source) => source switch
        {
            DetectionSource.DatHash            => 100,
            DetectionSource.DiscHeader         => 95,
            DetectionSource.CartridgeHeader    => 90,
            DetectionSource.SerialNumber       => 80,
            DetectionSource.UniqueExtension    => 80,
            DetectionSource.ArchiveContent     => 60,
            DetectionSource.FolderName         => 45,
            DetectionSource.FilenameKeyword    => 40,
            DetectionSource.AmbiguousExtension => 25,
            _ => 0,
        };

      Kalibrierung:
      - Hard-Sources (DatHash, Disc, Cartridge, Serial): hohe Werte, Tier-konform
      - DiscHeader(95) > CartridgeHeader(90): Disc-Header sind zuverlaessiger
      - UniqueExtension(80): stark aber nicht strukturell (Tier2)
      - FolderName(45) < SortThreshold(85): Tier3/Weak darf nie Sort erreichen
      - AmbiguousExtension(25): niedrigster Wert, Tier3

      WICHTIG: Enum-Werte (DatHash=100, FolderName=85 etc.) bleiben UNVERAENDERT.
      Sie werden nur nicht mehr als Confidence gecastet.
    phase: 1
    agent: gem-implementer
    covers:
      - "D-001"
      - "S-001"
    priority: critical
    status: completed
    dependencies: []
    context_files:
      - path: "src/Romulus.Core/Classification/DetectionHypothesis.cs"
        description: "DetectionSource Enum + Extensions — hier wird ConfidenceRating() eingefuegt"
    verification:
