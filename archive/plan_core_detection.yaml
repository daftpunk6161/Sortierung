      - "SoftOnlyCap Konstante == 79"
      - "ComputeSoftOnlyCap() <= 79 fuer ALLE Soft-Source-Kombinationen"
      - "Invariantentest: ComputeSoftOnlyCap < SortThreshold"
    acceptance_criteria:
      - "SoftOnlyCap kann mathematisch nie SortThreshold erreichen"
      - "Invariantentest beweist SoftOnlyCap < SortThreshold"
      - "Bestehende Tests gruen"
    estimated_effort: small
    estimated_lines: 10

  - id: "e3-ambiguous-guard"
    title: "EINGRIFF 3b: AMBIGUOUS Entry-Guard Tier-basiert machen"
    description: |
      Aktueller AMBIGUOUS-Trigger (HypothesisResolver.cs:136):
        if (winner.MaxSingleConfidence >= 60 && runnerMax >= 60)

      Problem: Nach Confidence-Entkopplung (Eingriff 1) ist FolderName.ConfidenceRating()=45.
      Das bedeutet FolderName vs FolderName Konflikte triggern AMBIGUOUS nicht mehr
      (beide < 60). Das ist eine stille Verhaltensaenderung.

      ANALYSE:
      - FolderName vs FolderName ist Tier3 vs Tier3. DecisionResolver setzt Tier3 → Blocked.
      - AMBIGUOUS vs Blocked: Beide verhindern Sortierung. Semantisch:
        AMBIGUOUS = "wir wissen nicht WAS es ist"
        Blocked = "wir koennen nicht sortieren"
      - Fuer Tier3 vs Tier3 Konflikte ist Blocked korrekt — FolderName-Konflikte
        haben zu wenig Evidenz fuer eine AMBIGUOUS-Diagnose.
      - AMBIGUOUS sollte nur triggern wenn BEIDE Seiten mindestens Tier2-Evidenz haben.

      Fix: Entry-Guard auf Tier-basiert umstellen:
        ALT: if (winner.MaxSingleConfidence >= 60 && runnerMax >= 60)
        NEU: if (winnerBestTier <= EvidenceTier.Tier2_StrongHeuristic
              && runnerBestTier <= EvidenceTier.Tier2_StrongHeuristic)

      Dazu: winnerBestTier und runnerBestTier aus den Hypothesen ableiten:
        var winnerBestTier = winner.Value.Items.Min(h => h.Source.ToEvidenceTier());
        var runnerBestTier = sorted[1].Value.Items.Min(h => h.Source.ToEvidenceTier());

      EFFEKT:
      - Hard vs Hard Konflikte (Tier0/Tier1): AMBIGUOUS moeglich (wie bisher)
      - Tier2 vs Tier2 (UniqueExt vs ArchiveContent): AMBIGUOUS moeglich (wie bisher)
      - Tier3 vs Tier3 (Folder vs Keyword): KEIN AMBIGUOUS → direkt Blocked (NEU, korrekt)
      - Tier3 vs Tier2: KEIN AMBIGUOUS → Tier2 gewinnt klar (NEU, korrekt)
    phase: 3
    agent: gem-implementer
    covers:
      - "S-002"
    priority: high
    status: completed
    dependencies:
      - "e1-migrate-casts"
    context_files:
      - path: "src/Romulus.Core/Classification/HypothesisResolver.cs"
        description: "AMBIGUOUS-Detection Zeilen 136-167"
    verification:
      - "dotnet build src/Romulus.sln — gruen"
      - "AMBIGUOUS triggert bei Tier1 vs Tier1 Konflikten"
      - "AMBIGUOUS triggert bei Tier2 vs Tier2 Konflikten"
      - "AMBIGUOUS triggert NICHT bei Tier3 vs Tier3 Konflikten"
      - "AMBIGUOUS triggert NICHT bei Tier3 vs Tier2 Konflikten"
      - "Bestehende AMBIGUOUS-Tests gruen (ggf. angepasst mit Begruendung)"
    acceptance_criteria:
      - "Entry-Guard ist Tier-basiert, nicht Confidence-basiert"
      - "4+ Unit-Tests fuer Tier-Kombinationen"
      - "Kein Magic Number (60) mehr im AMBIGUOUS-Pfad"
    estimated_effort: small
    estimated_lines: 15

  - id: "e3-boundary-tests"
    title: "EINGRIFF 3c: Boundary- und Invariantentests ergaenzen"
    description: |
      Nach allen 3 Eingriffen: gezielte Tests die die neuen Invarianten absichern.

      Invariantentests:
      1. ConfidenceRating()-Kalibrierung: Jeder Tier3-Source hat ConfidenceRating < 60
      2. ConfidenceRating()-Kalibrierung: Jeder Hard-Source hat ConfidenceRating >= 80
      3. SoftOnlyCap < SortThreshold fuer ALLE Soft-Source-Kombinationen
      4. DecisionResolver: confidence-Parameter hat KEINEN Einfluss auf Ergebnis
         (wenn Tier und hasHardEvidence gleich sind, muss jeder Confidence-Wert dasselbe liefern)
      5. AMBIGUOUS triggert nur wenn beide Seiten mindestens Tier2

      Boundary-Tests:
      6. Tier1 + hasHardEvidence=true + !conflict → Sort
      7. Tier1 + hasHardEvidence=false + !conflict → Review
      8. Tier1 + hasHardEvidence=true + conflict → Review
      9. 3-Konsolen-Szenario: A(Tier1) vs B(Tier2) vs C(Tier3) → A gewinnt deterministisch
      10. Cross-family Hard-vs-Hard → Blocked (nicht AMBIGUOUS, nicht Sort)

      Regressionstests:
      11. PS1-Header-in-PS2-Disc Downgrade bleibt funktional
      12. FolderName-only Detection erreicht nie Sort (auch nicht als Display-Confidence >= 85)
      13. DatNameOnly + Cross-console-Detection → Review

      Diese Tests sind die langfristige Absicherung des Herzstuecks.
    phase: 3
    agent: gem-implementer
    covers: []
    priority: high
    status: completed
    dependencies:
      - "e2-explicit-gate"
      - "e3-softonly-cap"
      - "e3-ambiguous-guard"
    context_files:
      - path: "src/Romulus.Tests/"
        description: "Bestehende Detection-Tests"
      - path: "src/Romulus.Core/Classification/"
        description: "Alle Classification-Dateien"
    verification:
      - "dotnet test — alle Tests gruen"
      - "Mindestens 13 neue Tests (5 Invarianten + 5 Boundary + 3 Regression)"
      - "Jeder Test prueft eine echte Fachregel, keine Alibi-Assertion"
    acceptance_criteria:
      - "13+ neue Tests ergaenzt"
      - "Alle bestehenden Tests gruen"
      - "Invarianten sind als [Fact] oder [Theory] mit klarem Namen dokumentiert"
      - "Tests koennen echte Fehler finden (keine tautologischen Assertions)"
    estimated_effort: medium
    estimated_lines: 200

# ============================================================================
# AUSFUEHRUNGSREIHENFOLGE
# ============================================================================
execution_order:
  phase_1_confidence_decoupling:
    description: "Confidence von Enum entkoppeln"
    tasks: ["e1-confidence-rating", "e1-migrate-casts"]
    gate: "0 (int)DetectionSource.X Casts in Production. Build gruen."
  phase_2_explicit_gate:
    description: "Tier1-Gate explizit machen — Confidence wird reiner Display-Wert"
    tasks: ["e2-explicit-gate"]
    gate: "Kein confidence>=85 in DecisionResolver. Build gruen."
  phase_3_guards_and_tests:
    description: "Guards reparieren und Invarianten absichern"
    tasks: ["e3-softonly-cap", "e3-ambiguous-guard", "e3-boundary-tests"]
    gate: "Alle 13+ neuen Tests gruen. Build gruen. SoftOnlyCap < SortThreshold bewiesen."

# ============================================================================
# CONTRACTS ZWISCHEN TASKS
# ============================================================================
contracts:
  - from_task: "e1-confidence-rating"
    to_task: "e1-migrate-casts"
    interface: "ConfidenceRating() Extension existiert und deckt alle 9 DetectionSource-Werte ab"
    format: "Gruener Build"
  - from_task: "e1-migrate-casts"
    to_task: "e2-explicit-gate"
    interface: "Keine (int)DetectionSource.X Casts mehr — Confidence-Werte sind kalibriert"
    format: "Gruener Build + grep bestaetigt 0 Casts"
  - from_task: "e2-explicit-gate"
    to_task: "e3-softonly-cap"
    interface: "Confidence hat keinen Decision-Impact mehr — SoftOnlyCap-Aenderung ist sicher"
    format: "Gruener Build + confidence nicht in DecisionResolver ausgewertet"
  - from_task: "e1-migrate-casts"
    to_task: "e3-ambiguous-guard"
    interface: "Neue Confidence-Werte aktiv — AMBIGUOUS Entry-Guard muss umgestellt werden"
    format: "Gruener Build"
  - from_task: "e2-explicit-gate"
    to_task: "e3-boundary-tests"
    interface: "Alle Eingriffe abgeschlossen — Invariantentests koennen Endversion pruefen"
    format: "Gruener Build"

# ============================================================================
# AKZEPTANZKRITERIEN GESAMT
# ============================================================================
final_acceptance:
  must_pass:
    - "Build gruen: dotnet build src/Romulus.sln"
    - "Tests gruen: dotnet test src/Romulus.sln"
    - "0 (int)DetectionSource.X Casts in Production-Code"
    - "Kein confidence >= N Check in DecisionResolver (Confidence ist nicht Decision-Input)"
    - "SoftOnlyCap < SortThreshold (mathematisch bewiesen)"
    - "AMBIGUOUS Entry-Guard ist Tier-basiert, nicht Confidence-basiert"
    - "13+ neue Invarianten-/Boundary-/Regressionstests gruen"
    - "FamilyPipelineSelector Confidence-Bump(92) entfernt"
    - "Preview/Execute/Report Paritaet: keine fachliche Divergenz"
  confidence_is_display_only:
    description: |
      Nach allen 3 Eingriffen muss gelten:
      Confidence hat KEINEN Einfluss auf SortDecision.
      Entscheidungen basieren ausschliesslich auf (Tier, HasConflict, HasHardEvidence, DatAvailable, ConflictType).
      Confidence ist ein informativer Display-Wert fuer GUI, CLI, API und Reports.
    test: |
      Invariantentest: Fuer Tier1 + !conflict + hasHardEvidence:
        confidence=0  → Sort
        confidence=50 → Sort
        confidence=100→ Sort
      Fuer Tier1 + !conflict + !hasHardEvidence:
        confidence=0  → Review
        confidence=50 → Review
        confidence=100→ Review
          - scenario: "Identischer Input durch CLI und API"
            steps:
              - "CLI-Run mit Sample-Sammlung"
              - "API-Run mit identischer Sammlung"
              - "Vergleich der JSON-Outputs"
            expected_result: "Identische ConsoleKey, Confidence, DecisionClass pro File"
          - scenario: "GUI zeigt kalibrierte Confidence"
            steps:
              - "GUI-Run mit Sample-Sammlung"
              - "Confidence-Spalte in Ergebnis-Tabelle pruefen"
            expected_result: "FolderName-Only Files zeigen Confidence <= 50"

planning_pass: 1
planning_history:
  - pass: 1
    reason: "Initialer Sanierungsplan aus Core-Detection-Audit abgeleitet"
