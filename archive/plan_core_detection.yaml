tldr: |
  DIAGNOSE:
  - Architektur ist KORREKT (1800 Zeilen kampferprobter Detection-Code mit echten Edge-Cases)
  - Problem ist SCHMAL: Confidence = Enum-Int-Wert, wird an 1 Decision-Stelle gebraucht
  - Confidence wird in Production nur in DecisionResolver.cs:63 (Tier1-Gate) und
    FamilyPipelineSelector (Confidence-Bump/Cap) als Decision-Input verwendet
  - ConsoleSorter benutzt NUR SortDecision, KEIN Confidence — alles andere ist Display

  THERAPIE: 3 chirurgische Eingriffe:
  - Eingriff 1: Confidence von Enum entkoppeln (ConfidenceRating statt Cast)
  - Eingriff 2: Tier1-Gate explizit machen (hasHardEvidence statt confidence>=85)
  - Eingriff 3: Guards reparieren (SoftOnlyCap, AMBIGUOUS-Trigger)

  ERGEBNIS: Confidence wird reiner Display-Wert. Entscheidungen basieren auf
  (Tier, Conflict, HasHardEvidence, DAT) — explizit, auditierbar, deterministisch.

  KEIN Rebuild. KEIN neues Benchmark-Framework. KEIN Enum-Value-Rewrite.
  4 Dateien, ~150 Zeilen, 3 Phasen sequentiell.

