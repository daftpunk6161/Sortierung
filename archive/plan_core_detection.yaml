  # ============================================================================
  # EINGRIFF 3: Guards reparieren
  # ============================================================================
  - id: "e3-softonly-cap"
    title: "EINGRIFF 3a: SoftOnlyCap fest unter SortThreshold"
    description: |
      HypothesisResolver.ComputeSoftOnlyCap() kann aktuell Math.Min(85, ...) = 85 erreichen.
      85 = SortThreshold. Das ist semantisch falsch: Soft-only Evidence darf nie
      SortThreshold erreichen. Aktuell nicht exploitbar (Soft-Only ist nie Tier1),
      aber fragil und verwirrend.

      Fix:
        SoftOnlyCap: 75 → 79    (explizit unter SortThreshold 85, Spielraum fuer Anzeige)
        ComputeSoftOnlyCap():
          ALT: Math.Min(85, strongestSourceCap + multiSourceAgreementBonus)
          NEU: Math.Min(79, strongestSourceCap + multiSourceAgreementBonus)

      Konstanten bleiben:
        SortThreshold = 85 (unveraendert)
        ReviewThreshold = 55 (unveraendert)
        MultiSourceAgreementBonus = 15 (unveraendert — nach Eingriff 2 hat Bonus
          keinen Decision-Impact mehr, nur Display-Impact)

      HINWEIS: SoftOnlyCap=79 statt 70 oder 65, weil nach Eingriff 2 der Cap
      KEINEN Decision-Impact mehr hat — nur Display. Ein zu niedriger Cap wuerde
      Soft-Only-Ergebnisse optisch schlechter aussehen lassen als noetig.
      79 ist deutlich unter 85 (klar keine Sort-Verwechslung) aber hoch genug
      fuer informative Confidence-Anzeige.
    phase: 3
    agent: gem-implementer
    covers:
      - "D-002"
    priority: high
    status: completed
    dependencies:
      - "e2-explicit-gate"
    context_files:
