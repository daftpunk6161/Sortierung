  # ============================================================================
  # EINGRIFF 2: Tier1-Gate explizit machen
  # ============================================================================
  - id: "e2-explicit-gate"
    title: "EINGRIFF 2: DecisionResolver Tier1-Gate auf hasHardEvidence umstellen"
    description: |
      KERNFIX — Confidence wird NICHT MEHR als Decision-Input gebraucht.

      Aktuell (DecisionResolver.cs:63):
        if (tier == EvidenceTier.Tier1_Structural)
        {
            if (datAvailable) return DecisionClass.Review;
            if (!hasConflict && confidence >= 85) return DecisionClass.Sort;
            return DecisionClass.Review;
        }

      Problem: `confidence >= 85` ist Magic Number. Funktioniert nur zufaellig,
      weil DiscHeader(92) und CartridgeHeader(90) >= 85 sind. Ist aber fragil
      und semantisch falsch — die Entscheidung sollte auf Evidenz-Typ basieren,
      nicht auf einem Zahlenwert.

      Fix: Neuer Parameter `bool hasHardEvidence` statt `confidence >= 85`:
        public static DecisionClass Resolve(
            EvidenceTier tier, bool hasConflict, int confidence,
            bool datAvailable, ConflictType conflictType,
            bool hasHardEvidence = false)  // NEU
        {
            // ... bestehende Cross-Family, Tier0 etc. unveraendert ...

            if (tier == EvidenceTier.Tier1_Structural)
            {
                if (datAvailable) return DecisionClass.Review;
                if (!hasConflict && hasHardEvidence) return DecisionClass.Sort;  // EXPLIZIT
                return DecisionClass.Review;
            }
            // ... rest unveraendert ...
        }

      Aufrufer anpassen:
      1. HypothesisResolver.cs: DecisionResolver.Resolve(..., hasHardEvidence: hasHardEvidence)
         (Variable existiert bereits als lokale Variable)
      2. EnrichmentPipelinePhase.cs: DecisionResolver.Resolve(..., hasHardEvidence: hasHardEvidence)
         (Variable existiert bereits)
      3. Backward-compatible: Default-Wert hasHardEvidence=false -> bestehende Aufrufer
         ohne den Parameter aendern Verhalten NICHT (bleiben konservativ Review).

      KONSEQUENZ: Nach diesem Fix hat Confidence KEINEN Einfluss auf Entscheidungen mehr.
      Confidence ist reiner Display-Wert. Entscheidungen basieren auf:
      - EvidenceTier (was fuer Evidenz?)
      - HasConflict (widerspricht sich was?)
      - HasHardEvidence (ist die Evidenz strukturell?)
      - DatAvailable (gibt es eine DAT die keinen Hash-Match hatte?)
      - ConflictType (gleiche oder verschiedene Plattform-Familie?)

      FOLGE-CLEANUP:
      - FamilyPipelineSelector.cs: Confidence-Bump MAX(confidence, 92) fuer DiscHeader
        entfernen — nicht mehr noetig, da Confidence nicht mehr Decision-Input ist.
      - FamilyPipelineSelector.cs: Confidence-Cap MIN(confidence, 75) bei Cross-Family
        bleibt — ist Display-relevant (niedrigerer Confidence-Wert bei Konflikten ist korrekt).
    phase: 2
    agent: gem-implementer
    covers:
      - "D-003"
    priority: critical
    status: completed
    dependencies:
      - "e1-migrate-casts"
    context_files:
