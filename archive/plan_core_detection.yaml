plan_id: core-detection-surgical-fix-2026-04-15
objective: |
  Chirurgische Korrektur des Confidence-Modells im Erkennungs-Kern.
  Die Architektur (8 Detektoren → Hypothesen → HypothesisResolver → DecisionResolver →
  FamilyPipelineSelector → SortDecision → ConsoleSorter) ist KORREKT und wird BEWAHRT.

  Das Problem ist schmal und praezise lokalisierbar:
  1. DetectionSource-Enum-Int-Werte werden direkt als Confidence-Werte missbraucht
  2. Confidence ist Decision-Input an genau EINER Stelle (DecisionResolver.cs Tier1-Gate)
  3. SoftOnlyCap kann mathematisch SortThreshold erreichen
  4. AMBIGUOUS-Entry-Guard ist Confidence-basiert statt Tier-basiert

  Loesung: 3 chirurgische Eingriffe in 4 Dateien. ~150 Zeilen Produktionsaenderung.
  Kein Rebuild, kein neues Benchmark-Framework, kein Enum-Value-Rewrite.

