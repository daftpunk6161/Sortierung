  # ============================================================
  # PHASE 1 — WAVE 1: Critical/Blocking (Datenverlust verhindern)
  # ============================================================
  - id: "w1-critical-conversion"
    title: "CRITICAL: Conversion-Pipeline Datenverlust-Bugs fixen (DB-001, F-001, F-002, F-003, F-004)"
    description: |
      Buendelt alle Conversion-Pipeline-Findings die ConversionPhaseHelper.cs betreffen:

      **DB-001 (CRITICAL):** Legacy-Konvertierung loescht erfolgreich konvertierte Outputs.
      Fix: IsVerificationSuccessful muss bei target=null + Plan=null + TargetPath!=null → true zurueckgeben
      (Skip-Verification statt Fail-Verification fuer Legacy-Converter).

      **F-001 (BLOCKING):** RollbackMovedArtifacts verschluckt Fehler still.
      Fix: Rollback-Ergebnis als Liste an Caller propagieren. ConversionResult bei teilweisem
      Rollback-Versagen mit Reason="rollback-partial-failure" und Audit-Eintrag versehen.

      **F-002 (Warning):** CleanupConversionOutputs verschluckt Fehler.
      Fix: Counter/Audit-Eintrag fuer nicht-bereinigte Partial-Outputs.

      **F-003 (Warning):** TryAppendConversionErrorAudit verschluckt Exceptions.
      Fix: Trace.WriteLine als Fallback-Logging.

      **F-004 (Warning):** ConvertSingleFile validiert Source-Pfad nicht gegen AllowedRoots.
      Fix: AllowedRootPathPolicy.Validate() am Anfang von ConvertSingleFile.

      TDD-Workflow: Failing-Tests zuerst, dann Implementation.
    wave: 1
    agent: gem-implementer
    prototype: false
    covers:
      - "DB-001"
      - "F-001"
