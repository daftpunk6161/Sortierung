plan_id: audit-remediation-2026-04-15
objective: |
  Sanierungsplan fuer alle 55 Findings aus dem Repo-weiten Audit (2026-04-15).
  Ziel: Critical/Blocking und High-Findings in Phase 1 schliessen, Medium-Findings
  in Phase 2 konsolidieren, Low/Suggestion-Findings in Phase 3 als Hardening abarbeiten.
  Build und Tests muessen nach jeder Wave gruen bleiben.
created_at: "2026-04-15T23:00:00Z"
created_by: gem-planner
status: completed
archive_ready: true
research_confidence: high

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 18
  risk_score: medium

tldr: |
  55 Findings (2 Critical/Blocking, 8 High, 1 Medium-High, 22 Medium, 22 Low).
  Plan zerlegt in 3 Phasen / 7 Waves:
  - Phase 1 (Wave 1-3): Critical/Blocking + High-Findings → Datenverlust, Security, Exception-Safety
  - Phase 2 (Wave 4-5): Medium-Findings → Paritaet, Konsistenz, Diagnostik
  - Phase 3 (Wave 6-7): Low/Suggestion → Hardening, Edge-Case-Tests, Hygiene
  Jede Wave hat explizite Akzeptanzkriterien und Regressionstests.
  Gesamtaufwand: ~22 Tasks, parallelisierbar in 7 Waves.

