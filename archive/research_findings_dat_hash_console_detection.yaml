plan_id: dat-hash-console-detection-bug
objective: "Analyze DAT-hash-based console detection flow to find root cause of .n64 files being matched to NES"
focus_area: "DAT indexing, hash matching, console key resolution"
created_at: "2026-04-15"
created_by: researcher
status: completed

tldr: |
  - The enrichment pipeline runs a "DAT-first" cross-console hash lookup BEFORE any extension/folder-based detection. 
    If the lookup returns exactly 1 console match, it is accepted blindly — no extension plausibility check exists.
  - For .n64 files (UNKNOWN console), a container SHA1 is computed and searched across ALL loaded DATs. If found 
    in the NES bucket, "NES" is returned with confidence 100 without any validation that .n64 is a valid NES extension.
  - The consoles.json data has uniqueExts/ambigExts per console (e.g. N64 → [".n64",".z64",".v64"], NES → [".nes"]) 
    but this data is NEVER consulted during DAT-Hash console resolution or post-resolution validation.
  - The most probable root cause for the hash actually being in the NES bucket: either the N64 DAT file is not being 
    loaded (BuildConsoleMap PackMatch miss), or the NES "Headered" No-Intro DAT inadvertently contains matching hashes.
  - A missing extension-based plausibility guard in ResolveUnknownDatMatch / TryCrossConsoleDatLookup is the systemic 
    gap that allows this class of bugs.

research_metadata:
  methodology: "Hybrid retrieval: semantic_search + grep_search, sequential file reads, relationship discovery"
  scope: "Full trace through DAT loading, indexing, hash lookup, console resolution, and enrichment pipeline"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

files_analyzed:
  - file: DatRepositoryAdapter.cs
    path: src/Romulus.Infrastructure/Dat/DatRepositoryAdapter.cs
    purpose: "Parses DAT XML files and builds the DatIndex (hash → game mapping per console)"
    key_elements:
      - element: GetDatIndex
        type: method
        location: "DatRepositoryAdapter.cs:31"
        description: >
          Iterates consoleMap (ConsoleKey → datFilePath), parses each DAT, stores all ROM hashes 
          under the corresponding ConsoleKey in the DatIndex. This is where the ConsoleKey assignment 
          to hashes happens — it comes directly from the consoleMap parameter.
      - element: ParseDatFile
        type: method
        location: "DatRepositoryAdapter.cs:~160"
        description: "Reads DAT XML, extracts rom name/hash/bios attributes. Returns game→rom entries."
    language: csharp
    lines: 500

  - file: DatIndex.cs
    path: src/Romulus.Contracts/Models/DatIndex.cs
    purpose: "Thread-safe in-memory index: ConsoleKey → (Hash → DatIndexEntry)"
    key_elements:
      - element: LookupAllByHash
        type: method
        location: "DatIndex.cs:~110"
        description: >
          Searches ALL loaded console DATs for a hash in deterministic alphabetical console-key order.
          Returns list of (ConsoleKey, DatIndexEntry) matches. This is the method that finds the NES 
          match for the N64 file hash.
      - element: LookupAny
        type: method
        location: "DatIndex.cs:~95"
        description: "Returns first match across all consoles (alphabetical). Not used in current flow."
      - element: Lookup
        type: method
        location: "DatIndex.cs:~73"
        description: "Single-console hash lookup (fast path when consoleKey is known)."
      - element: Add
        type: method
        location: "DatIndex.cs:~38"
        description: "Stores hash under a specific consoleKey. ConsoleKey comes from BuildConsoleMap."
    language: csharp
    lines: 160

  - file: EnrichmentPipelinePhase.cs
    path: src/Romulus.Infrastructure/Orchestration/EnrichmentPipelinePhase.cs
    purpose: "Per-file enrichment: classification, DAT matching, console detection, scoring"
    key_elements:
      - element: "EnrichFile (main enrichment method)"
        type: method
        location: "EnrichmentPipelinePhase.cs:~150"
        description: >
          Entry point for per-file enrichment. Runs DAT-first lookup with consoleKey=UNKNOWN 
          BEFORE any console detection. If DAT match succeeds, detector runs only for parity.
      - element: LookupDat
        type: method
        location: "EnrichmentPipelinePhase.cs:~418"
        description: >
          Multi-stage DAT lookup: archive-inner → headerless → container hash → name-only.
          For UNKNOWN console on first pass, only container hash path is active (headerless 
          requires known consoleKey). Calls TryCrossConsoleDatLookup for cross-console resolution.
      - element: TryCrossConsoleDatLookup
        type: method
        location: "EnrichmentPipelinePhase.cs:~636"
        description: >
          If consoleKey is known, tries that console first (fast path). Otherwise calls 
          ResolveUnknownDatMatch for cross-console search. Emits the log message 
          "Konsole via DAT-Hash erkannt: {file} → {console}".
      - element: ResolveUnknownDatMatch
        type: method
        location: "EnrichmentPipelinePhase.cs:720"
        description: >
          CRITICAL METHOD. Calls datIndex.LookupAllByHash(hash). If exactly 1 match, returns 
          that console directly. If multiple matches and detection hypotheses exist, uses 
          hypothesis ranking to disambiguate. NO extension plausibility check anywhere.
    language: csharp
    lines: 900

  - file: RunEnvironmentBuilder.cs
    path: src/Romulus.Infrastructure/Orchestration/RunEnvironmentBuilder.cs
    purpose: "Builds the RunEnvironment including DAT index from catalog and local files"
    key_elements:
      - element: BuildConsoleMap
        type: method
        location: "RunEnvironmentBuilder.cs:692"
        description: >
          Creates the ConsoleKey → datFilePath mapping. First tries dat-catalog.json entries 
          (by Id/System/ConsoleKey filename, then PackMatch glob). Then adds unclaimed DAT 
          files in datRoot by stem as phantom console keys.
      - element: MatchPackGlob
        type: method
        location: "RunEnvironmentBuilder.cs:1207"
        description: "Matches No-Intro daily pack filenames via prefix-star glob (e.g. 'Nintendo - N64 (BigEndian)*')."
      - element: BridgeDatSourceAliases
        type: method
        location: "RunEnvironmentBuilder.cs:1338"
        description: >
          For unmapped consoles, tries to bridge via consoles.json datSources[] references to 
          catalog IDs. Currently limited because datSources use group names ('nointro') not 
          specific catalog IDs ('nointro-n64').
    language: csharp
    lines: 1430

  - file: HeaderlessHasher.cs
    path: src/Romulus.Infrastructure/Hashing/HeaderlessHasher.cs
    purpose: "Computes normalized hashes for header-skipping and N64 byte-order normalization"
    key_elements:
      - element: ComputeHeaderlessHash
        type: method
        location: "HeaderlessHasher.cs:~36"
        description: "Returns null if consoleKey has no normalization strategy. For N64, delegates to ComputeN64CanonicalHash."
      - element: ComputeN64CanonicalHash
        type: method
        location: "HeaderlessHasher.cs:~85"
        description: >
          Reads full file bytes, detects byte order via magic bytes (BE/BS/LE), normalizes to 
          BigEndian, then computes SHA1. For .n64 (already BigEndian), this produces the SAME 
          hash as the container SHA1 — normalization is a no-op.
    language: csharp
    lines: 145

  - file: FamilyDatStrategyResolver.cs
    path: src/Romulus.Infrastructure/Dat/FamilyDatStrategyResolver.cs
    purpose: "Maps PlatformFamily to family-specific DAT lookup policies"
    key_elements:
      - element: GenericDatStrategy
        type: class
        location: "FamilyDatStrategyResolver.cs:82"
        description: >
          Used when PlatformFamily is Unknown (pre-detect pass). Sets UseHeaderlessHash=false, 
          UseContainerHash=true. This means the first DAT-first pass uses ONLY container SHA1.
      - element: CartridgeDatStrategy
        type: class
        location: "CartridgeDatStrategy.cs:1"
        description: "For NoIntroCartridge family. Sets UseHeaderlessHash=true, UseContainerHash=true."
    language: csharp
    lines: 110

  - file: ConsoleDetector.cs
    path: src/Romulus.Core/Classification/ConsoleDetector.cs
    purpose: "Multi-method console detection (folder, extension, header, keyword)"
    key_elements:
      - element: DetectByExtension
        type: method
        location: "ConsoleDetector.cs:~313"
        description: >
          Uses _uniqueExtMap to resolve unique extensions (e.g. .n64 → N64). This data EXISTS 
          but is NEVER consulted during DAT-Hash console resolution.
      - element: _uniqueExtMap
        type: variable
        location: "ConsoleDetector.cs:22"
        description: "Dictionary<string, string> mapping unique extensions to console keys."
    language: csharp
    lines: 400

  - file: dat-catalog.json
    path: data/dat-catalog.json
    purpose: "Catalog of all DAT sources with Group, System, Id, ConsoleKey, PackMatch, Format"
    key_elements:
      - element: "nointro-nes entry"
        type: pattern
        location: "dat-catalog.json:537"
        description: >
          ConsoleKey: "NES", PackMatch: "Nintendo - Nintendo Entertainment System (Headered)*", 
          Format: "nointro-pack". Specifically targets the Headered variant — contains full-file 
          SHA1 hashes of NES ROMs including 16-byte iNES header.
      - element: "nointro-n64 entry"
        type: pattern
        location: "dat-catalog.json:554"
        description: >
          ConsoleKey: "N64", PackMatch: "Nintendo - Nintendo 64 (BigEndian)*", Format: "nointro-pack".
          Contains SHA1 of BigEndian N64 ROMs.
      - element: "fbneo-nes entry"
        type: pattern
        location: "dat-catalog.json:1716"
        description: "ConsoleKey: 'NES', supplemental FBNeo DAT for NES games."
    language: json
    lines: 1800

  - file: consoles.json
    path: data/consoles.json
    purpose: "Console definitions including extensions, aliases, family, hashStrategy"
    key_elements:
      - element: "N64 definition"
        type: pattern
        location: "consoles.json:830"
        description: >
          key: "N64", uniqueExts: [".n64", ".z64", ".v64"], family: "NoIntroCartridge", 
          hashStrategy: "headerless-sha1". The .n64 extension is UNIQUE to N64.
      - element: "NES definition"
        type: pattern
        location: "consoles.json:945"
        description: >
          key: "NES", uniqueExts: [".nes"], family: "NoIntroCartridge", 
          hashStrategy: "headerless-sha1". Only .nes is listed — .n64 is NOT an NES extension.
    language: json
    lines: 2600

  - file: console-maps.json
    path: data/console-maps.json
    purpose: "Folder name aliases mapped to console keys (ConsoleFolderMap)"
    key_elements:
      - element: ConsoleFolderMap
        type: pattern
        location: "console-maps.json:1"
        description: >
          Maps folder names to console keys (e.g. "n64" → "N64", "nintendo" → "NES").
          Used by ConsoleDetector.DetectByFolder. Not involved in DAT-Hash resolution.
    language: json
    lines: 100

patterns_found:
  - category: architecture
    pattern: "DAT-first cross-console resolution without extension validation"
    description: >
      The enrichment pipeline runs DAT hash lookup BEFORE console detection.
      On the first pass, consoleKey is "UNKNOWN" and no detection hypotheses exist.
      ResolveUnknownDatMatch with exactly 1 match returns that console with no 
      plausibility check against file extension. This is the systemic gap.
    examples:
      - file: EnrichmentPipelinePhase.cs
        location: "line 720-742"
        snippet: |
          var matches = datIndex.LookupAllByHash(hash)
              .Where(static match => IsUsableResolvedConsoleKey(match.ConsoleKey))
              .ToArray();
          if (matches.Length == 0) return DatUnknownResolution.NoMatch;
          if (matches.Length == 1)
          {
              var single = matches[0];
              return new DatUnknownResolution(true, single.ConsoleKey, single.Entry.IsBios, false, single.Entry.GameName);
          }
          // NO extension check here!
    prevalence: common

  - category: architecture
    pattern: "Pre-detect pass uses GenericDatStrategy (container hash only)"
    description: >
      When consoleKey is UNKNOWN, the pre-detect GenericDatStrategy sets UseHeaderlessHash=false.
      Additionally, LookupDat has a guard 'consoleKey is not UNKNOWN' that skips headerless hash.
      Result: for .n64 files on first pass, only the raw container SHA1 is computed.
      For .n64 (already BigEndian), container SHA1 equals the canonical hash, so this is benign.
      But the hash search then hits ALL DATs without filtering by extension compatibility.
    examples:
      - file: FamilyDatStrategyResolver.cs
        location: "line 82-100"
        snippet: |
          private sealed class GenericDatStrategy : IFamilyDatStrategy
          {
              public PlatformFamily Family => PlatformFamily.Unknown;
              public FamilyDatPolicy GetPolicy(string extension, string? hashStrategy)
              {
                  return new FamilyDatPolicy(
                      PreferArchiveInnerHash: true,
                      UseHeaderlessHash: false,   // <-- no headerless for unknown family
                      UseContainerHash: true,
                      ...);
              }
          }
      - file: EnrichmentPipelinePhase.cs
        location: "line 489-492"
        snippet: |
          if (!datMatch && !isArchive && datPolicy.UseHeaderlessHash && headerlessHasher is not null
              && consoleKey is not "UNKNOWN" and not "")  // <-- GUARD: skips headerless when UNKNOWN
    prevalence: common

  - category: architecture
    pattern: "Two-pass DAT lookup (pre-detect + post-detect)"
    description: >
      EnrichFile runs LookupDat twice: first with UNKNOWN console (DAT-first), then after 
      detection if the first pass failed. On the second pass, consoleKey is known from detection 
      (e.g. N64 from .n64 unique extension), so headerless hash + targeted lookup are used.
      BUT: if the first pass SUCCEEDS (wrong console), the second pass is never reached.
    examples:
      - file: EnrichmentPipelinePhase.cs
        location: "line 208-253"
        snippet: |
          // First pass: DAT-first with UNKNOWN
          var datResult = LookupDat(filePath, ext, sizeBytes, consoleKey, detectionConflict,
              datIndex, hashService, archiveHashService, headerlessHasher, preDetectDatPolicy,
              detectionResult: null, context, onProgress);
          // ...
          if (!datResult.DatMatch && consoleDetector is not null)
          {
              detectionResult = consoleDetector.DetectWithConfidence(filePath, root);
              // Second pass: with known consoleKey
              datResult = LookupDat(..., postDetectDatPolicy, detectionResult, ...);
          }
    prevalence: common

  - category: architecture
    pattern: "Extension-to-console data exists but unused in DAT resolution"
    description: >
      consoles.json defines uniqueExts per console and ConsoleDetector.DetectByExtension()
      maps unique extensions to consoles. This data could validate DAT-Hash results but is 
      never consulted during or after ResolveUnknownDatMatch.
    examples:
      - file: ConsoleDetector.cs
        location: "line 313-316"
        snippet: |
          public string? DetectByExtension(string extension)
          {
              var ext = extension.StartsWith(".") ? extension : "." + extension;
              return _uniqueExtMap.TryGetValue(ext, out var key) ? key : null;
          }
    prevalence: common

  - category: architecture
    pattern: "DatIndex stores hashes per ConsoleKey from BuildConsoleMap"
    description: >
      The ConsoleKey for each hash entry is determined entirely by BuildConsoleMap.
      If BuildConsoleMap assigns a DAT file to the wrong ConsoleKey, all hashes from 
      that DAT will be stored under the wrong console.
    examples:
      - file: DatRepositoryAdapter.cs
        location: "line 31-68"
        snippet: |
          public DatIndex GetDatIndex(string datRoot, IDictionary<string, string> consoleMap, ...)
          {
              foreach (var entry in consoleMap)
              {
                  var consoleKey = entry.Key;
                  var datFileName = entry.Value;
                  // ... parse DAT and store all hashes under consoleKey
                  index.Add(consoleKey, normalizedHash, game.Key, romFileName, isBios, parentGameName);
              }
          }
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: BuildConsoleMap
      responsibility: "Maps dat-catalog.json entries to local DAT files, creating ConsoleKey → filePath mapping"
      location: src/Romulus.Infrastructure/Orchestration/RunEnvironmentBuilder.cs
      relationship_to_domain: "Upstream — determines which hashes go into which console bucket"
    - component: DatRepositoryAdapter.GetDatIndex
      responsibility: "Parses DAT XML files and builds the in-memory DatIndex"
      location: src/Romulus.Infrastructure/Dat/DatRepositoryAdapter.cs
      relationship_to_domain: "Core — creates the hash→console mapping that drives resolution"
    - component: EnrichmentPipelinePhase
      responsibility: "Per-file enrichment orchestration including DAT matching"
      location: src/Romulus.Infrastructure/Orchestration/EnrichmentPipelinePhase.cs
      relationship_to_domain: "Consumer — queries DatIndex and resolves consoles from matches"
    - component: ConsoleDetector
      responsibility: "Multi-method console detection (folder, extension, header, keyword)"
      location: src/Romulus.Core/Classification/ConsoleDetector.cs
      relationship_to_domain: "Parallel path — runs after DAT-first or as fallback; has extension data that could validate DAT results"
    - component: HeaderlessHasher
      responsibility: "Computes normalized hashes (header skip, N64 byte-order normalization)"
      location: src/Romulus.Infrastructure/Hashing/HeaderlessHasher.cs
      relationship_to_domain: "Hash computation — skipped on pre-detect pass when consoleKey is UNKNOWN"
    - component: FamilyDatStrategyResolver
      responsibility: "Resolves family-specific DAT lookup policies"
      location: src/Romulus.Infrastructure/Dat/FamilyDatStrategyResolver.cs
      relationship_to_domain: "Policy — GenericDatStrategy for UNKNOWN family disables headerless hash"

  data_flow_involving_domain: |
    dat-catalog.json → BuildConsoleMap → consoleMap{ConsoleKey→datPath}
    consoleMap → DatRepositoryAdapter.GetDatIndex → DatIndex{ConsoleKey→{Hash→Entry}}
    File → FileHashService.GetHash → containerSHA1
    containerSHA1 + DatIndex → LookupAllByHash → [(ConsoleKey, Entry)]
    matches → ResolveUnknownDatMatch → (resolvedConsoleKey, gameName)
    resolvedConsoleKey → assigned as file's console (NO extension validation)

  key_relationships_to_domain:
    - from: dat-catalog.json
      to: BuildConsoleMap
      relationship: "Parsed to create ConsoleKey→DAT file mapping"
    - from: BuildConsoleMap
      to: GetDatIndex
      relationship: "ConsoleMap parameter drives how hashes are bucketed by console"
    - from: DatIndex
      to: ResolveUnknownDatMatch
      relationship: "LookupAllByHash queries cross-console"
    - from: ResolveUnknownDatMatch
      to: EnrichFile
      relationship: "Returns resolved ConsoleKey accepted as authority"
    - from: consoles.json
      to: ConsoleDetector
      relationship: "Defines uniqueExts, ambigExts, family, hashStrategy per console"
    - from: ConsoleDetector.DetectByExtension
      to: "(NOT CONNECTED to DAT resolution)"
      relationship: "Extension→console data exists but is not used for DAT result validation"

related_conventions:
  naming_patterns_in_domain: "ConsoleKey uses uppercase identifiers (NES, N64, SNES, GBA)"
  structure_of_domain: "DAT loading in Infrastructure/Dat, orchestration in Orchestration, contracts in Contracts/Models"
  error_handling_in_domain: "DAT parse errors are logged and silently ignored (empty result)"

open_questions:
  - question: "Why does the NES DAT bucket contain a hash that matches an N64 ROM's container SHA1?"
    context: >
      SHA1 collision is astronomically unlikely. Either (a) the N64 DAT is not loaded and a
      supplemental/FBNeo NES DAT accidentally contains matching data, or (b) there's a
      BuildConsoleMap mis-assignment loading N64 hashes under NES, or (c) the files are actually 
      renamed NES ROMs with .n64 extension (user data issue).
    type: decision_blocker
    affects: ["fix implementation"]

  - question: "Is the N64 DAT file successfully resolved by BuildConsoleMap?"
    context: >
      The PackMatch 'Nintendo - Nintendo 64 (BigEndian)*' requires a matching DAT file in the 
      datRoot. If absent or misnamed, N64 hashes won't be in the index, but that alone doesn't 
      explain NES matches. Need to verify the user's actual DAT root contents.
    type: research
    affects: ["root cause diagnosis"]

  - question: "Does the NES Headered DAT accidentally contain N64 game entries?"
    context: >
      If the No-Intro NES Headered DAT or FBNeo NES DAT have been corrupted or contain 
      cross-platform entries, this would explain the false match. Reproducible by inspecting 
      the actual DAT XML files in the user's datRoot.
    type: research
    affects: ["root cause diagnosis"]

gaps:
  - area: "Runtime diagnostics"
    description: >
      No way to see which specific DAT file provided the NES match, or which hashes are 
      stored in which console bucket at runtime. The log message only shows the result, 
      not the source DAT. Adding diagnostic logging for which DAT file each indexed hash 
      came from would help diagnose this class of bug.
    impact: research_blocker
    affects: ["debugging"]

  - area: "Extension plausibility guard"
    description: >
      The systemic gap: ResolveUnknownDatMatch returns a ConsoleKey without checking if 
      the file's extension is compatible with that console. consoles.json has all the data 
      needed (uniqueExts, ambigExts per console) but it's never consulted.
    impact: decision_blocker
    affects: ["fix design"]

  - area: "User DAT root state"
    description: >
      Cannot determine from code alone whether the user's N64 DAT file exists and is loaded.
      Need runtime log output or manual inspection of the user's DAT root directory.
    impact: research_blocker
    affects: ["root cause confirmation"]
