patterns_found:
  - category: architecture
    pattern: DAT-first Authority
    description: |
      DAT lookup runs BEFORE console detection. If DAT matches, detection
      only supplements with family info but does NOT override DAT decision.
      This is the correct architectural choice for authoritative verification.
    examples:
      - file: EnrichmentPipelinePhase.cs
        location: "215-234"
        snippet: "DAT-first lookup first, then fallback to detector-guided resolution"
    prevalence: common

  - category: architecture
    pattern: Evidence Tier System (T0-T4)
    description: |
      5-tier hierarchy with clear separation: ExactDat > Structural > 
      StrongHeuristic > WeakHeuristic > Unknown. Only T0 and T1 can reach Sort.
      T2 always Review, T3 always Blocked, T4 always Unknown.
    examples:
      - file: EvidenceTier.cs
        location: "1-28"
        snippet: "Tier0_ExactDat, Tier1_Structural, Tier2_StrongHeuristic, Tier3_WeakHeuristic"
    prevalence: common

  - category: architecture
    pattern: Family-Specific DAT Strategies
    description: |
      6 strategy classes (Cartridge, Disc, Arcade, Computer, Hybrid, Folder)
      each with tailored hash approach and name-fallback policy.
    examples:
      - file: CartridgeDatStrategy.cs
        location: main
        snippet: "HeaderlessSHA1 first, then container"
      - file: DiscDatStrategy.cs
        location: main
        snippet: "Container/track SHA1, allows name-only conservative"
    prevalence: common

  - category: architecture
    pattern: Deterministic Tie-Breaking
    description: |
      Multi-criteria deduplication sort: CompletenessScore → DatMatch → RegionScore →
      HeaderScore → VersionScore → FormatScore → SizeTieBreakScore → MainPath (alphabetical).
      Last criterion is path string for absolute determinism.
    examples:
      - file: DeduplicationEngine.cs
        location: main
        snippet: ".ThenBy(x => x.MainPath, StringComparer.OrdinalIgnoreCase)"
    prevalence: common

  - category: error_handling
    pattern: Conservative DAT Gate
    description: |
      When DAT is loaded but file hash NOT in DAT, Tier1 structural evidence
      is capped at Review. Treats absence from loaded DAT as negative signal.
    examples:
      - file: DecisionResolver.cs
        location: "63-65"
        snippet: "if (datAvailable) return DecisionClass.Review"
    prevalence: common

  - category: naming
    pattern: Confidence Score Semantics Inconsistency
    description: |
      DetectionSource enum values double as initial confidence (FolderName=85,
      UniqueExtension=95). But the MatchKind.GetTier() maps UniqueExtension to
      Tier2 (not Tier1), and FolderName to Tier3. The initial confidence
      suggests stronger trust than the tier system actually grants.
    examples:
      - file: HypothesisResolver.cs
        location: "13, 297-308"
        snippet: "SoftOnlyCap = 75 but ComputeSoftOnlyCap returns min(85, cap+15)"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: FileClassifier
      responsibility: Category assignment (Game/BIOS/Junk/NonGame/Unknown)
      location: src/Romulus.Core/Classification/FileClassifier.cs
      relationship_to_domain: Entry point for category classification
    - component: ConsoleDetector
      responsibility: Multi-method console identification
      location: src/Romulus.Core/Classification/ConsoleDetector.cs
      relationship_to_domain: Generates detection hypotheses
    - component: HypothesisResolver
      responsibility: Aggregates hypotheses into single result
      location: src/Romulus.Core/Classification/HypothesisResolver.cs
      relationship_to_domain: Core confidence scoring and conflict detection
    - component: DecisionResolver
      responsibility: Maps evidence tier to decision class
      location: src/Romulus.Core/Classification/DecisionResolver.cs
      relationship_to_domain: Final sort/review/blocked gate
    - component: EnrichmentPipelinePhase
      responsibility: DAT lookup + detection combination
      location: src/Romulus.Infrastructure/Orchestration/EnrichmentPipelinePhase.cs
      relationship_to_domain: Orchestrates DAT-first authority + detection fallback
    - component: FamilyPipelineSelector
      responsibility: Post-enrichment safety gates
      location: src/Romulus.Infrastructure/Orchestration/FamilyPipelineSelector.cs
      relationship_to_domain: Escalates cross-family mismatches to Blocked
    - component: DeduplicationEngine
      responsibility: Game grouping and winner selection
      location: src/Romulus.Core/Deduplication/DeduplicationEngine.cs
      relationship_to_domain: Uses RomCandidate scores for deterministic selection
    - component: ConsoleSorter
      responsibility: Routes files to console subdirectories
      location: src/Romulus.Infrastructure/Sorting/ConsoleSorter.cs
      relationship_to_domain: Respects enrichment decisions, no local re-detection
  interfaces_used_by_domain:
    - interface: IFamilyDatStrategy
      location: src/Romulus.Contracts/Ports/IFamilyDatStrategy.cs
      usage_pattern: Family-specific DAT policy configuration
    - interface: IDatRepository
      location: src/Romulus.Contracts/Ports
      usage_pattern: DAT index loading and parsing
    - interface: IToolRunner
      location: src/Romulus.Contracts/Ports/IToolRunner.cs
      usage_pattern: External tool invocation for conversion
  data_flow_involving_domain: |
    ScannedFileEntry → FileClassifier.Analyze() → ConsoleDetector.DetectWithConfidence() 
    → HypothesisResolver.Resolve() → EnrichmentPipelinePhase.LookupDat() 
    → DecisionResolver.Resolve() → FamilyPipelineSelector.Apply() 
    → CandidateFactory.Create() → RomCandidate 
    → DeduplicationEngine.Deduplicate() → ConsoleSorter.Sort()
  key_relationships_to_domain:
    - from: EnrichmentPipelinePhase
      to: DecisionResolver
      relationship: calls
    - from: HypothesisResolver
      to: DecisionResolver
      relationship: calls
    - from: FamilyPipelineSelector
      to: DecisionResolver
      relationship: overrides decision if cross-family mismatch
    - from: ConsoleSorter
      to: EnrichmentPipelinePhase
      relationship: consumes enrichment decisions (no local re-detection)

related_conventions:
  naming_patterns_in_domain: |
    Evidence tiers: Tier0-Tier4 naming convention.
    Match kinds: Noun+Verb pattern (ExactDatHash, DiscHeaderSignature).
    Decision classes: Sort, Review, Blocked, DatVerified, Unknown.
  structure_of_domain: |
    Core: Pure domain logic in Classification/, Scoring/, Deduplication/, GameKeys/.
    Infrastructure: DAT adapters in Dat/, pipeline in Orchestration/, sorting in Sorting/.
    Contracts: All models (enums, records) in Models/.
  error_handling_in_domain: |
    Conservative: unknown defaults to Blocked/Unknown.
    Cross-family conflicts always Blocked.
    DAT-loaded-but-no-match → Review (negative signal).
  testing_in_domain: |
    ~15 test suites covering detection, DAT, sorting.
    Benchmark quality gates: QualityGateTests with 7 JSONL datasets.
    Known RED tests: HardAuditInvariantTests, CoreRecognitionAuditRedTests.

open_questions:
  - question: Is the SoftOnlyCap of 85 (via ComputeSoftOnlyCap) intentionally aligned with SortThreshold?
    context: |
      SoftOnlyCap baseline is 75, but multi-source soft signals can reach 85 via
      Math.Min(85, strongest+15). The SortThreshold is also 85. But Tier3 (weak
      heuristic) always produces Blocked, never Sort. The cap and threshold
      coincidentally match but serve different purposes.
    type: nice_to_know
    affects: ["HypothesisResolver"]
  - question: Should Arcade-without-DAT always be downgraded to Review?
    context: |
      FamilyPipelineSelector downgrades Arcade Sort to Review when no DAT match.
      This is conservative but may over-penalize well-known Arcade systems.
    type: nice_to_know
    affects: ["FamilyPipelineSelector"]

gaps:
  - area: Header false positive rate
    description: |
      No explicit test coverage for binary header false positives (random bytes
      matching cartridge/disc magic). CartridgeHeaderDetector reads first 512 bytes,
      DiscHeaderDetector reads up to 128KB. False positive rates are not benchmarked.
    impact: research_blocker
    affects: ["CartridgeHeaderDetector", "DiscHeaderDetector"]
  - area: Name-only DAT match collision rate
    description: |
      DatNameOnlyMatch (Tier2) has no measured collision rate. Generic game names
      like "Tennis" or "Golf" could match wrong console's DAT entry.
    impact: research_blocker
    affects: ["EnrichmentPipelinePhase.LookupDat"]
  - area: Missing extension mappings
    description: |
      .d88 (PC98/PC88) and .prg (C64/VIC20/PLUS4) not in console-maps.json
      ConsoleExtMap. Files with these extensions rely entirely on DAT/enrichment.
    impact: nice_to_know
    affects: ["console-maps.json"]
