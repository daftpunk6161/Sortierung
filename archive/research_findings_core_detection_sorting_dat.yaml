plan_id: audit-remediation-2026-04-15
objective: |
  Kompromisslose Tiefenanalyse des Erkennungs-, Sortierungs- und DAT-Matching-Kerns
  von Romulus. Root-Cause-Analyse, Architekturkritik, Modellkritik, Qualitaetsurteil.
focus_area: core-detection-sorting-dat
created_at: "2026-04-15T23:30:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - Das Erkennungs-/DAT-/Sortierungsherz von Romulus ist architektonisch solide aufgebaut
    und konzeptionell weitgehend korrekt. Es gibt ein sauberes Evidence-Tier-System (T0-T4),
    eine DAT-first Authority mit Family-spezifischen Strategien, eine konservative
    Decision-Gate-Logik und deterministische Tie-Breaker.
  - Die Kernarchitektur ist NICHT kaputt und braucht KEINE komplette Neuaufsetzung.
  - Es gibt aber 6 harte Designprobleme, die Release-Risiken darstellen:
    (1) Confidence-Score-Semantik ist inkonsistent (SoftOnlyCap kann 85 erreichen, 
        obwohl Tier3 nie Sort erreichen kann)
    (2) UniqueExtension initial confidence=95 laesst DetectionSource-Prioritaet
        ueber der tatsaechlichen Tier-Zuordnung (Tier2, nicht Tier1) stehen
    (3) DAT-Gate ist fuer Tier1 zu aggressiv (alle T1 werden Review wenn DAT geladen)
    (4) DatNameOnly-Match bei Tier2 ist riskant ohne zusaetzliche Absicherung
    (5) Foldername confidence=85 kann zusammen mit Multi-Source-Bonus Review erreichen,
        obwohl die Quelle strukturell schwach ist
    (6) AMBIGUOUS-Detection hat enge Trigger-Bedingungen (Ratio 0.7 + gleiche Prioritaet)
  - Alle 6 sind durch gezielte Refactors behebbar, nicht durch Neuaufsetzung.

research_metadata:
  methodology: |
    3-Pass hybrid retrieval (semantic_search + grep_search + targeted file reads).
    Pass 1: Classification/Detection system (Core + Contracts).
    Pass 2: DAT matching (Infrastructure/Dat + enrichment pipeline).
    Pass 3: Decision gates, orchestration, sorting, data config, test coverage.
    Cross-validation against benchmark/ground-truth, rules.json, consoles.json.
  scope: |
    Complete recognition chain: FileClassifier → ConsoleDetector → HypothesisResolver → 
    DecisionResolver → EnrichmentPipelinePhase (DAT lookup) → FamilyPipelineSelector → 
    CandidateFactory → DeduplicationEngine → ConsoleSorter.
    Data files: consoles.json, console-maps.json, rules.json, format-scores.json, dat-catalog.json.
    Test files: ~15 test suites covering detection/DAT/sorting.
  confidence: high
  coverage: 92  # Examined all core decision files, key data configs, test landscape
  decision_blockers: 0
  research_blockers: 0

