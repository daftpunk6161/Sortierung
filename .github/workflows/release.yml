name: release-zip

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: NuGet Cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build
        run: dotnet build src/Romulus.sln --configuration Release

      - name: Test
        run: dotnet test src/Romulus.sln --no-build --configuration Release

      - name: Release smoke
        shell: pwsh
        run: |
          ./deploy/smoke/Invoke-ReleaseSmoke.ps1 -Configuration Release -SkipBuild -SkipFullTests

      - name: Publish CLI
        run: dotnet publish src/Romulus.CLI/Romulus.CLI.csproj --configuration Release --output dist/cli

      - name: Publish API
        run: dotnet publish src/Romulus.Api/Romulus.Api.csproj --configuration Release --output dist/api

      - name: Publish WPF GUI
        run: dotnet publish src/Romulus.UI.Wpf/Romulus.UI.Wpf.csproj --configuration Release --output dist/gui

      - name: Create release archive
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF.Replace('refs/tags/','') } else { 'manual-' + (Get-Date -Format 'yyyyMMdd-HHmmss') }
          $zipPath = "dist/rom-cleanup-$version.zip"
          Compress-Archive -Path dist/cli, dist/api, dist/gui, data -DestinationPath $zipPath -Force
          Write-Host "Created $zipPath"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: rom-cleanup-release
          path: dist/rom-cleanup-*.zip
