name: test-pipeline

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'data/**'
      - '.github/workflows/test-pipeline.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'data/**'
      - '.github/workflows/test-pipeline.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: NuGet Cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Romulus.sln

      - name: Build
        run: dotnet build src/Romulus.sln --no-restore --configuration Release

      - name: Journey Matrix Gate
        run: |
          dotnet test src/Romulus.Tests/Romulus.Tests.csproj --no-build --configuration Release --filter "FullyQualifiedName~ApiIntegrationTests|FullyQualifiedName~CliProgramTests|FullyQualifiedName~GuiViewModelTests|FullyQualifiedName~WpfNewTests|FullyQualifiedName~FeatureCommandServiceTests|FullyQualifiedName~RunServiceAndSettingsTests|FullyQualifiedName~RunManagerTests|FullyQualifiedName~RunManagerAdvancedTests|FullyQualifiedName~AuditCsvStoreTests|FullyQualifiedName~AuditSigningServiceTests|FullyQualifiedName~SettingsLoaderTests"

      - name: Unit + Coverage Gate
        run: |
          dotnet test src/Romulus.sln --no-build --configuration Release --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          # Install and run coverage threshold check
          dotnet tool install --global dotnet-reportgenerator-globaltool 2>$null
          $coverageFiles = Get-ChildItem -Recurse -Filter "coverage.cobertura.xml" | Select-Object -First 1
          if ($coverageFiles) {
            [xml]$cov = Get-Content $coverageFiles.FullName
            $lineRate = [double]$cov.coverage.'line-rate' * 100
            Write-Host "Line coverage: $($lineRate.ToString('F1'))%"
            if ($lineRate -lt 50) {
              throw "Coverage $($lineRate.ToString('F1'))% is below minimum threshold of 50%"
            }
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: |
            src/Romulus.Tests/TestResults/**/*.trx
            src/Romulus.Tests/TestResults/**/coverage.cobertura.xml

  governance:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Build (warnings as errors)
        run: dotnet build src/Romulus.sln --configuration Release /p:TreatWarningsAsErrors=true

      - name: Verify dependency direction
        shell: pwsh
        run: |
          # Core darf nicht Infrastructure oder Entry Points referenzieren
          $coreProj = Get-Content src/Romulus.Core/Romulus.Core.csproj -Raw
          if ($coreProj -match 'Romulus\.Infrastructure|Romulus\.CLI|Romulus\.Api|Romulus\.UI\.Wpf') {
            throw 'Core project must not reference Infrastructure or Entry Points'
          }
          # Contracts darf nichts anderes referenzieren
          $contractsProj = Get-Content src/Romulus.Contracts/Romulus.Contracts.csproj -Raw
          if ($contractsProj -match 'Romulus\.Core|Romulus\.Infrastructure|Romulus\.CLI|Romulus\.Api|Romulus\.UI\.Wpf') {
            throw 'Contracts project must not reference any other project'
          }
          Write-Host 'Dependency direction OK'

      - name: Verify using-statement boundaries
        shell: pwsh
        run: |
          # Core .cs files must not use Infrastructure/CLI/Api/UI namespaces
          $violations = Get-ChildItem -Recurse src/Romulus.Core -Filter *.cs |
            Select-String -Pattern 'using\s+Romulus\.(Infrastructure|CLI|Api|UI)' |
            ForEach-Object { "$($_.Path):$($_.LineNumber): $($_.Line.Trim())" }
          if ($violations) { $violations; throw "Core has disallowed using-statements" }
          # Contracts .cs files must not use any other project namespace
          $violations = Get-ChildItem -Recurse src/Romulus.Contracts -Filter *.cs |
            Select-String -Pattern 'using\s+Romulus\.(Core|Infrastructure|CLI|Api|UI)' |
            ForEach-Object { "$($_.Path):$($_.LineNumber): $($_.Line.Trim())" }
          if ($violations) { $violations; throw "Contracts has disallowed using-statements" }
          Write-Host 'Using-statement boundaries OK'

  windows-ui:
    runs-on: windows-latest
    needs: tests
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore & Build
        run: dotnet build src/Romulus.sln --configuration Release

      - name: WPF Accessibility & Automation Tests
        shell: pwsh
        run: |
          dotnet test src/Romulus.Tests/Romulus.Tests.csproj --no-build --configuration Release --filter "FullyQualifiedName~Wpf|FullyQualifiedName~Theme|FullyQualifiedName~Accessibility" --logger "trx;LogFileName=wpf-test-results.trx"

      - name: Upload WPF test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wpf-test-results
          path: src/Romulus.Tests/TestResults/**/*.trx

  sbom:
    runs-on: windows-latest
    needs: tests
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Generate SBOM
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.Sbom.DotNetTool 2>$null
          dotnet build src/Romulus.sln --configuration Release
          sbom-tool generate -b src -bc src -pn Romulus -pv "${{ github.ref_name }}" -ps RomulusTeam -nsb https://github.com/${{ github.repository }}

      - name: Upload SBOM
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: src/_manifest/**

  mutation:
    runs-on: windows-latest
    needs: tests
    timeout-minutes: 60
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Run Stryker Mutation Tests
        shell: pwsh
        run: |
          dotnet tool install --global dotnet-stryker 2>$null
          dotnet stryker --project src/Romulus.Core/Romulus.Core.csproj --test-project src/Romulus.Tests/Romulus.Tests.csproj --reporter "html" --reporter "json" --threshold-high 80 --threshold-low 60 --threshold-break 40

      - name: Upload Mutation Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: mutation-report
          path: StrykerOutput/**/reports/**
