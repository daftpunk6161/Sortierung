<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="gB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B21A8"/>
      <stop offset="50%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gBshadow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
    <!-- Glow effect for R -->
    <filter id="glowB">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="48" fill="#0F0A1A"/>
  <!-- Subtle border glow -->
  <rect x="4" y="4" width="248" height="248" rx="44" fill="none" stroke="url(#gB)" stroke-width="1" opacity="0.2"/>
  <!-- Stylized R with wolf fang detail -->
  <g transform="translate(128,124)" filter="url(#glowB)">
    <!-- R main body -->
    <path d="M-52,-75 L-52,75 L-32,75 L-32,12 L-2,12 L32,75 L55,75 L22,8
             C45,-2 56,-24 56,-42 C56,-64 38,-75 8,-75 Z
             M-32,-57 L4,-57 C26,-57 34,-46 34,-40 C34,-30 26,-14 4,-14 L-32,-14 Z"
          fill="url(#gB)"/>
    <!-- Wolf fang accent - sharp diagonal on R leg -->
    <polygon points="18,12 32,75 48,75 36,18" fill="#06B6D4" opacity="0.5"/>
    <!-- Inner fang detail -->
    <polygon points="22,20 34,68 42,68 32,24" fill="#06B6D4" opacity="0.3"/>
  </g>
  <!-- Corner pixel accents -->
  <rect x="20" y="20" width="6" height="6" rx="1" fill="#06B6D4" opacity="0.25"/>
  <rect x="30" y="20" width="6" height="6" rx="1" fill="#06B6D4" opacity="0.15"/>
  <rect x="20" y="30" width="6" height="6" rx="1" fill="#06B6D4" opacity="0.15"/>
  <rect x="230" y="20" width="6" height="6" rx="1" fill="#06B6D4" opacity="0.25"/>
  <rect x="220" y="20" width="6" height="6" rx="1" fill="#06B6D4" opacity="0.15"/>
  <rect x="230" y="30" width="6" height="6" rx="1" fill="#06B6D4" opacity="0.15"/>
  <rect x="20" y="230" width="6" height="6" rx="1" fill="#6B21A8" opacity="0.2"/>
  <rect x="230" y="230" width="6" height="6" rx="1" fill="#6B21A8" opacity="0.2"/>
</svg>
