<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B21A8"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gA2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="64" fill="#0F0A1A"/>
  <!-- Wolf head silhouette - geometric/angular style -->
  <g transform="translate(256,260) scale(1.15)">
    <!-- Left ear -->
    <polygon points="-120,-180 -80,-60 -40,-120" fill="url(#gA)" opacity="0.9"/>
    <!-- Right ear -->
    <polygon points="120,-180 80,-60 40,-120" fill="url(#gA)" opacity="0.9"/>
    <!-- Head shape -->
    <polygon points="-80,-60 -110,30 -60,80 0,120 60,80 110,30 80,-60 40,-120 0,-80 -40,-120" fill="url(#gA2)"/>
    <!-- Forehead highlight -->
    <polygon points="-30,-100 0,-75 30,-100 0,-50" fill="#9333EA" opacity="0.3"/>
    <!-- Snout shadow -->
    <polygon points="-35,50 0,120 35,50 0,80" fill="#0F0A1A" opacity="0.35"/>
    <!-- Nose -->
    <ellipse cx="0" cy="60" rx="10" ry="7" fill="#0F0A1A" opacity="0.6"/>
    <!-- Left eye socket -->
    <ellipse cx="-38" cy="-10" rx="16" ry="11" fill="#0F0A1A" opacity="0.7"/>
    <!-- Left eye glow -->
    <ellipse cx="-35" cy="-10" rx="7" ry="7" fill="#06B6D4"/>
    <ellipse cx="-33" cy="-12" rx="3" ry="3" fill="white" opacity="0.7"/>
    <!-- Right eye socket -->
    <ellipse cx="38" cy="-10" rx="16" ry="11" fill="#0F0A1A" opacity="0.7"/>
    <!-- Right eye glow -->
    <ellipse cx="35" cy="-10" rx="7" ry="7" fill="#06B6D4"/>
    <ellipse cx="33" cy="-12" rx="3" ry="3" fill="white" opacity="0.7"/>
    <!-- Cheek lines -->
    <line x1="-70" y1="10" x2="-95" y2="25" stroke="#06B6D4" stroke-width="1.5" opacity="0.25"/>
    <line x1="-65" y1="20" x2="-90" y2="35" stroke="#06B6D4" stroke-width="1.5" opacity="0.2"/>
    <line x1="70" y1="10" x2="95" y2="25" stroke="#06B6D4" stroke-width="1.5" opacity="0.25"/>
    <line x1="65" y1="20" x2="90" y2="35" stroke="#06B6D4" stroke-width="1.5" opacity="0.2"/>
    <!-- Scanline overlay -->
    <line x1="-130" y1="-160" x2="130" y2="-160" stroke="#06B6D4" stroke-width="0.8" opacity="0.08"/>
    <line x1="-130" y1="-130" x2="130" y2="-130" stroke="#06B6D4" stroke-width="0.8" opacity="0.08"/>
    <line x1="-130" y1="-100" x2="130" y2="-100" stroke="#06B6D4" stroke-width="0.8" opacity="0.06"/>
    <line x1="-130" y1="-70" x2="130" y2="-70" stroke="#06B6D4" stroke-width="0.8" opacity="0.06"/>
    <line x1="-130" y1="-40" x2="130" y2="-40" stroke="#06B6D4" stroke-width="0.8" opacity="0.05"/>
    <line x1="-130" y1="-10" x2="130" y2="-10" stroke="#06B6D4" stroke-width="0.8" opacity="0.05"/>
    <line x1="-130" y1="20" x2="130" y2="20" stroke="#06B6D4" stroke-width="0.8" opacity="0.04"/>
    <line x1="-130" y1="50" x2="130" y2="50" stroke="#06B6D4" stroke-width="0.8" opacity="0.04"/>
  </g>
  <!-- Brand text -->
  <text x="256" y="465" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="10">ROMULUS</text>
  <!-- Tagline -->
  <text x="256" y="495" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" fill="#06B6D4" letter-spacing="4" opacity="0.7">YOUR COLLECTION, PERFECTED.</text>
</svg>
