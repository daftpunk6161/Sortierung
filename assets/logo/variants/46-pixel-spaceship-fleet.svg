<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#0F172A"/>
  <!-- Pixel Spaceship / Raumschiff mit Wolf Logo an der Seite -->
  <g transform="translate(128,80)">
    <!-- Ship body -->
    <rect x="-8" y="-40" width="16" height="60" fill="#64748B"/>
    <rect x="-12" y="-20" width="24" height="40" fill="#94A3B8"/>
    <rect x="-4" y="-48" width="8" height="12" fill="#CBD5E1"/>
    <!-- Cockpit -->
    <rect x="-4" y="-44" width="8" height="8" fill="#38BDF8"/>
    <!-- Wings -->
    <rect x="-32" y="-4" width="20" height="8" fill="#64748B"/>
    <rect x="12" y="-4" width="20" height="8" fill="#64748B"/>
    <rect x="-36" y="0" width="8" height="12" fill="#475569"/>
    <rect x="28" y="0" width="8" height="12" fill="#475569"/>
    <!-- Engine flames -->
    <rect x="-8" y="20" width="4" height="8" fill="#F59E0B"/>
    <rect x="4" y="20" width="4" height="8" fill="#F59E0B"/>
    <rect x="-6" y="28" width="4" height="4" fill="#EF4444"/>
    <rect x="2" y="28" width="4" height="4" fill="#EF4444"/>
    <rect x="-4" y="32" width="4" height="4" fill="#EF4444" opacity="0.5"/>
    <rect x="0" y="32" width="4" height="4" fill="#EF4444" opacity="0.5"/>
    <!-- Wolf emblem on ship body -->
    <rect x="-4" y="-16" width="8" height="8" fill="#8B5CF6"/>
    <rect x="-2" y="-18" width="1" height="3" fill="#C4B5FD"/>
    <rect x="1" y="-18" width="1" height="3" fill="#C4B5FD"/>
  </g>
  <!-- Stars -->
  <circle cx="30" cy="40" r="1" fill="white" opacity="0.5"/>
  <circle cx="200" cy="30" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="50" cy="140" r="1.2" fill="white" opacity="0.3"/>
  <circle cx="220" cy="100" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="40" cy="75" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="180" cy="60" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="215" cy="150" r="0.8" fill="white" opacity="0.3"/>
  <text x="128" y="168" text-anchor="middle" font-family="'Press Start 2P','Courier New',monospace" font-size="15" font-weight="700" fill="#38BDF8" letter-spacing="2">ROMULUS</text>
  <text x="128" y="188" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#475569" letter-spacing="2">SPACE FLEET EDITION</text>
  <text x="128" y="218" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#334155" letter-spacing="2">YOUR COLLECTION, PERFECTED.</text>
</svg>