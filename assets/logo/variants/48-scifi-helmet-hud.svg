<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#18181B"/>
  <!-- Sci-Fi / Helmet HUD — Wolf als Visor-Overlay -->
  <!-- Helmet outline -->
  <path d="M128,30 Q55,45 48,110 Q45,160 75,170 L85,165 Q90,150 100,145 L128,140 L156,145 Q166,150 171,165 L181,170 Q211,160 208,110 Q201,45 128,30 Z" fill="#27272A" stroke="#3F3F46" stroke-width="1.5"/>
  <!-- Visor -->
  <path d="M70,80 Q80,65 128,60 Q176,65 186,80 L182,120 Q175,135 128,140 Q81,135 74,120 Z" fill="#0E1B30" stroke="#06B6D4" stroke-width="1" opacity="0.9"/>
  <!-- HUD grid on visor -->
  <g opacity="0.15" stroke="#06B6D4" stroke-width="0.3">
    <line x1="75" y1="85" x2="181" y2="85"/>
    <line x1="76" y1="100" x2="180" y2="100"/>
    <line x1="78" y1="115" x2="178" y2="115"/>
    <line x1="100" y1="65" x2="94" y2="135"/>
    <line x1="128" y1="60" x2="128" y2="140"/>
    <line x1="156" y1="65" x2="162" y2="135"/>
  </g>
  <!-- Wolf HUD overlay on visor -->
  <g transform="translate(128,95) scale(0.28)" opacity="0.8">
    <!-- Wireframe wolf -->
    <polygon points="0,-60 -42,-10 -28,38 0,20 28,38 42,-10" fill="none" stroke="#06B6D4" stroke-width="2"/>
    <polygon points="-32,-6 -48,-42 -14,-24" fill="none" stroke="#06B6D4" stroke-width="1.5"/>
    <polygon points="32,-6 48,-42 14,-24" fill="none" stroke="#06B6D4" stroke-width="1.5"/>
    <circle cx="-14" cy="-6" r="4" fill="#06B6D4"/>
    <circle cx="14" cy="-6" r="4" fill="#06B6D4"/>
  </g>
  <!-- HUD text elements -->
  <text x="82" y="78" font-family="'Courier New',monospace" font-size="5" fill="#06B6D4" opacity="0.5">SYS:OK</text>
  <text x="168" y="78" font-family="'Courier New',monospace" font-size="5" fill="#06B6D4" opacity="0.5" text-anchor="end">ROM:✓</text>
  <text x="82" y="130" font-family="'Courier New',monospace" font-size="5" fill="#06B6D4" opacity="0.4">SCAN:100%</text>
  <!-- Ventilation slits on chin -->
  <rect x="114" y="148" width="28" height="2" fill="#3F3F46" rx="1"/>
  <rect x="116" y="153" width="24" height="2" fill="#3F3F46" rx="1"/>
  <rect x="118" y="158" width="20" height="2" fill="#3F3F46" rx="1"/>
  <text x="128" y="195" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#06B6D4" letter-spacing="5">ROMULUS</text>
  <text x="128" y="218" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#164E63" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>