<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#020617"/>
  <!-- Pixel Sword + Shield — RPG/Fantasy Stil -->
  <g transform="translate(128,80)">
    <!-- Shield body -->
    <rect x="-28" y="-20" width="56" height="48" fill="#6B21A8"/>
    <rect x="-24" y="28" width="48" height="8" fill="#581C87"/>
    <rect x="-20" y="36" width="40" height="8" fill="#4C1D95"/>
    <rect x="-12" y="44" width="24" height="8" fill="#3B0764"/>
    <rect x="-4" y="52" width="8" height="4" fill="#3B0764"/>
    <!-- Shield emblem (wolf face pixel) -->
    <rect x="-12" y="-12" width="4" height="4" fill="#FDE047"/>
    <rect x="8" y="-12" width="4" height="4" fill="#FDE047"/>
    <rect x="-8" y="-4" width="16" height="4" fill="#A855F7"/>
    <rect x="-4" y="0" width="8" height="4" fill="#C084FC"/>
    <rect x="-2" y="4" width="4" height="4" fill="#7C3AED"/>
    <!-- Shield border -->
    <rect x="-28" y="-20" width="4" height="48" fill="#D4AF37"/>
    <rect x="24" y="-20" width="4" height="48" fill="#D4AF37"/>
    <rect x="-28" y="-20" width="56" height="4" fill="#D4AF37"/>
    <!-- Sword behind shield -->
    <rect x="-2" y="-52" width="4" height="32" fill="#E5E7EB"/>
    <rect x="-6" y="-20" width="12" height="4" fill="#D4AF37"/>
    <rect x="-1" y="-56" width="2" height="8" fill="#D4AF37"/>
    <!-- Sword blade tip -->
    <rect x="-1" y="-60" width="2" height="4" fill="#E5E7EB"/>
    <rect x="0" y="-64" width="1" height="4" fill="#9CA3AF"/>
  </g>
  <text x="128" y="180" text-anchor="middle" font-family="'Press Start 2P','Courier New',monospace" font-size="15" font-weight="700" fill="#A855F7" letter-spacing="2">ROMULUS</text>
  <text x="128" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#6D28D9" letter-spacing="2">GUARDIAN OF ROMS</text>
  <text x="128" y="228" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#4C1D95" letter-spacing="2">YOUR COLLECTION, PERFECTED.</text>
</svg>