<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="holo58" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="25%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="75%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="glow58">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="32" fill="#0D001A"/>
  <!-- Shattered prism: 3 pieces -->
  <polygon points="128,28 60,148 128,100" fill="none" stroke="url(#holo58)" stroke-width="2" opacity="0.9"/>
  <polygon points="128,28 128,100 196,148" fill="none" stroke="url(#holo58)" stroke-width="2" opacity="0.7"/>
  <polygon points="60,148 128,100 196,148" fill="none" stroke="url(#holo58)" stroke-width="2" opacity="0.5"/>
  <!-- Crack lines -->
  <line x1="128" y1="28" x2="128" y2="100" stroke="#A855F7" stroke-width="0.8" opacity="0.5"/>
  <line x1="60" y1="148" x2="128" y2="100" stroke="#A855F7" stroke-width="0.8" opacity="0.5"/>
  <line x1="128" y1="100" x2="196" y2="148" stroke="#A855F7" stroke-width="0.8" opacity="0.5"/>
  <!-- White beam in -->
  <line x1="0" y1="95" x2="75" y2="95" stroke="white" stroke-width="2" opacity="0.3"/>
  <!-- Scattered rainbow rays — more chaotic from shattered prism -->
  <line x1="175" y1="80" x2="248" y2="45" stroke="#EF4444" stroke-width="2" opacity="0.6"/>
  <line x1="180" y1="92" x2="252" y2="72" stroke="#F97316" stroke-width="1.6" opacity="0.55"/>
  <line x1="184" y1="108" x2="250" y2="95" stroke="#FBBF24" stroke-width="2" opacity="0.6"/>
  <line x1="165" y1="138" x2="240" y2="165" stroke="#22C55E" stroke-width="1.6" opacity="0.55"/>
  <line x1="170" y1="145" x2="245" y2="185" stroke="#3B82F6" stroke-width="2" opacity="0.6"/>
  <line x1="130" y1="148" x2="170" y2="230" stroke="#8B5CF6" stroke-width="1.6" opacity="0.4"/>
  <line x1="90" y1="148" x2="45" y2="220" stroke="#EC4899" stroke-width="1.6" opacity="0.35"/>
  <!-- Wolf — big, glowing -->
  <g transform="translate(128,88) scale(0.42)" filter="url(#glow58)">
    <polygon points="0,-68 -50,-12 -34,48 0,28 34,48 50,-12" fill="white" opacity="0.9"/>
    <polygon points="-38,-8 -58,-50 -18,-28" fill="white" opacity="0.9"/>
    <polygon points="38,-8 58,-50 18,-28" fill="white" opacity="0.9"/>
  </g>
  <text x="128" y="186" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="600" fill="url(#holo58)" letter-spacing="5">ROMULUS</text>
  <text x="128" y="208" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#6B7280" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>