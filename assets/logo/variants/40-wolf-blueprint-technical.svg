<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#0C4A6E"/>
  <!-- Blueprint / Technische Zeichnung Stil -->
  <!-- Grid pattern -->
  <g stroke="#0369A1" stroke-width="0.3" opacity="0.3">
    <line x1="0" y1="32" x2="256" y2="32"/>
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="96" x2="256" y2="96"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="160" x2="256" y2="160"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="0" y1="224" x2="256" y2="224"/>
    <line x1="32" y1="0" x2="32" y2="256"/>
    <line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="96" y1="0" x2="96" y2="256"/>
    <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="160" y1="0" x2="160" y2="256"/>
    <line x1="192" y1="0" x2="192" y2="256"/>
    <line x1="224" y1="0" x2="224" y2="256"/>
  </g>
  <!-- Wolf blueprint - technical drawing style -->
  <g transform="translate(128,90) scale(0.55)" fill="none" stroke="#BAE6FD" stroke-width="1.5">
    <!-- Head shape -->
    <polygon points="0,-75 -55,-20 -40,50 0,30 40,50 55,-20"/>
    <!-- Ears -->
    <polygon points="-42,-18 -62,-60 -18,-38"/>
    <polygon points="42,-18 62,-60 18,-38"/>
    <!-- Construction lines (dashed) -->
    <line x1="0" y1="-75" x2="0" y2="50" stroke-dasharray="4 3" opacity="0.4"/>
    <line x1="-55" y1="-20" x2="55" y2="-20" stroke-dasharray="4 3" opacity="0.4"/>
    <!-- Eyes -->
    <circle cx="-18" cy="-12" r="6"/>
    <circle cx="18" cy="-12" r="6"/>
    <!-- Dimension arrows -->
    <line x1="-62" y1="-65" x2="-62" y2="55" opacity="0.3" stroke-width="0.5"/>
    <line x1="-67" y1="-60" x2="-57" y2="-60" opacity="0.3" stroke-width="0.5"/>
    <line x1="-67" y1="50" x2="-57" y2="50" opacity="0.3" stroke-width="0.5"/>
    <!-- Center crosshair on nose -->
    <line x1="-5" y1="12" x2="5" y2="12" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="7" x2="0" y2="17" stroke-width="0.5" opacity="0.5"/>
  </g>
  <!-- Blueprint label -->
  <text x="42" y="42" font-family="'Courier New',monospace" font-size="7" fill="#BAE6FD" opacity="0.5">DWG: RML-001</text>
  <text x="210" y="42" text-anchor="end" font-family="'Courier New',monospace" font-size="7" fill="#BAE6FD" opacity="0.5">REV: 2.0</text>
  <text x="128" y="178" text-anchor="middle" font-family="'Courier New',monospace" font-size="24" font-weight="700" fill="#BAE6FD" letter-spacing="4">ROMULUS</text>
  <text x="128" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#0284C7" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
  <!-- Scale bar -->
  <line x1="80" y1="225" x2="176" y2="225" stroke="#BAE6FD" stroke-width="0.5" opacity="0.3"/>
  <text x="128" y="235" text-anchor="middle" font-family="'Courier New',monospace" font-size="5" fill="#BAE6FD" opacity="0.3">1:1 SCALE</text>
</svg>