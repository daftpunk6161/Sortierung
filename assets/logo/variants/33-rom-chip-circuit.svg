<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#0D1117"/>
  <!-- ROM Chip / IC Chip Design -->
  <!-- Chip body -->
  <rect x="68" y="42" width="120" height="104" rx="4" fill="#1F2937" stroke="#4B5563" stroke-width="1"/>
  <!-- Chip pins (left side) -->
  <rect x="56" y="52" width="14" height="4" fill="#9CA3AF"/>
  <rect x="56" y="62" width="14" height="4" fill="#9CA3AF"/>
  <rect x="56" y="72" width="14" height="4" fill="#9CA3AF"/>
  <rect x="56" y="82" width="14" height="4" fill="#9CA3AF"/>
  <rect x="56" y="92" width="14" height="4" fill="#9CA3AF"/>
  <rect x="56" y="102" width="14" height="4" fill="#9CA3AF"/>
  <rect x="56" y="112" width="14" height="4" fill="#9CA3AF"/>
  <rect x="56" y="122" width="14" height="4" fill="#9CA3AF"/>
  <!-- Chip pins (right side) -->
  <rect x="186" y="52" width="14" height="4" fill="#9CA3AF"/>
  <rect x="186" y="62" width="14" height="4" fill="#9CA3AF"/>
  <rect x="186" y="72" width="14" height="4" fill="#9CA3AF"/>
  <rect x="186" y="82" width="14" height="4" fill="#9CA3AF"/>
  <rect x="186" y="92" width="14" height="4" fill="#9CA3AF"/>
  <rect x="186" y="102" width="14" height="4" fill="#9CA3AF"/>
  <rect x="186" y="112" width="14" height="4" fill="#9CA3AF"/>
  <rect x="186" y="122" width="14" height="4" fill="#9CA3AF"/>
  <!-- Notch on top -->
  <circle cx="128" cy="42" r="6" fill="#0D1117"/>
  <!-- Die area / window -->
  <rect x="88" y="58" width="80" height="72" rx="2" fill="#111827" stroke="#374151" stroke-width="0.5"/>
  <!-- Wolf icon etched on die -->
  <g transform="translate(128,90) scale(0.28)" opacity="0.8">
    <polygon points="0,-70 -50,-15 -35,40 0,20 35,40 50,-15" fill="none" stroke="#06B6D4" stroke-width="3"/>
    <polygon points="-35,-10 -55,-55 -15,-35" fill="none" stroke="#06B6D4" stroke-width="2"/>
    <polygon points="35,-10 55,-55 15,-35" fill="none" stroke="#06B6D4" stroke-width="2"/>
    <circle cx="-15" cy="-10" r="4" fill="#06B6D4"/>
    <circle cx="15" cy="-10" r="4" fill="#06B6D4"/>
  </g>
  <!-- Chip label text -->
  <text x="128" y="140" text-anchor="middle" font-family="'Courier New',monospace" font-size="6" fill="#6B7280">ROM-CLN-2025</text>
  <text x="128" y="178" text-anchor="middle" font-family="'Courier New',monospace" font-size="24" font-weight="700" fill="#06B6D4" letter-spacing="4">ROMULUS</text>
  <text x="128" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#374151" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
  <!-- Tiny circuit traces -->
  <line x1="56" y1="230" x2="80" y2="230" stroke="#1F2937" stroke-width="0.5"/>
  <line x1="80" y1="230" x2="80" y2="220" stroke="#1F2937" stroke-width="0.5"/>
  <line x1="176" y1="230" x2="200" y2="230" stroke="#1F2937" stroke-width="0.5"/>
  <line x1="176" y1="230" x2="176" y2="220" stroke="#1F2937" stroke-width="0.5"/>
</svg>