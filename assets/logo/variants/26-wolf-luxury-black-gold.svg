<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#0A0A0A"/>
  <!-- Luxury / Black & Gold - Premium Branding -->
  <!-- Gold border -->
  <rect x="20" y="20" width="216" height="216" rx="16" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
  <!-- Minimalist wolf mark - two strokes -->
  <g transform="translate(128,90) scale(0.7)">
    <!-- Left ear+cheek as single sweep -->
    <path d="M-60,-70 L-30,-10 L0,20" fill="none" stroke="#D4AF37" stroke-width="3" stroke-linecap="round"/>
    <!-- Right ear+cheek as single sweep -->
    <path d="M60,-70 L30,-10 L0,20" fill="none" stroke="#D4AF37" stroke-width="3" stroke-linecap="round"/>
    <!-- Brow line connecting ears -->
    <path d="M-45,-40 Q0,-55 45,-40" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
    <!-- Eyes - subtle dots -->
    <circle cx="-20" cy="-20" r="3" fill="#D4AF37"/>
    <circle cx="20" cy="-20" r="3" fill="#D4AF37"/>
    <!-- Nose tip -->
    <circle cx="0" cy="10" r="2.5" fill="#D4AF37" opacity="0.7"/>
  </g>
  <!-- Elegant thin line -->
  <line x1="75" y1="148" x2="181" y2="148" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
  <text x="128" y="180" text-anchor="middle" font-family="'Didot','Georgia','Times New Roman',serif" font-size="30" font-weight="400" fill="#D4AF37" letter-spacing="10">ROMULUS</text>
  <text x="128" y="205" text-anchor="middle" font-family="'Didot','Georgia',serif" font-size="7" fill="#8B7536" letter-spacing="5">YOUR COLLECTION, PERFECTED.</text>
</svg>