<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="holo64" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="wolfGrad64" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="#0F0F1A"/>
  <!-- Prism -->
  <polygon points="128,30 62,148 194,148" fill="none" stroke="url(#holo64)" stroke-width="2.5"/>
  <!-- Beam in -->
  <line x1="0" y1="98" x2="76" y2="98" stroke="white" stroke-width="2" opacity="0.3"/>
  <!-- Rays -->
  <line x1="182" y1="88" x2="255" y2="55" stroke="#EF4444" stroke-width="2" opacity="0.65"/>
  <line x1="184" y1="98" x2="255" y2="74" stroke="#F97316" stroke-width="2" opacity="0.65"/>
  <line x1="186" y1="108" x2="255" y2="93" stroke="#FBBF24" stroke-width="2" opacity="0.65"/>
  <line x1="188" y1="118" x2="255" y2="112" stroke="#22C55E" stroke-width="2" opacity="0.65"/>
  <line x1="189" y1="128" x2="255" y2="131" stroke="#3B82F6" stroke-width="2" opacity="0.65"/>
  <line x1="190" y1="138" x2="254" y2="150" stroke="#8B5CF6" stroke-width="2" opacity="0.65"/>
  <!-- Wolf halb-gefüllt: linke Hälfte voll, rechte Hälfte nur outline -->
  <g transform="translate(128,92) scale(0.44)">
    <!-- Left half — solid gradient fill -->
    <clipPath id="leftHalf64"><rect x="-80" y="-100" width="80" height="200"/></clipPath>
    <g clip-path="url(#leftHalf64)">
      <polygon points="0,-68 -50,-12 -34,48 0,28 34,48 50,-12" fill="url(#wolfGrad64)" opacity="0.9"/>
      <polygon points="-38,-8 -58,-50 -18,-28" fill="url(#wolfGrad64)" opacity="0.9"/>
      <polygon points="38,-8 58,-50 18,-28" fill="url(#wolfGrad64)" opacity="0.9"/>
    </g>
    <!-- Right half — outline only -->
    <clipPath id="rightHalf64"><rect x="0" y="-100" width="80" height="200"/></clipPath>
    <g clip-path="url(#rightHalf64)">
      <polygon points="0,-68 -50,-12 -34,48 0,28 34,48 50,-12" fill="none" stroke="url(#wolfGrad64)" stroke-width="2.5"/>
      <polygon points="38,-8 58,-50 18,-28" fill="none" stroke="url(#wolfGrad64)" stroke-width="2.5"/>
    </g>
  </g>
  <text x="128" y="186" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="600" fill="url(#holo64)" letter-spacing="5">ROMULUS</text>
  <text x="128" y="208" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#6B7280" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
