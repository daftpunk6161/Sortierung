<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="frostGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="url(#frostGrad)"/>
  <!-- Snowflake particles -->
  <circle cx="40" cy="40" r="2" fill="#93C5FD" opacity="0.5"/>
  <circle cx="200" cy="60" r="1.5" fill="#93C5FD" opacity="0.4"/>
  <circle cx="60" cy="180" r="1" fill="#93C5FD" opacity="0.3"/>
  <circle cx="190" cy="200" r="2" fill="#93C5FD" opacity="0.4"/>
  <circle cx="100" cy="30" r="1" fill="#93C5FD" opacity="0.3"/>
  <circle cx="170" cy="170" r="1.5" fill="#93C5FD" opacity="0.3"/>
  <!-- Frost/Ice Wolf - cool blue palette, crystalline -->
  <g transform="translate(128,90) scale(0.55)">
    <!-- Head -->
    <circle cx="0" cy="0" r="60" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
    <!-- Ears -->
    <polygon points="-50,-40 -35,-90 -15,-45" fill="#BFDBFE" stroke="#60A5FA" stroke-width="1"/>
    <polygon points="50,-40 35,-90 15,-45" fill="#BFDBFE" stroke="#60A5FA" stroke-width="1"/>
    <polygon points="-42,-48 -35,-78 -22,-50" fill="#93C5FD" opacity="0.5"/>
    <polygon points="42,-48 35,-78 22,-50" fill="#93C5FD" opacity="0.5"/>
    <!-- Eyes - icy -->
    <ellipse cx="-20" cy="-10" rx="10" ry="8" fill="white"/>
    <ellipse cx="20" cy="-10" rx="10" ry="8" fill="white"/>
    <circle cx="-20" cy="-10" r="5" fill="#1D4ED8"/>
    <circle cx="20" cy="-10" r="5" fill="#1D4ED8"/>
    <circle cx="-18" cy="-12" r="2" fill="white"/>
    <circle cx="22" cy="-12" r="2" fill="white"/>
    <!-- Nose -->
    <ellipse cx="0" cy="15" rx="8" ry="5" fill="#93C5FD"/>
    <!-- Mouth -->
    <path d="M-10,25 Q0,32 10,25" fill="none" stroke="#60A5FA" stroke-width="1"/>
    <!-- Ice crystal markings -->
    <line x1="-30" y1="-30" x2="-40" y2="-35" stroke="#93C5FD" stroke-width="0.5" opacity="0.6"/>
    <line x1="30" y1="-30" x2="40" y2="-35" stroke="#93C5FD" stroke-width="0.5" opacity="0.6"/>
    <line x1="0" y1="-50" x2="0" y2="-58" stroke="#93C5FD" stroke-width="0.5" opacity="0.6"/>
  </g>
  <text x="128" y="175" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="26" font-weight="300" fill="#1E40AF" letter-spacing="6">ROMULUS</text>
  <text x="128" y="198" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#3B82F6" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>