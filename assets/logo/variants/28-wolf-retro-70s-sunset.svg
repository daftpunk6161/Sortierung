<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="retroSunset28" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="30%" stop-color="#F97316"/>
      <stop offset="60%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#7C2D12"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="#1E1B4B"/>
  <!-- Retro-70s / Vintage Game Cover Stil -->
  <!-- Sunset circle -->
  <circle cx="128" cy="100" r="65" fill="url(#retroSunset28)"/>
  <!-- Horizontal sunset stripes (like the 80s sun) -->
  <rect x="63" y="90" width="130" height="3" fill="#1E1B4B" opacity="0.4"/>
  <rect x="63" y="98" width="130" height="4" fill="#1E1B4B" opacity="0.4"/>
  <rect x="63" y="108" width="130" height="5" fill="#1E1B4B" opacity="0.4"/>
  <rect x="63" y="120" width="130" height="7" fill="#1E1B4B" opacity="0.4"/>
  <rect x="63" y="135" width="130" height="10" fill="#1E1B4B" opacity="0.4"/>
  <!-- Wolf howling silhouette -->
  <g transform="translate(128,120) scale(0.4)">
    <!-- Body -->
    <ellipse cx="20" cy="10" rx="50" ry="25" fill="#1E1B4B"/>
    <!-- Head tilted up (howling) -->
    <circle cx="-30" cy="-25" r="20" fill="#1E1B4B"/>
    <!-- Snout up -->
    <ellipse cx="-40" cy="-45" rx="8" ry="12" fill="#1E1B4B"/>
    <!-- Ear -->
    <polygon points="-20,-38 -25,-60 -12,-42" fill="#1E1B4B"/>
    <!-- Front legs -->
    <rect x="-10" y="30" width="8" height="25" fill="#1E1B4B"/>
    <rect x="10" y="30" width="8" height="25" fill="#1E1B4B"/>
    <!-- Back legs -->
    <rect x="50" y="25" width="8" height="30" fill="#1E1B4B"/>
    <rect x="65" y="25" width="8" height="30" fill="#1E1B4B"/>
    <!-- Tail -->
    <path d="M70,0 C85,-10 90,-30 80,-40" fill="none" stroke="#1E1B4B" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- Ground line -->
  <line x1="50" y1="168" x2="206" y2="168" stroke="#F97316" stroke-width="1" opacity="0.5"/>
  <text x="128" y="198" text-anchor="middle" font-family="'Cooper Black','Georgia',serif" font-size="30" font-weight="900" fill="#FCD34D" letter-spacing="3">ROMULUS</text>
  <text x="128" y="222" text-anchor="middle" font-family="'Georgia',serif" font-size="8" fill="#F97316" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>