<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#0F0F23"/>
  <!-- Glitch-Wolf: doppelter Versatz, RGB-Shift -->
  <!-- Background glitch bars -->
  <rect x="0" y="45" width="256" height="3" fill="#EF4444" opacity="0.1"/>
  <rect x="20" y="100" width="200" height="2" fill="#3B82F6" opacity="0.08"/>
  <rect x="0" y="165" width="256" height="2" fill="#22C55E" opacity="0.1"/>
  <!-- Wolf head - triple layer RGB offset -->
  <g transform="translate(128,90) scale(0.5)">
    <!-- Red channel (offset left) -->
    <g transform="translate(-4,-2)" opacity="0.5">
      <polygon points="0,-80 -60,-20 -45,50 0,30 45,50 60,-20" fill="none" stroke="#EF4444" stroke-width="2.5"/>
      <polygon points="-45,-15 -70,-65 -20,-40" fill="none" stroke="#EF4444" stroke-width="2"/>
      <polygon points="45,-15 70,-65 20,-40" fill="none" stroke="#EF4444" stroke-width="2"/>
    </g>
    <!-- Green channel (offset right) -->
    <g transform="translate(4,2)" opacity="0.5">
      <polygon points="0,-80 -60,-20 -45,50 0,30 45,50 60,-20" fill="none" stroke="#22C55E" stroke-width="2.5"/>
      <polygon points="-45,-15 -70,-65 -20,-40" fill="none" stroke="#22C55E" stroke-width="2"/>
      <polygon points="45,-15 70,-65 20,-40" fill="none" stroke="#22C55E" stroke-width="2"/>
    </g>
    <!-- Blue channel (center) -->
    <g opacity="0.7">
      <polygon points="0,-80 -60,-20 -45,50 0,30 45,50 60,-20" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
      <polygon points="-45,-15 -70,-65 -20,-40" fill="none" stroke="#3B82F6" stroke-width="2"/>
      <polygon points="45,-15 70,-65 20,-40" fill="none" stroke="#3B82F6" stroke-width="2"/>
    </g>
    <!-- Eyes composite (white where all overlap) -->
    <circle cx="-20" cy="-10" r="5" fill="white" opacity="0.9"/>
    <circle cx="20" cy="-10" r="5" fill="white" opacity="0.9"/>
  </g>
  <!-- Glitch text: triple offset -->
  <text x="126" y="173" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="800" fill="#EF4444" letter-spacing="5" opacity="0.5">ROMULUS</text>
  <text x="130" y="177" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="800" fill="#22C55E" letter-spacing="5" opacity="0.5">ROMULUS</text>
  <text x="128" y="175" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="800" fill="#3B82F6" letter-spacing="5" opacity="0.7">ROMULUS</text>
  <text x="128" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#4B5563" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>