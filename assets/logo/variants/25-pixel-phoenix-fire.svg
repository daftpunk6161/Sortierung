<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="earthGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#57534E"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="url(#earthGrad)"/>
  <!-- Pixel Phoenix - Feuer-Vogel, Wiedergeburt (perfekt für ROM-Rettung) -->
  <g transform="translate(128,82)">
    <!-- Tail feathers (fire) -->
    <rect x="-4" y="20" width="8" height="8" fill="#F59E0B"/>
    <rect x="-12" y="28" width="8" height="8" fill="#F97316"/>
    <rect x="4" y="28" width="8" height="8" fill="#F97316"/>
    <rect x="-20" y="36" width="8" height="8" fill="#EF4444"/>
    <rect x="-4" y="36" width="8" height="8" fill="#F97316"/>
    <rect x="12" y="36" width="8" height="8" fill="#EF4444"/>
    <rect x="-28" y="44" width="8" height="6" fill="#DC2626" opacity="0.7"/>
    <rect x="20" y="44" width="8" height="6" fill="#DC2626" opacity="0.7"/>
    <!-- Body -->
    <rect x="-12" y="4" width="24" height="16" fill="#F59E0B"/>
    <rect x="-8" y="8" width="16" height="8" fill="#FDE047"/>
    <!-- Wings spread -->
    <rect x="-36" y="-4" width="8" height="8" fill="#F97316"/>
    <rect x="-28" y="-4" width="8" height="8" fill="#F59E0B"/>
    <rect x="-20" y="0" width="8" height="8" fill="#FBBF24"/>
    <rect x="12" y="0" width="8" height="8" fill="#FBBF24"/>
    <rect x="20" y="-4" width="8" height="8" fill="#F59E0B"/>
    <rect x="28" y="-4" width="8" height="8" fill="#F97316"/>
    <!-- Wing tips -->
    <rect x="-44" y="-12" width="8" height="8" fill="#EF4444"/>
    <rect x="36" y="-12" width="8" height="8" fill="#EF4444"/>
    <rect x="-44" y="-4" width="8" height="8" fill="#F97316"/>
    <rect x="36" y="-4" width="8" height="8" fill="#F97316"/>
    <!-- Head -->
    <rect x="-8" y="-12" width="16" height="12" fill="#FDE047"/>
    <rect x="-4" y="-20" width="8" height="8" fill="#FBBF24"/>
    <!-- Crest -->
    <rect x="-4" y="-28" width="4" height="8" fill="#F97316"/>
    <rect x="0" y="-32" width="4" height="8" fill="#EF4444"/>
    <!-- Eye -->
    <rect x="-4" y="-8" width="4" height="4" fill="#292524"/>
    <rect x="2" y="-8" width="4" height="4" fill="#292524"/>
    <!-- Beak -->
    <rect x="-2" y="-2" width="4" height="4" fill="#F97316"/>
  </g>
  <text x="128" y="180" text-anchor="middle" font-family="'Press Start 2P','Courier New',monospace" font-size="16" font-weight="700" fill="#F59E0B" letter-spacing="2">ROMULUS</text>
  <text x="128" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#92400E" letter-spacing="3">REBORN FROM THE ASHES</text>
  <text x="128" y="225" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#57534E" letter-spacing="2">YOUR COLLECTION, PERFECTED.</text>
</svg>