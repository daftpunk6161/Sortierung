<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#0F172A"/>
  <!-- Cyberpunk / Neon Glitch -->
  <!-- Glitch bars -->
  <rect x="0" y="60" width="256" height="2" fill="#06B6D4" opacity="0.3"/>
  <rect x="0" y="140" width="256" height="1" fill="#F43F5E" opacity="0.2"/>
  <rect x="80" y="90" width="100" height="1" fill="#8B5CF6" opacity="0.3"/>
  <!-- Wolf head - neon wireframe -->
  <g transform="translate(128,88) scale(0.55)">
    <!-- Outer wireframe -->
    <polygon points="0,-90 -70,-30 -55,50 -25,70 25,70 55,50 70,-30" fill="none" stroke="#06B6D4" stroke-width="2"/>
    <!-- Glitch offset -->
    <polygon points="3,-87 -67,-27 -52,53 -22,73 28,73 58,53 73,-27" fill="none" stroke="#F43F5E" stroke-width="1" opacity="0.4"/>
    <!-- Inner structure -->
    <line x1="0" y1="-90" x2="-25" y2="70" stroke="#06B6D4" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="-90" x2="25" y2="70" stroke="#06B6D4" stroke-width="0.5" opacity="0.3"/>
    <line x1="-70" y1="-30" x2="70" y2="-30" stroke="#06B6D4" stroke-width="0.5" opacity="0.3"/>
    <!-- Ears -->
    <polygon points="-55,-25 -80,-80 -40,-55" fill="none" stroke="#06B6D4" stroke-width="1.5"/>
    <polygon points="55,-25 80,-80 40,-55" fill="none" stroke="#06B6D4" stroke-width="1.5"/>
    <!-- Eyes - glowing -->
    <circle cx="-25" cy="-15" r="8" fill="none" stroke="#F43F5E" stroke-width="2"/>
    <circle cx="25" cy="-15" r="8" fill="none" stroke="#F43F5E" stroke-width="2"/>
    <circle cx="-25" cy="-15" r="3" fill="#F43F5E"/>
    <circle cx="25" cy="-15" r="3" fill="#F43F5E"/>
    <!-- Nose -->
    <polygon points="0,15 -8,28 8,28" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Circuit lines -->
    <line x1="-55" y1="30" x2="-80" y2="40" stroke="#06B6D4" stroke-width="0.5" opacity="0.5"/>
    <line x1="55" y1="30" x2="80" y2="40" stroke="#06B6D4" stroke-width="0.5" opacity="0.5"/>
    <circle cx="-80" cy="40" r="2" fill="#06B6D4" opacity="0.5"/>
    <circle cx="80" cy="40" r="2" fill="#06B6D4" opacity="0.5"/>
  </g>
  <!-- Glitch text effect -->
  <text x="130" y="175" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="900" fill="#06B6D4" letter-spacing="6">ROMULUS</text>
  <text x="127" y="175" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="900" fill="#F43F5E" letter-spacing="6" opacity="0.3">ROMULUS</text>
  <text x="128" y="198" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#475569" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>