<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#0C090A"/>
  <!-- Wölfin (She-Wolf / Lupa) mit zwei Zwillingen - die Romulus-Sage -->
  <g transform="translate(128,95) scale(0.48)">
    <!-- Wolf body horizontal -->
    <ellipse cx="0" cy="0" rx="130" ry="50" fill="#4A4458"/>
    <!-- Head -->
    <ellipse cx="-120" cy="-20" rx="40" ry="35" fill="#5B5470"/>
    <!-- Ears -->
    <polygon points="-145,-50 -135,-85 -125,-50" fill="#6B6580"/>
    <polygon points="-115,-50 -105,-85 -95,-50" fill="#6B6580"/>
    <!-- Eyes -->
    <circle cx="-130" cy="-25" r="5" fill="#F59E0B"/>
    <circle cx="-110" cy="-25" r="5" fill="#F59E0B"/>
    <!-- Snout -->
    <ellipse cx="-150" cy="-10" rx="15" ry="10" fill="#3D3650"/>
    <!-- Tail -->
    <path d="M120,0 C140,-20 150,-50 140,-70" fill="none" stroke="#5B5470" stroke-width="10" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="-70" y="40" width="12" height="35" fill="#4A4458" rx="3"/>
    <rect x="-40" y="40" width="12" height="35" fill="#4A4458" rx="3"/>
    <rect x="40" y="40" width="12" height="35" fill="#4A4458" rx="3"/>
    <rect x="70" y="40" width="12" height="35" fill="#4A4458" rx="3"/>
    <!-- Twin silhouettes beneath -->
    <ellipse cx="-20" cy="25" rx="12" ry="15" fill="#F59E0B" opacity="0.3"/>
    <ellipse cx="20" cy="25" rx="12" ry="15" fill="#F59E0B" opacity="0.3"/>
  </g>
  <text x="128" y="195" text-anchor="middle" font-family="'Palatino Linotype',serif" font-size="28" font-style="italic" font-weight="700" fill="#F59E0B" letter-spacing="4">Romulus</text>
  <text x="128" y="218" text-anchor="middle" font-family="'Palatino Linotype',serif" font-size="9" fill="#5B5470" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>