<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="holo66" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="25%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="75%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="glow66">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="32" fill="#0A0A12"/>
  <!-- Wolf IS the prism — wolf body as refraction shape -->
  <!-- Wolf silhouette (big, centered, acts as the prism) -->
  <g transform="translate(128,85) scale(0.55)">
    <polygon points="0,-68 -50,-12 -34,48 0,28 34,48 50,-12" fill="none" stroke="url(#holo66)" stroke-width="3"/>
    <polygon points="-38,-8 -58,-50 -18,-28" fill="none" stroke="url(#holo66)" stroke-width="3"/>
    <polygon points="38,-8 58,-50 18,-28" fill="none" stroke="url(#holo66)" stroke-width="3"/>
  </g>
  <!-- White beam entering wolf from left -->
  <line x1="0" y1="85" x2="90" y2="85" stroke="white" stroke-width="3" opacity="0.3"/>
  <!-- Rainbow rays exiting wolf to the right -->
  <line x1="160" y1="60" x2="252" y2="28" stroke="#EF4444" stroke-width="2.2" opacity="0.65"/>
  <line x1="162" y1="70" x2="254" y2="44" stroke="#F97316" stroke-width="2.2" opacity="0.65"/>
  <line x1="163" y1="80" x2="255" y2="62" stroke="#FBBF24" stroke-width="2.2" opacity="0.65"/>
  <line x1="164" y1="90" x2="255" y2="82" stroke="#22C55E" stroke-width="2.2" opacity="0.65"/>
  <line x1="163" y1="100" x2="255" y2="102" stroke="#3B82F6" stroke-width="2.2" opacity="0.65"/>
  <line x1="162" y1="110" x2="254" y2="122" stroke="#8B5CF6" stroke-width="2.2" opacity="0.65"/>
  <line x1="160" y1="118" x2="252" y2="140" stroke="#A855F7" stroke-width="2.2" opacity="0.65"/>
  <!-- Subtle glow on wolf -->
  <g transform="translate(128,85) scale(0.55)" filter="url(#glow66)" opacity="0.3">
    <polygon points="0,-68 -50,-12 -34,48 0,28 34,48 50,-12" fill="url(#holo66)"/>
  </g>
  <text x="128" y="186" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="700" fill="url(#holo66)" letter-spacing="5">ROMULUS</text>
  <text x="128" y="208" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#6B7280" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>