<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#FFF7ED"/>
  <!-- Stempel / Rubber Stamp Stil - Used/Worn Look -->
  <!-- Stamp circle -->
  <circle cx="128" cy="100" r="65" fill="none" stroke="#991B1B" stroke-width="3" opacity="0.75" stroke-dasharray="2 1"/>
  <circle cx="128" cy="100" r="58" fill="none" stroke="#991B1B" stroke-width="1" opacity="0.5"/>
  <!-- Stamp text around circle (top) -->
  <text x="128" y="52" text-anchor="middle" font-family="'Impact',sans-serif" font-size="10" fill="#991B1B" letter-spacing="5" opacity="0.7">★ VERIFIED ★</text>
  <!-- Wolf in center -->
  <g transform="translate(128,95) scale(0.35)" opacity="0.75">
    <polygon points="0,-65 -50,-10 -35,45 0,25 35,45 50,-10" fill="#991B1B"/>
    <polygon points="-38,-5 -58,-48 -18,-28" fill="#991B1B"/>
    <polygon points="38,-5 58,-48 18,-28" fill="#991B1B"/>
    <circle cx="-15" cy="-8" r="4" fill="#FFF7ED"/>
    <circle cx="15" cy="-8" r="4" fill="#FFF7ED"/>
  </g>
  <!-- Bottom stamp text -->
  <text x="128" y="150" text-anchor="middle" font-family="'Impact',sans-serif" font-size="10" fill="#991B1B" letter-spacing="4" opacity="0.7">ROMULUS APPROVED</text>
  <!-- Slight rotation for stamp feel -->
  <g transform="translate(128,100) rotate(-5) translate(-128,-100)" opacity="0">
    <!-- Ghost rotation layer invisible for effect idea -->
  </g>
  <!-- "Worn" marks -->
  <line x1="75" y1="75" x2="80" y2="78" stroke="#FFF7ED" stroke-width="3" opacity="0.4"/>
  <line x1="165" y1="110" x2="172" y2="112" stroke="#FFF7ED" stroke-width="2" opacity="0.3"/>

  <text x="128" y="195" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif" font-size="30" font-weight="900" fill="#991B1B" letter-spacing="4" opacity="0.85">ROMULUS</text>
  <text x="128" y="220" text-anchor="middle" font-family="'Georgia',serif" font-size="8" fill="#B91C1C" letter-spacing="3" opacity="0.6">YOUR COLLECTION, PERFECTED.</text>
</svg>