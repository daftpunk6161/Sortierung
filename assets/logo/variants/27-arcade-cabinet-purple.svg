<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#18181B"/>
  <!-- Arcade Cabinet Stil -->
  <!-- Cabinet body -->
  <rect x="55" y="25" width="146" height="170" rx="6" fill="#27272A" stroke="#A855F7" stroke-width="1"/>
  <!-- Screen area -->
  <rect x="65" y="35" width="126" height="90" rx="4" fill="#0F0A1A"/>
  <!-- Screen glow -->
  <rect x="65" y="35" width="126" height="90" rx="4" fill="none" stroke="#A855F7" stroke-width="0.5" opacity="0.5"/>
  <!-- Marquee top (the lit sign) -->
  <rect x="55" y="15" width="146" height="16" rx="3" fill="#7C3AED"/>
  <text x="128" y="27" text-anchor="middle" font-family="'Impact',sans-serif" font-size="11" fill="#FDE047" letter-spacing="3">★ ROMULUS ★</text>
  <!-- Wolf on screen (simple arcade sprite) -->
  <g transform="translate(128,72)" fill="#A855F7">
    <rect x="-16" y="-20" width="4" height="4"/>
    <rect x="12" y="-20" width="4" height="4"/>
    <rect x="-12" y="-16" width="4" height="4"/>
    <rect x="8" y="-16" width="4" height="4"/>
    <rect x="-12" y="-12" width="24" height="4"/>
    <rect x="-8" y="-8" width="16" height="4"/>
    <rect x="-8" y="-4" width="16" height="4" fill="#C084FC"/>
    <rect x="-4" y="0" width="8" height="4" fill="#8B5CF6"/>
    <!-- Eyes on sprite -->
    <rect x="-8" y="-12" width="4" height="4" fill="#FDE047"/>
    <rect x="4" y="-12" width="4" height="4" fill="#FDE047"/>
  </g>
  <!-- Score text -->
  <text x="128" y="108" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#A855F7">HI-SCORE: 999999</text>
  <text x="128" y="118" text-anchor="middle" font-family="'Courier New',monospace" font-size="6" fill="#6D28D9">INSERT COIN</text>
  <!-- Joystick area -->
  <circle cx="100" cy="155" r="8" fill="#3F3F46" stroke="#52525B" stroke-width="1"/>
  <circle cx="100" cy="155" r="4" fill="#52525B"/>
  <!-- Buttons -->
  <circle cx="140" cy="150" r="6" fill="#EF4444"/>
  <circle cx="155" cy="148" r="6" fill="#3B82F6"/>
  <circle cx="170" cy="150" r="6" fill="#FDE047"/>
  <!-- Coin slot -->
  <rect x="118" y="175" width="20" height="3" rx="1" fill="#52525B"/>
  <text x="128" y="220" text-anchor="middle" font-family="'Impact',sans-serif" font-size="24" font-weight="700" fill="#A855F7" letter-spacing="4">ROMULUS</text>
  <text x="128" y="240" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#6D28D9" letter-spacing="2">YOUR COLLECTION, PERFECTED.</text>
</svg>