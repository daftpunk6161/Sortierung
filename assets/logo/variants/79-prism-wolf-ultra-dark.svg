  <line x1="184" y1="95" x2="255" y2="68" stroke="#F97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="186" y1="105" x2="255" y2="86" stroke="#FBBF24" stroke-width="1.5" opacity="0.5"/>
  <line x1="188" y1="115" x2="255" y2="104" stroke="#22C55E" stroke-width="1.5" opacity="0.5"/>
  <line x1="189" y1="125" x2="255" y2="122" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
  <line x1="190" y1="135" x2="254" y2="140" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>
