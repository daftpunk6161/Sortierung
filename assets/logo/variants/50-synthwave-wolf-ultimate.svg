<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="synthPurple50" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B21A8"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="#0A0118"/>
  <!-- #50 - The Ultimate: Synthwave Wolf + Grid + Moon — das Beste vereint -->
  <!-- Grid floor -->
  <g opacity="0.2" stroke="#8B5CF6" stroke-width="0.5">
    <line x1="0" y1="175" x2="256" y2="175"/>
    <line x1="0" y1="195" x2="256" y2="195"/>
    <line x1="0" y1="220" x2="256" y2="220"/>
    <line x1="0" y1="250" x2="256" y2="250"/>
    <!-- Perspective verticals -->
    <line x1="128" y1="175" x2="128" y2="256"/>
    <line x1="128" y1="175" x2="0" y2="256"/>
    <line x1="128" y1="175" x2="256" y2="256"/>
    <line x1="128" y1="175" x2="40" y2="256"/>
    <line x1="128" y1="175" x2="216" y2="256"/>
    <line x1="128" y1="175" x2="80" y2="256"/>
    <line x1="128" y1="175" x2="176" y2="256"/>
  </g>
  <!-- Moon/Sun gradient circle -->
  <circle cx="128" cy="90" r="55" fill="#6B21A8" opacity="0.3"/>
  <circle cx="128" cy="90" r="45" fill="#7C3AED" opacity="0.3"/>
  <circle cx="128" cy="90" r="35" fill="#8B5CF6" opacity="0.3"/>
  <!-- Horizontal sunset stripes -->
  <rect x="73" y="88" width="110" height="2" fill="#0A0118" opacity="0.4"/>
  <rect x="73" y="96" width="110" height="3" fill="#0A0118" opacity="0.4"/>
  <rect x="73" y="106" width="110" height="4" fill="#0A0118" opacity="0.4"/>
  <rect x="73" y="118" width="110" height="6" fill="#0A0118" opacity="0.4"/>
  <!-- Wolf silhouette centered in circle -->
  <g transform="translate(128,85) scale(0.45)">
    <!-- Head -->
    <polygon points="0,-72 -52,-15 -36,48 0,26 36,48 52,-15" fill="#0A0118"/>
    <!-- Ears -->
    <polygon points="-40,-10 -58,-52 -18,-30" fill="#0A0118"/>
    <polygon points="40,-10 58,-52 18,-30" fill="#0A0118"/>
    <!-- Eyes glow -->
    <circle cx="-16" cy="-6" r="4" fill="#06B6D4"/>
    <circle cx="16" cy="-6" r="4" fill="#06B6D4"/>
    <!-- Eye glow aura -->
    <circle cx="-16" cy="-6" r="8" fill="#06B6D4" opacity="0.15"/>
    <circle cx="16" cy="-6" r="8" fill="#06B6D4" opacity="0.15"/>
  </g>
  <!-- Stars -->
  <circle cx="40" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="200" cy="25" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="70" cy="55" r="0.6" fill="white" opacity="0.3"/>
  <circle cx="210" cy="60" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="30" cy="100" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="228" cy="95" r="0.7" fill="white" opacity="0.3"/>
  <!-- Title -->
  <text x="128" y="165" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="30" font-weight="800" fill="url(#synthPurple50)" letter-spacing="6">ROMULUS</text>
  <text x="128" y="185" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#06B6D4" opacity="0.6" letter-spacing="4">YOUR COLLECTION, PERFECTED.</text>
</svg>