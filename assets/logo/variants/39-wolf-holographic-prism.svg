<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="holographic39" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="25%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="75%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="#18181B"/>
  <!-- Holographic / Prisma-Effekt -->
  <!-- Prism triangle -->
  <polygon points="128,35 75,140 181,140" fill="none" stroke="url(#holographic39)" stroke-width="2"/>
  <!-- Inner prism glow -->
  <polygon points="128,50 85,130 171,130" fill="none" stroke="url(#holographic39)" stroke-width="0.5" opacity="0.3"/>
  <!-- Rainbow spectrum rays from prism right side -->
  <line x1="170" y1="110" x2="230" y2="80" stroke="#EF4444" stroke-width="1.5" opacity="0.6"/>
  <line x1="172" y1="115" x2="232" y2="90" stroke="#F97316" stroke-width="1.5" opacity="0.6"/>
  <line x1="174" y1="120" x2="234" y2="100" stroke="#FDE047" stroke-width="1.5" opacity="0.6"/>
  <line x1="175" y1="125" x2="235" y2="110" stroke="#22C55E" stroke-width="1.5" opacity="0.6"/>
  <line x1="177" y1="130" x2="235" y2="120" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
  <line x1="178" y1="133" x2="234" y2="128" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
  <!-- White beam entering from left -->
  <line x1="20" y1="100" x2="88" y2="110" stroke="white" stroke-width="2" opacity="0.5"/>
  <!-- Wolf silhouette inside prism -->
  <g transform="translate(128,95) scale(0.2)" opacity="0.7">
    <polygon points="0,-55 -35,-5 -22,35 0,18 22,35 35,-5" fill="white"/>
    <polygon points="-28,-3 -42,-38 -12,-20" fill="white"/>
    <polygon points="28,-3 42,-38 12,-20" fill="white"/>
  </g>
  <text x="128" y="178" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="600" fill="url(#holographic39)" letter-spacing="5">ROMULUS</text>
  <text x="128" y="202" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#6B7280" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>