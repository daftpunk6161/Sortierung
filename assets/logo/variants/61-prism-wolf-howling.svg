<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="holo61" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="25%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="75%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="glow61">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="32" fill="#08080F"/>
  <!-- Double prism — outer glow -->
  <polygon points="128,22 52,152 204,152" fill="none" stroke="url(#holo61)" stroke-width="1.5" opacity="0.25" filter="url(#glow61)"/>
  <!-- Inner prism — sharp -->
  <polygon points="128,32 62,148 194,148" fill="none" stroke="url(#holo61)" stroke-width="2.5"/>
  <!-- White beam -->
  <line x1="0" y1="100" x2="76" y2="100" stroke="white" stroke-width="2.5" opacity="0.3"/>
  <!-- Wide rainbow spray (7 rays) -->
  <line x1="182" y1="82" x2="255" y2="35" stroke="#EF4444" stroke-width="2.4" opacity="0.7"/>
  <line x1="184" y1="92" x2="255" y2="55" stroke="#F97316" stroke-width="2.4" opacity="0.7"/>
  <line x1="186" y1="102" x2="255" y2="75" stroke="#FBBF24" stroke-width="2.4" opacity="0.7"/>
  <line x1="188" y1="112" x2="255" y2="95" stroke="#22C55E" stroke-width="2.4" opacity="0.7"/>
  <line x1="189" y1="122" x2="255" y2="115" stroke="#06B6D4" stroke-width="2.4" opacity="0.7"/>
  <line x1="190" y1="132" x2="255" y2="135" stroke="#3B82F6" stroke-width="2.4" opacity="0.7"/>
  <line x1="191" y1="142" x2="254" y2="155" stroke="#8B5CF6" stroke-width="2.4" opacity="0.7"/>
  <!-- Wolf — howling pose, big -->
  <g transform="translate(128,90) scale(0.44)">
    <!-- Body -->
    <polygon points="0,-72 -48,-14 -36,50 0,30 36,50 48,-14" fill="white" opacity="0.9"/>
    <!-- Ears -->
    <polygon points="-36,-10 -60,-58 -16,-30" fill="white" opacity="0.9"/>
    <polygon points="36,-10 60,-58 16,-30" fill="white" opacity="0.9"/>
    <!-- Howling snout protruding up -->
    <polygon points="0,-72 -8,-86 0,-98 8,-86" fill="white" opacity="0.9"/>
  </g>
  <text x="128" y="186" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="700" fill="url(#holo61)" letter-spacing="6">ROMULUS</text>
  <text x="128" y="208" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#6B7280" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>