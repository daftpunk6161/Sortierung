<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#1E293B"/>
  <!-- Wolf im Kreis — striktes Logo-Style (wie Discord/Slack Icons) -->
  <!-- Circle badge -->
  <circle cx="128" cy="95" r="60" fill="#6366F1"/>
  <!-- Wolf mark (white silhouette, modern) -->
  <g transform="translate(128,90) scale(0.42)">
    <!-- Head -->
    <polygon points="0,-75 -55,-18 -38,50 0,28 38,50 55,-18" fill="white"/>
    <!-- Ears -->
    <polygon points="-42,-14 -60,-55 -18,-32" fill="white"/>
    <polygon points="42,-14 60,-55 18,-32" fill="white"/>
    <!-- Eyes (negative space) -->
    <circle cx="-16" cy="-8" r="6" fill="#6366F1"/>
    <circle cx="16" cy="-8" r="6" fill="#6366F1"/>
    <!-- Nose (negative space) -->
    <polygon points="0,8 -5,18 5,18" fill="#6366F1"/>
  </g>
  <text x="128" y="178" text-anchor="middle" font-family="'Segoe UI','SF Pro',sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="3">romulus</text>
  <text x="128" y="202" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#94A3B8" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>