<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#022C22"/>
  <!-- CRT / Retro Monitor Stil -->
  <!-- Monitor frame -->
  <rect x="38" y="30" width="180" height="140" rx="8" fill="#064E3B" stroke="#10B981" stroke-width="1"/>
  <rect x="45" y="37" width="166" height="126" rx="4" fill="#011E18"/>
  <!-- Scan lines over screen -->
  <g opacity="0.08">
    <line x1="45" y1="40" x2="211" y2="40" stroke="#10B981" stroke-width="1"/>
    <line x1="45" y1="44" x2="211" y2="44" stroke="#10B981" stroke-width="1"/>
    <line x1="45" y1="48" x2="211" y2="48" stroke="#10B981" stroke-width="1"/>
    <line x1="45" y1="52" x2="211" y2="52" stroke="#10B981" stroke-width="1"/>
    <line x1="45" y1="56" x2="211" y2="56" stroke="#10B981" stroke-width="1"/>
    <line x1="45" y1="60" x2="211" y2="60" stroke="#10B981" stroke-width="1"/>
    <line x1="45" y1="64" x2="211" y2="64" stroke="#10B981" stroke-width="1"/>
  </g>
  <!-- Wolf face on screen (ASCII art style via simple shapes) -->
  <g transform="translate(128,85)" fill="#10B981">
    <!-- Wolf pixel art on CRT -->
    <rect x="-25" y="-30" width="5" height="5"/>
    <rect x="20" y="-30" width="5" height="5"/>
    <rect x="-20" y="-25" width="5" height="5"/>
    <rect x="15" y="-25" width="5" height="5"/>
    <rect x="-30" y="-35" width="5" height="10"/>
    <rect x="25" y="-35" width="5" height="10"/>
    <rect x="-25" y="-20" width="50" height="5"/>
    <rect x="-20" y="-15" width="40" height="5"/>
    <rect x="-15" y="-10" width="30" height="5"/>
    <rect x="-10" y="-5" width="20" height="5"/>
    <!-- Eyes -->
    <rect x="-15" y="-15" width="5" height="5" fill="#FDE047"/>
    <rect x="10" y="-15" width="5" height="5" fill="#FDE047"/>
    <!-- Nose -->
    <rect x="-2" y="-5" width="5" height="3" fill="#34D399"/>
  </g>
  <!-- Terminal text on screen -->
  <text x="128" y="132" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#10B981">C:\&gt; romulus --scan</text>
  <text x="128" y="146" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#34D399" opacity="0.7">■ Collection sorted.</text>
  <!-- Monitor stand -->
  <rect x="108" y="170" width="40" height="8" fill="#064E3B"/>
  <rect x="98" y="178" width="60" height="4" rx="2" fill="#064E3B"/>
  <text x="128" y="210" text-anchor="middle" font-family="'Courier New',monospace" font-size="22" font-weight="700" fill="#10B981" letter-spacing="4">ROMULUS</text>
  <text x="128" y="232" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#065F46" letter-spacing="3">YOUR COLLECTION, PERFECTED.</text>
</svg>