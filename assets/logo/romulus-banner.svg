<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="holoBanner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="33%" stop-color="#8B5CF6"/>
      <stop offset="66%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <!-- Subtle grid pattern for tech feel -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1280" height="640" rx="0" fill="#0F0F11"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <!-- Subtle bottom glow -->
  <ellipse cx="640" cy="640" rx="500" ry="200" fill="#8B5CF6" opacity="0.04"/>

  <!-- === LEFT SIDE: Wolf Logo (~400px area) === -->
  <g transform="translate(280,280)">
    <!-- Prism -->
    <polygon points="0,-140 -120,100 120,100" fill="none" stroke="url(#holoBanner)" stroke-width="2.5" opacity="0.8"/>
    <!-- Right rays -->
    <line x1="90" y1="30" x2="200" y2="-20" stroke="#EF4444" stroke-width="2.2" opacity="0.45"/>
    <line x1="95" y1="42" x2="205" y2="0" stroke="#F97316" stroke-width="2.2" opacity="0.45"/>
    <line x1="100" y1="54" x2="210" y2="20" stroke="#FDE047" stroke-width="2.2" opacity="0.45"/>
    <line x1="104" y1="66" x2="213" y2="40" stroke="#22C55E" stroke-width="2.2" opacity="0.45"/>
    <line x1="107" y1="78" x2="215" y2="60" stroke="#3B82F6" stroke-width="2.2" opacity="0.45"/>
    <!-- Left rays -->
    <line x1="-90" y1="30" x2="-200" y2="-20" stroke="#8B5CF6" stroke-width="2.2" opacity="0.45"/>
    <line x1="-95" y1="42" x2="-205" y2="0" stroke="#3B82F6" stroke-width="2.2" opacity="0.45"/>
    <line x1="-100" y1="54" x2="-210" y2="20" stroke="#22C55E" stroke-width="2.2" opacity="0.45"/>
    <line x1="-104" y1="66" x2="-213" y2="40" stroke="#FDE047" stroke-width="2.2" opacity="0.45"/>
    <line x1="-107" y1="78" x2="-215" y2="60" stroke="#F97316" stroke-width="2.2" opacity="0.45"/>
    <!-- Wolf — outline only, centered in prism -->
    <g transform="translate(0,10) scale(0.95)">
      <polygon points="0,-68 -50,-12 -34,48 0,28 34,48 50,-12" fill="none" stroke="url(#holoBanner)" stroke-width="2.5"/>
      <polygon points="-38,-8 -58,-50 -18,-28" fill="none" stroke="url(#holoBanner)" stroke-width="2.5"/>
      <polygon points="38,-8 58,-50 18,-28" fill="none" stroke="url(#holoBanner)" stroke-width="2.5"/>
      <circle cx="-14" cy="-4" r="4" fill="#06B6D4"/>
      <circle cx="14" cy="-4" r="4" fill="#EC4899"/>
    </g>
  </g>

  <!-- === RIGHT SIDE: Text === -->
  <!-- ROMULUS -->
  <text x="740" y="290" font-family="'Segoe UI',sans-serif" font-size="96" font-weight="700" fill="url(#textGrad)" letter-spacing="12">ROMULUS</text>
  <!-- Tagline -->
  <text x="744" y="340" font-family="'Segoe UI',sans-serif" font-size="22" fill="#6B7280" letter-spacing="6">YOUR COLLECTION, PERFECTED.</text>
  <!-- Feature pills -->
  <g font-family="'Segoe UI',sans-serif" font-size="14" letter-spacing="1.5">
    <rect x="740" y="370" width="120" height="28" rx="14" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.5"/>
    <text x="800" y="389" text-anchor="middle" fill="#06B6D4" opacity="0.7">DEDUPE</text>
    <rect x="872" y="370" width="80" height="28" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
    <text x="912" y="389" text-anchor="middle" fill="#8B5CF6" opacity="0.7">SORT</text>
    <rect x="964" y="370" width="110" height="28" rx="14" fill="none" stroke="#EC4899" stroke-width="1" opacity="0.5"/>
    <text x="1019" y="389" text-anchor="middle" fill="#EC4899" opacity="0.7">CONVERT</text>
    <rect x="1086" y="370" width="100" height="28" rx="14" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
    <text x="1136" y="389" text-anchor="middle" fill="#F59E0B" opacity="0.7">VERIFY</text>
  </g>
  <!-- Version hint -->
  <text x="744" y="440" font-family="'Segoe UI',sans-serif" font-size="13" fill="#4B5563" letter-spacing="2">.NET 10 · GUI · CLI · API</text>
</svg>
