<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0118; color: #E5E7EB; font-family: 'Segoe UI', sans-serif; padding: 2rem; }
  h1 { text-align: center; font-size: 2.5rem; font-weight: 200; letter-spacing: 0.5rem; color: #A78BFA; margin-bottom: 0.5rem; }
  .subtitle { text-align: center; font-size: 0.9rem; color: #6B7280; margin-bottom: 2rem; letter-spacing: 0.2rem; }
  .filters { text-align: center; margin-bottom: 2rem; display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
  .filters button { background: #1E1B4B; color: #A78BFA; border: 1px solid #312E81; padding: 0.4rem 1rem; border-radius: 999px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
  .filters button:hover, .filters button.active { background: #6B21A8; color: white; border-color: #6B21A8; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; max-width: 1600px; margin: 0 auto; }
  .card { background: #1C1917; border-radius: 16px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; border: 1px solid transparent; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(139, 92, 246, 0.2); border-color: #6B21A8; }
  .card.selected { border: 2px solid #06B6D4; box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
  .card img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #111; display: block; }
  .card-info { padding: 0.75rem 1rem; }
  .card-info .num { color: #6B7280; font-size: 0.75rem; font-family: 'Courier New', monospace; }
  .card-info .name { color: #E5E7EB; font-size: 0.9rem; font-weight: 600; margin-top: 0.2rem; }
  .card-info .tags { margin-top: 0.4rem; display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .card-info .tag { background: #27272A; color: #9CA3AF; font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 999px; }
  .selection-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1E1B4B; padding: 1rem 2rem; display: none; align-items: center; justify-content: space-between; border-top: 1px solid #312E81; z-index: 100; }
  .selection-bar.visible { display: flex; }
  .selection-bar .count { color: #06B6D4; font-weight: 700; }
  .selection-bar .selected-list { color: #A78BFA; font-size: 0.85rem; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .selection-bar button { background: #06B6D4; color: #0A0118; border: none; padding: 0.5rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 700; }
  footer { text-align: center; margin-top: 3rem; padding-bottom: 4rem; color: #4B5563; font-size: 0.8rem; }
</style>

  <button onclick="filterTag('objekt')">Objekte</button>

<div class="grid" id="gallery"></div>

const selected = new Set();
let activeFilter = null;

function render() {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";
  const filtered = activeFilter ? variants.filter(v => v.tags.includes(activeFilter)) : variants;
  filtered.forEach(v => {
    const card = document.createElement("div");
    card.className = "card" + (selected.has(v.num) ? " selected" : "");
    card.dataset.num = v.num;
    card.onclick = () => toggleSelect(v.num);
    card.innerHTML = `
      <img src="variants/${v.file}" alt="${v.name}" loading="lazy">
      <div class="card-info">
        <div class="num">#${v.num}</div>
        <div class="name">${v.name}</div>
        <div class="tags">${v.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      </div>
    `;
    gallery.appendChild(card);
  });
  updateSelectionBar();
}

function toggleSelect(num) {
  if (selected.has(num)) selected.delete(num); else selected.add(num);
  render();
}

function clearSelection() {
  selected.clear();
  render();
}

function updateSelectionBar() {
  const bar = document.getElementById("selectionBar");
  const count = document.getElementById("selCount");
  const list = document.getElementById("selList");
  if (selected.size > 0) {
    bar.classList.add("visible");
    count.textContent = selected.size;
    const names = [...selected].sort().map(n => {
      const v = variants.find(x => x.num === n);
      return `#${n} ${v ? v.name : ""}`;
    });
    list.textContent = names.join(" · ");
  } else {
    bar.classList.remove("visible");
  }
}

function filterAll() {
  activeFilter = null;
  document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
  document.querySelector(".filters button").classList.add("active");
  render();
}

function filterTag(tag) {
  activeFilter = tag;
  document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

render();
</script>
