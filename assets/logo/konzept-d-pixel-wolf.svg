<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="gD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B21A8"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gDtext" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="#0F0A1A"/>
  <!-- Subtle grid background -->
  <g opacity="0.04" stroke="#06B6D4" stroke-width="0.5">
    <line x1="0" y1="16" x2="256" y2="16"/><line x1="0" y1="32" x2="256" y2="32"/>
    <line x1="0" y1="48" x2="256" y2="48"/><line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="80" x2="256" y2="80"/><line x1="0" y1="96" x2="256" y2="96"/>
    <line x1="0" y1="112" x2="256" y2="112"/><line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="144" x2="256" y2="144"/><line x1="0" y1="160" x2="256" y2="160"/>
    <line x1="0" y1="176" x2="256" y2="176"/><line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="16" y1="0" x2="16" y2="256"/><line x1="32" y1="0" x2="32" y2="256"/>
    <line x1="48" y1="0" x2="48" y2="256"/><line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="80" y1="0" x2="80" y2="256"/><line x1="96" y1="0" x2="96" y2="256"/>
    <line x1="112" y1="0" x2="112" y2="256"/><line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="144" y1="0" x2="144" y2="256"/><line x1="160" y1="0" x2="160" y2="256"/>
    <line x1="176" y1="0" x2="176" y2="256"/><line x1="192" y1="0" x2="192" y2="256"/>
    <line x1="208" y1="0" x2="208" y2="256"/><line x1="224" y1="0" x2="224" y2="256"/>
    <line x1="240" y1="0" x2="240" y2="256"/>
  </g>
  <!-- 16x16 pixel grid wolf face, each pixel = 12px, offset to center -->
  <g transform="translate(32,16)">
    <!-- Row 0: ear tips -->
    <rect x="12" y="0" width="12" height="12" fill="#6B21A8" opacity="0.7"/>
    <rect x="168" y="0" width="12" height="12" fill="#6B21A8" opacity="0.7"/>
    <!-- Row 1: ears -->
    <rect x="12" y="12" width="12" height="12" fill="#7C3AED"/>
    <rect x="24" y="12" width="12" height="12" fill="#7C3AED" opacity="0.8"/>
    <rect x="156" y="12" width="12" height="12" fill="#7C3AED" opacity="0.8"/>
    <rect x="168" y="12" width="12" height="12" fill="#7C3AED"/>
    <!-- Row 2: ears growing -->
    <rect x="24" y="24" width="12" height="12" fill="#8B5CF6"/>
    <rect x="36" y="24" width="12" height="12" fill="#8B5CF6" opacity="0.9"/>
    <rect x="144" y="24" width="12" height="12" fill="#8B5CF6" opacity="0.9"/>
    <rect x="156" y="24" width="12" height="12" fill="#8B5CF6"/>
    <!-- Row 3: ears meet head -->
    <rect x="24" y="36" width="12" height="12" fill="#9333EA"/>
    <rect x="36" y="36" width="12" height="12" fill="#9333EA"/>
    <rect x="48" y="36" width="12" height="12" fill="#9333EA" opacity="0.8"/>
    <rect x="132" y="36" width="12" height="12" fill="#9333EA" opacity="0.8"/>
    <rect x="144" y="36" width="12" height="12" fill="#9333EA"/>
    <rect x="156" y="36" width="12" height="12" fill="#9333EA"/>
    <!-- Row 4: head top -->
    <rect x="36" y="48" width="12" height="12" fill="#7C3AED"/>
    <rect x="48" y="48" width="12" height="12" fill="#7C3AED"/>
    <rect x="60" y="48" width="12" height="12" fill="#8B5CF6"/>
    <rect x="72" y="48" width="12" height="12" fill="#8B5CF6"/>
    <rect x="84" y="48" width="12" height="12" fill="#8B5CF6"/>
    <rect x="96" y="48" width="12" height="12" fill="#8B5CF6"/>
    <rect x="108" y="48" width="12" height="12" fill="#8B5CF6"/>
    <rect x="120" y="48" width="12" height="12" fill="#7C3AED"/>
    <rect x="132" y="48" width="12" height="12" fill="#7C3AED"/>
    <rect x="144" y="48" width="12" height="12" fill="#7C3AED"/>
    <!-- Row 5: eye row -->
    <rect x="36" y="60" width="12" height="12" fill="#6B21A8"/>
    <rect x="48" y="60" width="12" height="12" fill="#6B21A8"/>
    <rect x="60" y="60" width="12" height="12" fill="#06B6D4"/><!-- L eye -->
    <rect x="72" y="60" width="12" height="12" fill="#06B6D4"/><!-- L eye -->
    <rect x="84" y="60" width="12" height="12" fill="#6B21A8"/>
    <rect x="96" y="60" width="12" height="12" fill="#6B21A8"/>
    <rect x="108" y="60" width="12" height="12" fill="#06B6D4"/><!-- R eye -->
    <rect x="120" y="60" width="12" height="12" fill="#06B6D4"/><!-- R eye -->
    <rect x="132" y="60" width="12" height="12" fill="#6B21A8"/>
    <rect x="144" y="60" width="12" height="12" fill="#6B21A8"/>
    <!-- Row 6: below eyes -->
    <rect x="36" y="72" width="12" height="12" fill="#7C3AED"/>
    <rect x="48" y="72" width="12" height="12" fill="#6B21A8"/>
    <rect x="60" y="72" width="12" height="12" fill="#7C3AED"/>
    <rect x="72" y="72" width="12" height="12" fill="#7C3AED"/>
    <rect x="84" y="72" width="12" height="12" fill="#6B21A8"/>
    <rect x="96" y="72" width="12" height="12" fill="#7C3AED"/>
    <rect x="108" y="72" width="12" height="12" fill="#7C3AED"/>
    <rect x="120" y="72" width="12" height="12" fill="#6B21A8"/>
    <rect x="132" y="72" width="12" height="12" fill="#7C3AED"/>
    <rect x="144" y="72" width="12" height="12" fill="#7C3AED"/>
    <!-- Row 7: snout -->
    <rect x="48" y="84" width="12" height="12" fill="#8B5CF6"/>
    <rect x="60" y="84" width="12" height="12" fill="#7C3AED"/>
    <rect x="72" y="84" width="12" height="12" fill="#7C3AED"/>
    <rect x="84" y="84" width="12" height="12" fill="#4C1D95"/><!-- nose -->
    <rect x="96" y="84" width="12" height="12" fill="#4C1D95"/><!-- nose -->
    <rect x="108" y="84" width="12" height="12" fill="#7C3AED"/>
    <rect x="120" y="84" width="12" height="12" fill="#7C3AED"/>
    <rect x="132" y="84" width="12" height="12" fill="#8B5CF6"/>
    <!-- Row 8: lower snout -->
    <rect x="60" y="96" width="12" height="12" fill="#6B21A8"/>
    <rect x="72" y="96" width="12" height="12" fill="#7C3AED"/>
    <rect x="84" y="96" width="12" height="12" fill="#6B21A8"/>
    <rect x="96" y="96" width="12" height="12" fill="#6B21A8"/>
    <rect x="108" y="96" width="12" height="12" fill="#7C3AED"/>
    <rect x="120" y="96" width="12" height="12" fill="#6B21A8"/>
    <!-- Row 9: jaw with fangs -->
    <rect x="60" y="108" width="12" height="12" fill="#9333EA" opacity="0.8"/>
    <rect x="72" y="108" width="12" height="12" fill="white" opacity="0.35"/><!-- fang -->
    <rect x="84" y="108" width="12" height="12" fill="#9333EA"/>
    <rect x="96" y="108" width="12" height="12" fill="#9333EA"/>
    <rect x="108" y="108" width="12" height="12" fill="white" opacity="0.35"/><!-- fang -->
    <rect x="120" y="108" width="12" height="12" fill="#9333EA" opacity="0.8"/>
    <!-- Row 10: chin -->
    <rect x="72" y="120" width="12" height="12" fill="#6B21A8" opacity="0.5"/>
    <rect x="84" y="120" width="12" height="12" fill="#6B21A8" opacity="0.6"/>
    <rect x="96" y="120" width="12" height="12" fill="#6B21A8" opacity="0.6"/>
    <rect x="108" y="120" width="12" height="12" fill="#6B21A8" opacity="0.5"/>
  </g>
  <!-- ROMULUS text in pixel/mono font -->
  <text x="128" y="178" text-anchor="middle" font-family="'Consolas', 'Courier New', monospace" font-size="28" font-weight="700" fill="url(#gDtext)" letter-spacing="5">ROMULUS</text>
  <!-- Tagline -->
  <text x="128" y="200" text-anchor="middle" font-family="'Consolas', 'Courier New', monospace" font-size="9" font-weight="400" fill="#06B6D4" letter-spacing="2" opacity="0.5">YOUR COLLECTION, PERFECTED.</text>
  <!-- Decorative pixel corners -->
  <rect x="16" y="216" width="4" height="4" fill="#6B21A8" opacity="0.3"/>
  <rect x="22" y="216" width="4" height="4" fill="#06B6D4" opacity="0.2"/>
  <rect x="16" y="222" width="4" height="4" fill="#06B6D4" opacity="0.2"/>
  <rect x="236" y="216" width="4" height="4" fill="#6B21A8" opacity="0.3"/>
  <rect x="230" y="216" width="4" height="4" fill="#06B6D4" opacity="0.2"/>
  <rect x="236" y="222" width="4" height="4" fill="#06B6D4" opacity="0.2"/>
</svg>
