      location: src/Romulus.Infrastructure/Sorting/ConsoleSorter.cs
      relationship_to_domain: "File routing"
    - component: DeduplicationEngine
      responsibility: "Groups by GameKey, selects winner via multi-criteria sort"
      location: src/Romulus.Core/Deduplication/DeduplicationEngine.cs
      relationship_to_domain: "Dedup logic"

  data_flow_involving_domain: |
    File → Scan → [EnrichmentPipelinePhase]
      → Pre-detect DAT lookup (LookupDat with UNKNOWN console)
        → 5-stage hash: archive→headerless→container→chd→name
      → If DAT miss: Detection (ConsoleDetector.DetectWithConfidence)
        → 7 methods generate hypotheses
        → HypothesisResolver aggregates → ConsoleDetectionResult
      → Post-detect DAT lookup (with detected console hint)
      → DecisionResolver.Resolve (tier, conflict, confidence, datAvailable)
      → FamilyPipelineSelector.Apply (cross-family gate, arcade gate)
      → CandidateFactory.Create → RomCandidate
    → [DeduplicatePipelinePhase]
      → Group by ConsoleKey+GameKey → SelectWinner
    → [ConsoleSorter]
      → Route to Sort/Review/Blocked/Unknown folders

