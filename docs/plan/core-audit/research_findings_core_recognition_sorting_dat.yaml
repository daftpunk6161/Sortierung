    type: decision_blocker
    affects: ["enrichment-phase", "decision-resolver"]

  - question: "Soll SortDecision als Enum eliminiert und durch DecisionClass ersetzt werden?"
    context: "Beide Enums sind semantisch identisch, haben aber unterschiedliche Ordinalwerte, was Verwirrung stiftet."
    type: research
    affects: ["contracts", "all-consumers"]

  - question: "Warum hat FolderName einen SingleSourceCap von 80 statt 55?"
    context: "FolderName ConfidenceRating=45 aber SingleSourceCap=80. Zusammen mit MultiSourceBonus kann Folder+Keyword Sort erreichen."
    type: decision_blocker
    affects: ["hypothesis-resolver"]

