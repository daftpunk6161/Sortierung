plan_id: core-audit-2026-04-18
objective: "Full Core Audit of Recognition, Sorting and DAT Matching – Root-Cause Investigation"
focus_area: "Detection, DAT-Matching, Sorting, Decision Logic, Determinism"
created_at: "2026-04-18T00:00:00Z"
created_by: "gem-researcher"
status: completed

tldr: |
  - Das Erkennungs- und Sortierherz von Romulus ist NICHT grundlegend kaputt, sondern architektonisch korrekt angelegt mit DAT-first, tiered Evidence, family-based Strategies und deterministischem Tie-Breaking.
  - Es gibt jedoch 9 konkrete Designfehler und Lücken, von denen 3 release-kritisch sind (P1): DatNameOnlyMatch confidence=85 auf SortThreshold-Grenze, ConsoleSorter null-SortDecision→Sort Silent Fallback, und String-basiertes Routing statt typsicherer Enums.
  - Die Dual-Enum-Architektur (SortDecision + DecisionClass) mit unterschiedlichen Ordinalwerten ist eine Altlast, die Verwirrung stiftet.
  - Das System hat 300+ Tests, 7692 Benchmark-Entries, und klare Quality Gates – aber es fehlen kritische Integrationstests für die DAT+Detection-Interaktion.
  - Gesamturteil: Rettbar durch gezielte Refactors, KEINE Neuaufsetzung nötig. Aber die 3 P1-Findings müssen VOR Release behoben werden.

