patterns_found:
  - category: architecture
    pattern: "DAT-first with detection fallback"
    description: "Pipeline tries DAT hash match before running detection. Detection only runs when DAT misses."
    examples:
      - file: EnrichmentPipelinePhase.cs
        location: "line 211-265"
        snippet: "Pre-detect DAT → if miss → Detection → Post-detect DAT retry"
    prevalence: common

  - category: architecture
    pattern: "Evidence tier gating"
    description: "5 tiers (Tier0-4) with strict decision rules. Tier3+ never reaches Sort."
    examples:
      - file: DecisionResolver.cs
        location: "line 51-76"
        snippet: "Tier0→DatVerified, Tier1→Sort(if hard+noConflict), Tier2→Review, Tier3→Blocked, Tier4→Unknown"
    prevalence: common

  - category: architecture
    pattern: "Family-based DAT strategies"
    description: "6 platform families with distinct hash strategies and policies"
    examples:
      - file: FamilyDatStrategyResolver.cs
        location: "line 10-18"
        snippet: "CartridgeDatStrategy, DiscDatStrategy, ArcadeDatStrategy, ComputerDatStrategy, HybridDatStrategy, FolderDatStrategy"
    prevalence: common

  - category: architecture
    pattern: "Dual-enum decision model"
    description: "SortDecision and DecisionClass are semantically identical with different ordinals"
    examples:
      - file: DecisionClass.cs
        location: "line 40-57"
        snippet: "ToSortDecision()/ToDecisionClass() bidirectional conversion"
    prevalence: common

  - category: error_handling
    pattern: "String-based routing in ConsoleSorter"
    description: "Decision routing uses Dictionary<string,string> instead of typed enums"
    examples:
      - file: ConsoleSorter.cs
        location: "line 133-134"
        snippet: "enrichedSortDecisions.TryGetValue(filePath, out var sd) ? sd : null"
    prevalence: occasional

  - category: naming
    pattern: "Confidence value confusion"
    description: "DetectionSource enum values differ from ConfidenceRating() and SingleSourceCap()"
    examples:
      - file: DetectionHypothesis.cs
        location: "line 23-80 vs 128-155"
        snippet: "FolderName=85 (enum), ConfidenceRating=45, SingleSourceCap=80"
    prevalence: common

