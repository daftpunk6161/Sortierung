  - file: DatAuditClassifier.cs
    path: src/Romulus.Core/Audit/DatAuditClassifier.cs
    purpose: "Pure domain logic for classifying a ROM's DAT audit status. No I/O dependencies."
    key_elements:
      - element: "ClassifyFull(hash, headerlessHash, actualFileName, consoleKey, datIndex)"
        type: function
        location: "DatAuditClassifier.cs:24"
        description: |
          Main entry point. Two-pass strategy:
          1. Try headerlessHash first → if Have/HaveWrongName/Ambiguous, return immediately
          2. Fall back to regular hash (headered/container)
          This handles DATs that store headerless SHA1 (No-Intro NES/SNES) vs headered SHA1.
      - element: "ClassifyWithHashFull(hash, actualFileName, consoleKey, datIndex)"
        type: function
        location: "DatAuditClassifier.cs:68"
        description: |
          Core classification logic per hash:
          - If hash is empty → Unknown
          - If consoleKey is real (not UNKNOWN/AMBIGUOUS):
            - Lookup hash in that console's DAT
            - If not found: Miss (if DAT loaded for console) or Unknown (if no DAT for console)
            - If found: Have or HaveWrongName (via IsSameFileName)
          - If consoleKey is UNKNOWN/AMBIGUOUS:
            - Cross-console LookupAllByHash
            - 0 matches → Unknown
            - 1 match → Have or HaveWrongName
            - >1 matches → Ambiguous
      - element: "IsSameFileName(actualFileName, datRomFileName)"
        type: function
        location: "DatAuditClassifier.cs:108"
        description: |
          Name comparison for Have vs HaveWrongName:
          - If datRomFileName is null/empty → true (tolerant: no name to compare)
          - Exact filename match (case-insensitive)
          - Stem match: handles archive containers (Game.zip vs Game.nes) and format variants
      - element: "IsRealConsoleKey(consoleKey)"
        type: function
        location: "DatAuditClassifier.cs:99"
        description: "Filters out UNKNOWN and AMBIGUOUS sentinel values from console lookups."
    language: csharp
    lines: 124

