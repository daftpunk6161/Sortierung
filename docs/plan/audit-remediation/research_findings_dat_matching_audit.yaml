open_questions:
  - question: "Are there situations where supplemental DATs (FBNeo) create hash collisions with primary DATs (No-Intro) for the same ConsoleKey?"
    context: "MergeFrom merges supplemental indices using Add which updates existing keys. If both DATs have the same hash but different game names, the supplemental entry overwrites the primary."
    type: nice_to_know
    affects: []

  - question: "Is there a mechanism to distinguish Redump track-SHA1 vs raw-SHA1 in the DatIndex?"
    context: "CHD files get raw SHA1 from FileHashService, but Redump DATs often store per-track SHA1. This mismatch is the primary reason name-only fallback exists for .chd files. The DatIndex doesn't distinguish hash types."
    type: research
    affects: []

gaps:
  - area: "Hash type alignment between FileHashService and DatIndex"
    description: |
      DatIndex stores hashes as plain strings without recording which hash algorithm produced them.
      If FileHashService computes SHA1 but a DAT only had CRC32 (after fallback), the lookup will fail
      because the SHA1 hash won't match the CRC32 value stored in the index. The fallback chain in
      DatRepositoryAdapter does NOT normalize hash type alignment — it stores whatever it finds.
      This could cause false Miss results when:
      - The DAT only has CRC32 hashes (common for MAME/FBNeo)
      - The enrichment pipeline computes SHA1
      - SHA1 ≠ CRC32, so lookup returns no match → Miss
    impact: research_blocker
    affects: []

  - area: "Name-only fallback for non-disc files"
    description: |
      Name-only fallback is gated by IsDatNameOnlyExtensionWithoutBin which only includes disc
      image extensions (.chd, .iso, .gcm, .img, .cso, .rvz). Arcade .zip files get name-only via
      the ArcadeDatStrategy (AllowNameOnlyDatMatch=true) but the extension check
      IsDatNameOnlyExtensionWithoutBin(.zip) returns false, so the name-only block is skipped.
      However, for known consoles, the fallback goes through LookupByName(consoleKey, stem) without
      the extension gate — only UNKNOWN console path requires the extension check.
    impact: nice_to_know
    affects: []
