      responsibility: "Transforms ScannedFileEntry → RomCandidate with DAT lookup as core enrichment"
      location: src/Romulus.Infrastructure/Orchestration/EnrichmentPipelinePhase.cs
      relationship_to_domain: "Primary consumer of DatIndex for enrichment-time matching"
    - component: DatAuditPipelinePhase
      responsibility: "Post-enrichment DAT audit classification for reporting"
