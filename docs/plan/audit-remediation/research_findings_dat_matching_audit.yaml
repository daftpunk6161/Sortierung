plan_id: audit-remediation
objective: "Thorough research of the DAT matching/audit system in Romulus"
focus_area: dat-matching-audit
created_at: "2026-04-16T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - DAT matching uses a 4-stage pipeline: (1) Archive inner hash, (2) Headerless hash, (3) Container hash, (4) Name-only fallback. All stages use cross-console lookup.
  - DatIndex stores ConsoleKey → Hash → DatIndexEntry mappings (hash index) PLUS ConsoleKey → GameName → DatIndexEntry (name index). SHA1 is default hash type with CRC/MD5/SHA256 fallback chain.
  - DatAuditClassifier determines status: Have (hash found + name matches), HaveWrongName (hash found + name differs), Miss (DAT loaded for console but hash absent), Unknown (no DAT for console), Ambiguous (hash in multiple consoles without disambiguation).
  - dat-catalog.json maps ConsoleKey to DAT sources (Redump/No-Intro). BuildConsoleMap resolves local DAT files via ID/System/ConsoleKey stem or PackMatch glob, then scans datRoot for unmapped DATs by stem.
  - Name-only fallback is gated by FamilyDatPolicy.AllowNameOnlyDatMatch (disc/arcade/computer families), requires detector context for UNKNOWN consoles, and applies extension plausibility guards. Log message "name-only-fallback uebersprungen (kein Detector-Kontext)" means the file had UNKNOWN console and no detection hypotheses to disambiguate.

research_metadata:
  methodology: "Hybrid retrieval: semantic_search + grep_search for discovery, read_file for detailed code examination across Contracts, Core, Infrastructure layers"
  scope: "Full DAT subsystem: models, indexing, parsing, enrichment pipeline DAT lookup, audit classification, catalog mapping, name-only fallback, family strategies"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

