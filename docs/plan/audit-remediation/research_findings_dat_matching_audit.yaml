  - file: EnrichmentPipelinePhase.cs
    path: src/Romulus.Infrastructure/Orchestration/EnrichmentPipelinePhase.cs
    purpose: "Pipeline phase that enriches scanned files into RomCandidates. Contains the complete 4-stage DAT lookup logic."
    key_elements:
      - element: "LookupDat(...)"
        type: function
        location: "EnrichmentPipelinePhase.cs:418"
        description: |
          4-stage DAT lookup pipeline:
          Stage 1 (Archive inner hash): For .zip/.7z, hash archive contents and try cross-console DAT lookup per inner hash.
          Stage 2 (Headerless hash): For non-archives on cartridge families, compute headerless hash (strips NES/SNES/7800/Lynx headers) and try lookup.
          Stage 3 (Container hash): Hash the file itself (works for uncompressed ROMs, CHD, ISO). Try cross-console lookup.
          Stage 4 (Name-only fallback): If no hash match AND policy allows AND extension qualifies:
            - For known console: direct name lookup in that console's DAT
            - For UNKNOWN console: cross-console name lookup with detection hypothesis disambiguation
            - Guards: extension plausibility, strict name candidate validation, detector context requirement
      - element: "TryCrossConsoleDatLookup(...)"
        type: function
        location: "EnrichmentPipelinePhase.cs:666"
        description: |
          Cross-console DAT lookup:
          1. Fast path: try known consoleKey first
          2. Cross-console: call ResolveUnknownDatMatch
          3. Extension plausibility guard: reject if file's unique extension maps to a different console
      - element: "ResolveUnknownDatMatch(datIndex, hash, detectionResult)"
        type: function
        location: "EnrichmentPipelinePhase.cs:766"
        description: |
          Cross-console disambiguation:
          - LookupAllByHash → filter UNKNOWN/AMBIGUOUS keys
          - 0 matches → NoMatch
          - 1 match → direct match
          - >1 matches → use detection hypotheses ranked by confidence to pick the best console
          - No hypotheses → NoMatch (fails closed)
      - element: "Name-only fallback block"
        type: pattern
        location: "EnrichmentPipelinePhase.cs:548-660"
        description: |
          Gated by: !datMatch && datPolicy.AllowNameOnlyDatMatch && IsDatNameOnlyExtensionWithoutBin(ext)
          For UNKNOWN console: requires detectionResult != null (otherwise logs "Name-Only-Fallback uebersprungen (kein Detector-Kontext)")
          For known console: direct LookupByName(consoleKey, stem)
      - element: "IsStrictDatNameCandidate(stem)"
        type: function
        location: "EnrichmentPipelinePhase.cs:933"
        description: "Rejects stems < 3 chars, stems in GenericDatNameBlocklist (track/disk/disc/rom/game/image), stems with < 3 alphanumeric chars."
      - element: "MapToCandidate(...)"
        type: function
        location: "EnrichmentPipelinePhase.cs:162"
        description: |
          Complete enrichment flow per file:
          1. Pre-detection DAT lookup (DAT-first: tries before console detection)
          2. If no DAT match: run ConsoleDetector, then retry DAT lookup with detection context
          3. BIOS classification
          4. Build MatchEvidence, SortDecision, DecisionClass from DAT result
