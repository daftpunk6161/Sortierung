patterns_found:
  - category: architecture
    pattern: "DAT-first cross-console lookup"
    description: |
      Every hash-based DAT stage uses TryCrossConsoleDatLookup which:
      1. Fast path: checks the known consoleKey first
      2. Cross-console: searches ALL loaded consoles
      3. Disambiguation: uses detection hypotheses ranked by confidence
      This means a file can be matched even if console detection was wrong or unknown.
    examples:
      - file: EnrichmentPipelinePhase.cs
        location: "EnrichmentPipelinePhase.cs:462,498,524"
        snippet: "var crossConsoleResult = TryCrossConsoleDatLookup(datIndex, hash, consoleKey, detectionResult, filePath, consoleDetector, onProgress);"
    prevalence: common

  - category: architecture
    pattern: "Two-pass enrichment: DAT-first then detection-assisted"
    description: |
      MapToCandidate runs DAT lookup twice:
      1. Pre-detection: tries DAT matching with UNKNOWN console (relies on cross-console lookup)
      2. Post-detection: if no DAT match, runs ConsoleDetector, then retries with known console and family-specific policy
      This DAT-first approach means DAT hash authority > detection authority.
    examples:
      - file: EnrichmentPipelinePhase.cs
        location: "EnrichmentPipelinePhase.cs:220-280"
        snippet: "datResult = LookupDat(filePath, ext, sizeBytes, consoleKey, ... preDetectDatPolicy, detectionResult: null, ...)"
    prevalence: common

  - category: architecture
    pattern: "Hash fallback chain in DAT parsing"
    description: |
      When parsing DAT XML, if the requested hash type (default SHA1) is absent for a ROM entry,
      the parser falls back: SHA1 → MD5 → CRC. This handles DATs that only carry CRC32 (MAME/FBNeo).
    examples:
      - file: DatRepositoryAdapter.cs
        location: "DatRepositoryAdapter.cs:260-290"
        snippet: "if (hash is null && requestedHashType is not \"SHA1\") { hash = reader.GetAttribute(\"sha1\"); }"
    prevalence: common

  - category: architecture
    pattern: "Family-specific DAT policy via Strategy pattern"
    description: |
      Each PlatformFamily has its own IFamilyDatStrategy that determines which DAT lookup stages
      are enabled. Key differences:
      - Cartridge: headerless hash ON, name-only OFF
      - Disc: headerless OFF, name-only ON (for .chd/.iso/.gcm)
      - Arcade: name-only ON + strict name validation
      - Computer: name-only ON + strict name validation
    examples:
      - file: FamilyDatStrategyResolver.cs
        location: "FamilyDatStrategyResolver.cs:1-110"
        snippet: "return strategy switch { ... \"headerless-sha1\" => basePolicy with { UseHeaderlessHash = true } ... }"
    prevalence: common

  - category: architecture
    pattern: "Extension plausibility guard"
    description: |
      After a cross-console DAT match or name-only match, the system checks whether the file's
      extension maps uniquely to a different console (via ConsoleDetector.DetectByExtension).
      If so, the match is rejected as implausible. Prevents e.g. a .n64 file being matched to NES DAT.
    examples:
      - file: EnrichmentPipelinePhase.cs
        location: "EnrichmentPipelinePhase.cs:694-703"
        snippet: "if (extConsole is not null && !string.Equals(extConsole, resolution.ConsoleKey...)) { ... verworfen }"
    prevalence: common

  - category: architecture
    pattern: "Miss vs Unknown distinction"
    description: |
      Critical for audit accuracy:
      - Miss = DatIndex.HasConsole(consoleKey) returns true BUT hash not found → the ROM is genuinely missing from the DAT
      - Unknown = DatIndex.HasConsole(consoleKey) returns false → no DAT was loaded for this console, status is indeterminate
      A file can be Miss when it shouldn't if: wrong hash type, headered vs headerless mismatch, or the DAT is outdated.
    examples:
      - file: DatAuditClassifier.cs
        location: "DatAuditClassifier.cs:80-84"
        snippet: "var status = datIndex.HasConsole(consoleKey!) ? DatAuditStatus.Miss : DatAuditStatus.Unknown;"
    prevalence: common

  - category: naming
    pattern: "Case-insensitive string comparison throughout"
    description: "All DAT keys, console keys, hash values, and filename comparisons use StringComparer.OrdinalIgnoreCase."
    examples:
      - file: DatIndex.cs
        location: "DatIndex.cs:8-9"
        snippet: "new ConcurrentDictionary<...>(StringComparer.OrdinalIgnoreCase)"
    prevalence: common

  - category: error_handling
    pattern: "Graceful DAT parsing degradation"
    description: |
      DAT parsing handles: empty files, non-XML files, DTD prohibition (retries with DtdProcessing.Ignore),
      7z-compressed DATs (transparent decompression), malformed XML (partial results + warning),
      and excessive file size (100MB limit, skipped with warning).
    examples:
      - file: DatRepositoryAdapter.cs
        location: "DatRepositoryAdapter.cs:320-330"
