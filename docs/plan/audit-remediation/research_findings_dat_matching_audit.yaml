      relationship_to_domain: "Secondary consumer, re-classifies candidates against DatIndex"
    - component: RunEnvironmentBuilder
      responsibility: "Builds DatIndex from catalog + filesystem at run start"
      location: src/Romulus.Infrastructure/Orchestration/RunEnvironmentBuilder.cs
      relationship_to_domain: "Creates and populates DatIndex that all phases consume"
    - component: ConsoleDetector
      responsibility: "Detects console from file path/extension/header"
      location: src/Romulus.Infrastructure/Classification/ConsoleDetector.cs
      relationship_to_domain: "Provides detection hypotheses used for cross-console DAT disambiguation"
    - component: FileHashService
      responsibility: "Computes and caches file hashes (SHA1/MD5/CRC32/SHA256)"
      location: src/Romulus.Infrastructure/Hashing/FileHashService.cs
      relationship_to_domain: "Provides hash values used for DatIndex lookups"
    - component: ArchiveHashService
      responsibility: "Hashes inner contents of ZIP/7z archives"
      location: src/Romulus.Infrastructure/Hashing/ArchiveHashService.cs
      relationship_to_domain: "Provides inner ROM hashes for archive DAT matching"
    - component: DatRenamePolicy
      responsibility: "Pure policy for renaming HaveWrongName files to DAT-correct names"
      location: src/Romulus.Core/Audit/DatRenamePolicy.cs
      relationship_to_domain: "Downstream consumer of DatAuditEntry for rename decisions"
    - component: DatSourceService
      responsibility: "Downloads and verifies DAT files from catalog sources"
      location: src/Romulus.Infrastructure/Dat/DatSourceService.cs
      relationship_to_domain: "Populates datRoot with DAT files that DatRepositoryAdapter parses"
    - component: DatCatalogStateService
      responsibility: "Persists DAT install state, builds catalog status for UI"
      location: src/Romulus.Infrastructure/Dat/DatCatalogStateService.cs
      relationship_to_domain: "Manages lifecycle of local DAT files"

  data_flow_involving_domain: |
    1. RunEnvironmentBuilder.BuildConsoleMap reads dat-catalog.json → maps ConsoleKey to local DAT file paths
    2. DatRepositoryAdapter.GetDatIndex parses each mapped DAT XML → builds DatIndex (hash + name indices)
    3. Supplemental DATs (FBNeo, MAME) merged into main DatIndex
    4. EnrichmentPipelinePhase.LookupDat hashes each file and searches DatIndex via 4-stage pipeline
    5. RomCandidate carries DatMatch, DatGameName, Hash, HeaderlessHash
    6. DatAuditPipelinePhase.Execute re-classifies candidates via DatAuditClassifier.ClassifyFull
    7. DatAuditResult aggregates Have/HaveWrongName/Miss/Unknown/Ambiguous counts
    8. DatRenamePolicy proposes renames for HaveWrongName entries

  key_relationships_to_domain:
    - from: dat-catalog.json
      to: RunEnvironmentBuilder.BuildConsoleMap
      relationship: "read and deserialized"
    - from: RunEnvironmentBuilder
      to: DatRepositoryAdapter.GetDatIndex
      relationship: "calls with consoleMap"
    - from: DatRepositoryAdapter
      to: DatIndex
      relationship: "populates via Add()"
    - from: EnrichmentPipelinePhase
      to: DatIndex
      relationship: "reads via Lookup/LookupAllByHash/LookupByName/LookupAllByName"
    - from: EnrichmentPipelinePhase
      to: FileHashService
      relationship: "calls GetHash for container hashes"
    - from: EnrichmentPipelinePhase
      to: ArchiveHashService
      relationship: "calls GetArchiveHashes for inner ROM hashes"
    - from: DatAuditPipelinePhase
      to: DatAuditClassifier
      relationship: "calls ClassifyFull per candidate"
    - from: DatAuditClassifier
      to: DatIndex
      relationship: "reads via LookupWithFilename/HasConsole/LookupAllByHash"

