plan_id: strategic-reduction-2026
objective: |
  Romulus auf seine echte Identitaet reduzieren ("Safe ROM Library Cleanup & Verification with Audit Trail")
  und die in der Critic-Review festgelegte 5-Phasen-Roadmap inklusive Top-20-Empfehlungen
  ohne Kompromisse und ohne Luecken umsetzen.
created_at: "2026-04-28"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 6
  total_dependencies: 41
  risk_score: high

wave_timing:
  basis: |
    Grobe Wochen-Schaetzung mit Unsicherheits-Bandbreite. Kein Commitment auf
    Tag-genaue Termine. Slip wird in plan.status dokumentiert, nicht still verschoben.
    "Tag 7 von Welle 3" o.ae. Deadlines werden als Wochen-Tag interpretiert,
    sobald Welle 3 startet.
  wave_1: "2-3 Wochen"
  wave_2: "2 Wochen"
  wave_3: "3-4 Wochen"
  wave_4: "3 Wochen"
  wave_5: "3 Wochen"
  wave_6: "1-2 Wochen"
  wave_7: "3 Wochen"
  wave_8: "2-3 Wochen"
  wave_9: "2-3 Wochen"
  wave_10: "2-3 Wochen (nur falls Bonus-Tasks aktiviert)"
  wave_11: "2 Wochen"
  caveat: |
    Wenn eine Welle laut Pre-Mortem-Risiko schleppt, schreibe ein Slip-Note in
    docs/plan/strategic-reduction-2026/slip-log.md mit Ursache und Folge-Wirkung
    auf die Beta-Akquise-Deadline.

tldr: |
  Drei-Akt-Plan ueber 5 Phasen / 11 Wellen.
  - Akt I (Wellen 1-3, Phase 1): Strategische Reduktion. Eine GUI, ein Workflow, weniger Konsolen,
    weniger Tools, ehrliche Doku, Audit-Moratorium. Kein neues Feature bevor das nicht steht.
  - Akt II (Wellen 4-6, Phase 2): Vertrauen sichtbar machen. Decision Explainer, Audit-Viewer
    First-Class, Before/After Simulator, Conversion Safety Advisor, DAT-first ADR.
  - Akt III (Wellen 7-11, Phasen 3-5): Workflow-Mehrwert (Set Integrity Guardian, Multi-DAT,
    Provenance) und kontrollierte Power-Features (Policy Governance, Risk Map, Batch Plan).
    Keine Plattform-/Marketplace-/Plugin-Themen vor PMF.
  Jede Welle hat ein hartes Stop-/Go-Gate. Beta-Nutzer-Loop ab Welle 3.
  Top-20-Empfehlungen sind 1:1 als covers-Tags den Tasks zugeordnet, sodass jede Empfehlung
  exakt einen Owner-Task hat.

open_questions: []

resolved_decisions:
  - question: Welche realen Beta-Nutzer starten den Discovery-Loop in Welle 3?
    decision: |
      Mindestens 5 Personen, davon mindestens 3 extern. Cohort-Mix:
      - 2 Power-Archivare (Sammlung > 500 GB, gemischte Konsolen, Vorerfahrung mit
        RomVault oder clrmamepro), akquiriert aus r/Roms, r/DataHoarder oder dem
        No-Intro/Redump-Forum.
      - 1 Nischen-Sammler (z.B. Neo Geo, PC-Engine, MSX) als Belastungsprobe fuer die
        Best-Effort-Konsolenmarkierung.
      - 1 frischer Umsteiger ohne Romulus-Vorwissen mit 50-200 GB Sammlung als
        Onboarding- und Decision-Explainer-Tester.
      - 1 interner Power-User aus dem Maintainer-Umfeld (NICHT der Hauptentwickler)
        fuer schnelle Wochen-Iteration.
      Mitarbeiter, Familie und Hauptentwickler zaehlen explizit nicht.
      Akquise-Deadline: Tag 7 von Welle 3, sonst Plan-Slip dokumentieren.
    impact_on_tasks: ["T-W3-BETA-USERS"]

  - question: Wer ist Entscheider fuer die Avalonia-vs-WPF-ADR und bis wann?
    decision: |
      ENTSCHEIDUNG GETROFFEN (2026-04-28): WPF behalten, Avalonia archivieren.
      Owner: Maintainer mit Commit-Recht auf main.
      Begruendung:
      - Persona ist Windows-first (Sammler/Archivare auf Windows-Desktop).
      - Erhebliches investiertes Kapital in WPF: 41 Views, 16 ViewModels,
        dokumentierte Wave-2-Refactors (RunViewModel.ApplyDashboard, IApiProcessHost,
        SafetyLaneProjection, RunConfigurationDraftFingerprint), gereifte Bugfixes
        (WizardView-Binding-Deferral, DatCatalog-Refresh, AuditSigningService-Atomicity),
        WPF-nahe Tests (HardRegressionInvariantTests, GuiViewModelTests, WpfFingerprintAndI18nTests,
        Wave2RefactorRegressionTests).
      - Avalonia ist im Repo erkennbar jung und unvollstaendig; weiterfuehren bedeutet
        Doppelarbeit oder Feature-Verzoegerung.
      - Cross-Platform ist nicht durch GUI-Tausch geloest: chdman/dolphintool/7z,
        WebView2 (LibraryReportView), Reparse Points/Hardlinks im FileSystemAdapter
        sind Windows-spezifisch.
      - Wenn Cross-Platform jemals belegt wird, ist der ehrliche Pfad eine Linux/macOS-
        taugliche CLI (Romulus.CLI), nicht eine zweite GUI.
      Folgeentscheidung fuer T-W1-AV-ARCHIVE:
      - src/Romulus.UI.Avalonia wird nach archive/avalonia-spike/ verschoben (nicht hart
        geloescht), mit Git-Tag avalonia-spike-archived. Spike-Lerneffekt bleibt erhalten,
        Wartung endet.
      - Aus src/Romulus.sln entfernen, Tests/CI-Schritte entfernen, README/Doku bereinigen.
      Reaktivierungs-Bedingung (dokumentiert, nicht offen):
      - Mindestens 3 belegte Beta-Nutzer mit Linux/macOS-Bedarf UND
      - Microsoft kuendigt WPF-EOL fuer .NET 11/12 an UND
      - keine viable CLI-Alternative fuer den belegten Bedarf.
      Nur dann ADR ueberdenken.
    impact_on_tasks: ["T-W1-AV-WPF-ADR", "T-W1-AV-ARCHIVE"]

  - question: Welche Top-30-Konsolenliste gilt als Coverage-Schwelle?
    decision: |
      Quelle: Annahme jetzt setzen, weil keine Telemetrie existiert. Telemetrie wird
      in Welle 4 als opt-in / anonymer Hook ergaenzt, ab Welle 6 wird die Liste
      datengestuetzt nachjustiert. Beta-Nutzer aus Welle 3 liefern erste manuelle
      Validierung.
      Initialer Tier=core Set (30):
      Nintendo: NES, SNES, N64, GameCube, Wii, GB, GBC, GBA, NDS, 3DS.
      Sega: Master System, Mega Drive/Genesis, Game Gear, Saturn, Dreamcast.
      Sony: PS1, PS2, PSP, PS3.
      Microsoft: Xbox, Xbox 360.
      Atari: 2600, 5200, 7800, Lynx, Jaguar.
      NEC: PC-Engine/TurboGrafx-16.
      SNK: Neo Geo Pocket, Neo Geo Pocket Color.
      3DO, CD-i.
      Wichtig: Reduktion ist nur Tier-Markierung (core vs best-effort), keine Loeschung.
      Alle 163 Konsolen bleiben funktional, nur Onboarding-Wizard und Default-Filter
      zeigen ausschliesslich core. Streit-Energie damit begrenzt.
    impact_on_tasks: ["T-W1-CONSOLE-COVERAGE"]

  - question: Soll die API in Phase 4 GA-Status bekommen oder experimental bleiben?
    decision: |
      Dauerhaft v1-experimental, bis drei externe Nutzer die API produktiv (in Skripten
      oder CI) nutzen UND zwei aufeinanderfolgende Releases ohne Breaking Changes
      stabil bleiben UND die Cross-Cutting-Verifikation GUI/CLI/API-Paritaet
      bestaetigt.
      Konkret: Pfad-Praefix /v1-experimental/, HTTP-Header
      X-Romulus-API-Status: experimental, OpenAPI x-stability: experimental,
      Disclaimer in README. Pin auf konkrete Romulus-Version verbindlich kommuniziert.
      Sicherheit (Auth, Rate Limit, Token-Pflicht fuer destruktive Calls) ist
      NICHT experimentell und muss stabil sein.
      Wenn die drei GA-Bedingungen nie erfuellt sind: API bleibt dauerhaft
      experimental. Das ist ehrliche Erwartungsverwaltung, kein Versagen.
    impact_on_tasks: ["T-W9-API-HARDENING"]

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: |
        Reduktionswelle wird halbherzig umgesetzt. Code von Frontend-Export, ScreenScraper,
        RA-Compliance, Patching wird nur "versteckt" statt entfernt -> bleibt Wartungslast,
        Schattenlogik, irrefuehrende Tests, und das Team baut weiter daran.
      likelihood: high
      impact: critical
      mitigation: |
        Definition of Done jeder Reduktions-Task: Source geloescht, Tests entfernt oder
        umgewidmet, i18n-Keys entfernt, Registrierungen entfernt, Doku aktualisiert,
        keine grep-Treffer mehr in src/ ausser in CHANGELOG. Verifikation durch gem-reviewer.
    - scenario: |
        Avalonia-Code wird trotz Archivierung weiter referenziert (Solution-Eintraege,
        CI-Steps, Doku, csproj-Verweise) -> halbe Archivierung, weiterhin Wartungslast,
        widerspruechliche Signale fuer Mitwirkende.
      likelihood: high
      impact: high
      mitigation: |
        T-W1-AV-ARCHIVE-DoD: grep -r 'Romulus.UI.Avalonia' in src/ und tests/ liefert 0
        Treffer; src/Romulus.sln enthaelt das Projekt nicht; CI-Workflow-Files erwaehnen
        es nicht; README, docs/architecture und docs/product/competitive-analysis.md
        bereinigt; Git-Tag avalonia-spike-archived gesetzt. gem-reviewer prueft jeden
        Punkt einzeln.
    - scenario: |
        Audit-Moratorium wird nicht eingehalten - das Team faellt zurueck in die
        Audit-Schleife und findet keine echten Nutzer.
      likelihood: medium
      impact: high
      mitigation: |
        Welle 3 enthaelt verbindliche Beta-Nutzer-Akquise mit min. 5 Personen und
        strukturierten Interviews. Audit-Aktivitaet ist in Wellen 1-3 explizit verboten
        (Ausnahme: Sicherheits- oder Datenintegritaetsbug mit P1-Klassifizierung).
    - scenario: |
        Konsolenreduktion auf Top-30 verliert reale Nutzer-Sammlungen. Power-Sammler
        mit Nische (z.B. PC-Engine, MSX) werden vergrault.
      likelihood: medium
      impact: high
      mitigation: |
        Reduktion bedeutet "Best-Effort"-Markierung, nicht Loeschung von Konsolen-Daten.
        Die Konsolen bleiben in data/consoles.json, werden aber im UI klar markiert
        ("Best Effort"-Badge) und nicht im Onboarding-Wizard angeboten.
    - scenario: |
        Decision Explainer wird gebaut, ohne dass die Scoring-Pfade ihre Begruendungen
        propagieren. Ergebnis: schoene UI ohne Substanz.
      likelihood: medium
      impact: high
      mitigation: |
        Decision Explainer Welle ist Wave 4 abhaengig von einer dedizierten Vorbereitung
        in Wave 2 (Scoring/Dedup-Engine emittiert Reason-Trace im RunResult).
    - scenario: |
        Conversion Safety Advisor ist bestehende Conversion-Pipeline kosmetisch ueberlagert,
        aber Lossy-Pfade bleiben erlaubt. Datenverlust-Risiko bleibt.
      likelihood: medium
      impact: critical
      mitigation: |
        Lossy-Pfade werden technisch hart geschaltet: erfordern explicit
        AcceptDataLossToken im RunOptions, sonst InvalidOperationException
        in ConversionPolicy. RED-Tests erzwingen das.
    - scenario: |
        Reduktionsschritte werden technisch korrekt durchgefuehrt, aber die Marketing-Doku
        (README, competitive-analysis.md) bleibt im alten Ton. Nutzer-Erwartung kollidiert
        mit Realitaet.
      likelihood: high
      impact: medium
      mitigation: |
        DoD jeder Reduktions-Task enthaelt ein Doku-Mitziehen. README-Refresh ist eigene
        Pflicht-Task in Welle 1 mit Reviewer-Sign-off.
  assumptions:
    - Romulus bleibt Windows-first. Cross-Platform ist explizit out-of-scope bis Phase 5.
    - Die bestehende Architektur (Contracts/Core/Infrastructure/Entry-Points) wird nicht angetastet.
    - Single-Source-of-Truth-Praktiken (RunConfigurationDraftFingerprint, SafetyLaneProjection,
      RunViewModel.ApplyDashboard) sind erhaltenswert und werden in jeder Welle als
      Architektur-Invariante geschuetzt.
    - Es gibt mindestens eine Person, die Beta-Nutzer akquirieren und interviewen kann.
    - Das Team akzeptiert das Audit-Moratorium fuer 30 Tage.
    - Lizenz bleibt GPLv3.

implementation_specification:
  code_structure: |
    Es entsteht keine neue Architektur-Schicht. Alle Aenderungen laufen innerhalb der
    bestehenden Schichten. Neue Logik (Decision Explainer, Provenance, Health Score)
    landet in Romulus.Core (pure) bzw. Romulus.Infrastructure (I/O).
    Reduktionen entfernen Code. UI-Reduktion verkleinert Romulus.UI.Wpf/Views und
    Romulus.UI.Wpf/ViewModels. Avalonia-Projekt wird gemaess gefallener Entscheidung
    nach archive/avalonia-spike/ verschoben (lesbar, nicht gebaut, nicht getestet).
  affected_areas:
    - src/Romulus.UI.Wpf (Reduktion: Views, ViewModels, FeatureCommandService.*, Services)
    - src/Romulus.UI.Avalonia (Verschiebung nach archive/avalonia-spike/)
    - src/Romulus.Infrastructure/Conversion (Lossy-Token, Safety Advisor)
    - src/Romulus.Infrastructure/Reporting (Vereinheitlichung HTML/CSV/JSON, Audit-Viewer-Daten)
    - src/Romulus.Infrastructure/Audit (Audit-Viewer-Backing-API)
    - src/Romulus.Infrastructure/Dat (DAT-first-Markierung, Multi-DAT-Conflict)
    - src/Romulus.Infrastructure/Analysis (HealthScore, Provenance)
    - src/Romulus.Core/Deduplication (Reason-Trace fuer Decision Explainer)
    - src/Romulus.Core/Scoring (Reason-Trace)
    - src/Romulus.Contracts/Models (RunResult-Erweiterung um WinnerReasons, ProvenanceTrail)
    - src/Romulus.CLI, src/Romulus.Api (Paritaet, Lossy-Token, Reduktionen mitziehen)
    - data/consoles.json (Top-30 + Best-Effort-Markierung)
    - data/i18n/* (verwaiste Keys entfernen, neue fuer Explainer/Provenance/Health)
    - docs/architecture, docs/adrs (neue ADRs: AV-WPF, DAT-first, Conversion-Safety)
    - README.md, docs/product/competitive-analysis.md (Realitaets-Refresh)
  component_details:
    - component: WinnerReasonTrace
      responsibility: |
        Pure Datenstruktur in Romulus.Contracts.Models, die fuer jede Winner-Selection
        die angewandten Scoring-/Tiebreaker-/Region-/Format-/Version-Beitraege
        deterministisch festhaelt. Wird vom RunResult mit ausgeliefert.
      interfaces:
        - IReadOnlyList<WinnerReasonTrace> RunResult.WinnerReasons
    - component: AuditViewerBackingService
      responsibility: |
        Liefert eine paginierte, gefilterte Sicht auf Audit-Sidecars und Ledger-Eintraege
        fuer die GUI. Read-only. Greift auf bestehende AuditCsvStore + AuditSigningService
        zu, ohne deren Schreibwege zu duplizieren.
      interfaces:
        - IAuditViewerBackingService.GetEntries(AuditViewerQuery query, CancellationToken ct)
        - IAuditViewerBackingService.GetSidecar(string runId)
    - component: DecisionExplainerProjection
      responsibility: |
        Projiziert WinnerReasonTrace + DAT-Match-Status + Region-Score in ein UI-taugliches
        Erklaerungsmodell. Single Source of Truth zwischen GUI/CLI/API/Reports.
      interfaces:
        - DecisionExplainerProjection.Project(RunResult)
    - component: BeforeAfterCollectionSimulator
      responsibility: |
        Erweitert DryRun um eine differenzierende Sicht "Was bleibt / Was geht / Was wird
        wo abgelegt" pro Konsole und pro Wurzelpfad. Nutzt die bestehende Phase-Plan-Logik
        ohne neue Wahrheit.
      interfaces:
        - IBeforeAfterSimulator.Simulate(RunOptions options)
    - component: ConversionSafetyAdvisor
      responsibility: |
        Klassifiziert geplante Conversions in "Safe", "Risk", "Lossy". Lossy erfordert
        AcceptDataLossToken in RunOptions; wird sonst hart abgelehnt.
      interfaces:
        - ConversionSafetyAdvisor.Classify(ConversionPlan plan, RunOptions options)
    - component: ReviewInboxProjection
      responsibility: |
        Ersetzt verstreute Unknown-/Blocked-/Review-Tabs durch eine einzige Inbox-Projektion.
        Nutzt SafetyLaneProjection als Quelle, fuegt Aktion-Hinweise und Bulk-Operationen
        hinzu.
      interfaces:
        - ReviewInboxProjection.Build(RunResult, SafetyLaneProjection)
    - component: SetIntegrityGuardian
      responsibility: |
        HealthScore pro Konsole ueber Zeit. Persistiert HealthSnapshots im AppStateStore.
        Nicht Teil des Run-Flows; wird als Hintergrund-Snapshot beim Run-Abschluss erzeugt.
      interfaces:
        - ISetIntegrityGuardian.SnapshotAfterRun(RunResult)
        - ISetIntegrityGuardian.GetHistory(string consoleKey)
    - component: ProvenanceTrail
      responsibility: |
        Pro ROM eine prueffaehige Liste von Ereignissen (Imported, Verified, Moved,
        Converted, RolledBack), Hashes und DAT-Match-Belegen.
      interfaces:
        - IProvenanceStore.Append(ProvenanceEntry entry)
        - IProvenanceStore.GetTrail(string romFingerprint)
    - component: MultiDatConflictResolver
      responsibility: |
        Wenn mehrere DATs dieselbe Hash-Identitaet beanspruchen (z.B. No-Intro vs. Redump),
        liefert deterministische Aufloesung mit Erklaerung.
      interfaces:
        - IMultiDatConflictResolver.Resolve(IReadOnlyList<DatMatch> matches)
    - component: PolicyGovernanceEngine
      responsibility: |
        Erlaubt deklarative Sammlungs-Policies (z.B. "EU bevorzugt", "keine Demos",
        "alle Konsolen ZIP komprimiert"). Validiert Sammlung gegen Policy.
      interfaces:
        - IPolicyEngine.Validate(LibrarySnapshot snapshot, Policy policy)
  dependencies:
    - component: DecisionExplainerProjection
      relationship: konsumiert WinnerReasonTrace; wird von GUI/CLI/API/Reports gelesen
    - component: AuditViewerBackingService
      relationship: liest AuditCsvStore + AuditSigningService, schreibt nichts
    - component: BeforeAfterCollectionSimulator
      relationship: ruft PhasePlanBuilder ohne Execute-Effekte auf
    - component: ConversionSafetyAdvisor
      relationship: greift in ConversionPolicy als Pre-Gate ein
    - component: ReviewInboxProjection
      relationship: konsumiert SafetyLaneProjection, ergaenzt Aktionen
    - component: SetIntegrityGuardian
      relationship: haengt am RunOrchestrator-OnCompleted-Event
    - component: ProvenanceTrail
      relationship: wird von Run-Phasen (Verify/Move/Convert/Rollback) befuellt
    - component: MultiDatConflictResolver
      relationship: wird von DatRepositoryAdapter konsultiert
    - component: PolicyGovernanceEngine
      relationship: liest LibrarySnapshot, schreibt Validation-Report
  integration_points:
    - GUI: ein einziger Hauptflow + Audit-Viewer + Review-Inbox + Decision-Explainer-Drawer
    - CLI: Lossy-Token-Flag, JSON-Output mit WinnerReasons, ProvenanceTrail, HealthScore
    - API: Read-only Endpunkte fuer Audit-Viewer, HealthScore, Provenance
    - Reports: Single HTML pro Run, Audit-CSV, Provenance-JSON

