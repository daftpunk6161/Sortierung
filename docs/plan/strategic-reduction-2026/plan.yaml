    interface: LibrarySnapshot als Input fuer Policy-Validation
    format: C#-Datentyp
  - from_task: T-W7-PROVENANCE-TRAIL
    to_task: T-W9-POLICY-GOVERNANCE
    interface: ProvenanceTrail-Lookup
    format: C#-API

tasks:

  # ============================================================
  # WAVE 1 - Phase 1: Strategische Reduktion (Hard-Gate)
  # ============================================================

  - id: T-W1-AV-WPF-ADR
    title: "ADR Avalonia vs WPF dokumentieren (Entscheidung WPF)"
    description: |
      Entscheidung ist bereits getroffen (siehe resolved_decisions): WPF behalten,
      Avalonia archivieren. Diese Task verschriftlicht die Entscheidung als ADR
      (docs/adrs/00XX-gui-platform.md) mit Status=accepted, Owner, Datum, voller
      Begruendung und expliziter Reaktivierungs-Bedingung. Keine Diskussion mehr,
      nur Verschriftlichung.
      Akzeptanz: ADR-Datei vorhanden, Status=accepted, enthaelt Reaktivierungs-Bedingung.
    wave: 1
    agent: gem-planner
    prototype: false
    covers: ["TOP-1"]
    priority: high
    status: done
    dependencies: []
    conflicts_with: []
    context_files:
      - path: docs/adrs/
        description: bestehende ADRs als Vorlage
      - path: src/Romulus.UI.Avalonia/
        description: aktueller Avalonia-Stand
      - path: src/Romulus.UI.Wpf/
        description: aktueller WPF-Stand
    planning_pass: 1
    planning_history:
      - pass: 1
        reason: Hard-Gate fuer alle Folgewellen.
        timestamp: "2026-04-28"
        estimated_effort: small
        estimated_files: 1
        estimated_lines: 200
        focus_area: governance
        verification:
          - ADR-Datei existiert mit Status accepted
          - Owner und Deadline benannt
          - Begruendung mit Persona-Bezug
        acceptance_criteria:
          - Eine GUI-Plattform ist verbindlich festgelegt
          - Folgeentscheidung (loeschen oder migrieren) ist explizit
        failure_modes:
          - scenario: ADR wird auf "spaeter" verschoben
            likelihood: high
            impact: critical
            mitigation: Welle 2 darf nicht starten ohne ADR-Status=accepted
          - scenario: ADR ist halbherzig ("wir behalten beide")
            likelihood: medium
            impact: critical
            mitigation: Reviewer lehnt ADRs ohne klare Loesch-/Migrations-Anweisung ab
        requires_review: true
        review_depth: full
        review_security_sensitive: false

  - id: T-W1-AV-ARCHIVE
    title: Avalonia-Projekt nach archive/avalonia-spike/ verschieben
    description: |
      Entscheidung steht (WPF behalten). Konkret:
      - src/Romulus.UI.Avalonia -> archive/avalonia-spike/ verschieben (git mv)
      - Aus src/Romulus.sln entfernen
      - Tests/CI-Schritte fuer Avalonia entfernen
      - README, docs/architecture, docs/product/competitive-analysis.md auf einzige GUI bereinigen
      - Git-Tag avalonia-spike-archived setzen
      - Romulus.UI.Avalonia.* Pakete und Project-References in anderen csproj entfernen
      Spike bleibt im Repo lesbar fuer Lerneffekt, wird aber nicht mehr gebaut/getestet.
    wave: 1
    agent: gem-implementer
    prototype: false
    covers: ["TOP-1"]
