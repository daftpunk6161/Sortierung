      wie Provenance und Audit-Sidecar zueinander stehen, BEVOR Code entsteht.
      Mindest-Inhalte:
      - Verantwortungs-Trennung: Audit = jeder Run als Ganzes (Sidecar+Ledger),
        Provenance = jedes ROM ueber seine Lebenszeit (Append-Only-Trail).
      - Gemeinsame Helper: Signing/Hash/Atomic-Write-Logik aus AuditSigningService
        wird wiederverwendet, NICHT dupliziert (Provenance erbt Atomicity-Garantie).
      - Speicherort: Provenance-Trail je ROM-Fingerprint in eigener Store-Datei,
        nicht in den Audit-Sidecar reingemischt (Lese-Pfad sonst zu teuer).
      - Cross-Reference: jeder Provenance-Eintrag verweist auf den Audit-Run-Id,
        in dem er entstand.
      - Verbot: kein zweiter Sidecar-Schreibpfad, keine zweite Ledger-Datei,
        kein paralleles Signing-Verfahren.
      Ohne diese ADR darf T-W7-PROVENANCE-TRAIL nicht starten.
