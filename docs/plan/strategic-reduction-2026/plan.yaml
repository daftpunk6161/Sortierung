  - id: T-W2-CONVERSION-SAFETY-CONTRACT
    title: AcceptDataLossToken in RunOptions + ConversionPolicy-Pre-Gate
    description: |
      Erweitere RunOptions um AcceptDataLossToken (string).
      ConversionPolicy lehnt Lossy-Pfade hart ab, wenn Token nicht gesetzt oder ungueltig.
      Token-Inhalt: deterministischer Hash der Lossy-Plan-Items, vom System emittiert,
      vom Nutzer bestaetigt.
      UX-Flow (verbindlich, gilt fuer GUI/CLI/API):
      - PHASE 1 (plan / preview): ConversionPolicy.ComputeAcceptDataLossToken liefert
        den Token im RunResult.PendingLossyToken Feld. Token wird NICHT in Logs gedruckt,
        sondern im strukturierten Output (JSON / GUI-Property).
      - PHASE 2 (execute / move-convert): Aufrufer muss exakt diesen Token in den
        RunOptions mitgeben. ConversionPolicy validiert per Ordinal-Vergleich gegen
        neu berechneten Token aus dem aktuellen Plan. Bei Mismatch: hart abgelehnt.
      - GUI: Nutzer sieht roten Lossy-Block, klickt 'Akzeptieren', Token wird
        intern weitergereicht (kein Abtippen). DangerConfirm bleibt zusaetzlich aktiv.
      - CLI: 'romulus plan' gibt Token in JSON aus. 'romulus execute --accept-data-loss
        $(romulus plan --json | jq .pendingLossyToken)' ist der dokumentierte Pfad.
      - API: POST /runs/plan liefert pendingLossyToken; POST /runs/execute akzeptiert
        es im Body. Kein hash-aus-logs-grepen.
      Welle 2 implementiert nur die Vertrags-Kante; Welle 5 baut die UI/Beratung darauf.
    wave: 2
    agent: gem-implementer
    prototype: false
    covers: ["TOP-10"]
    priority: high
    status: pending
    dependencies: []
    conflicts_with: []
    context_files:
