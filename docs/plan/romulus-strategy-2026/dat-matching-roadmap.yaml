plan_id: dat-matching-parity-romvault
objective: |
  Romulus auf RomVault-Niveau bei DAT-Matching bringen.
  1.645 DATs im User-Verzeichnis korrekt erkennen, zuordnen und für
  Multi-Hash-Lookup indizieren. Set-Completeness und Missing-ROM-Reports
  als Kernfeatures etablieren.
created_at: "2026-04-17"
created_by: gem-planner
status: pending_approval
research_confidence: high

# ═══════════════════════════════════════════════════════════════════
# CRITIQUE 1: DAT-Matching & Verifikation (RomVault-Gap)
# ═══════════════════════════════════════════════════════════════════
#
# Quelle: Vergleich RomVault-Screenshots vs. Romulus-Scan desselben Satzes.
# RomVault erkennt Zuordnungen exzellent, Romulus macht kaum welche.

# ═══════════════════════════════════════════════════════════════════
# CRITIQUE 2: DAT-Discovery & ConsoleKey-Zuordnung
# ═══════════════════════════════════════════════════════════════════
#
# Quelle: 1.645 .dat-Dateien in C:\dat, Katalog kennt nur 203.
# Fallback-Scan findet alle, aber ConsoleKey-Zuordnung bricht fuer ~80%.

# ═══════════════════════════════════════════════════════════════════
# KONSOLIDIERTER UMSETZUNGSPLAN
# ═══════════════════════════════════════════════════════════════════

phases:

  # ─────────────────────────────────────────────────────────────────
  # PHASE 1: FOUNDATION — DAT-Discovery & Zuordnung fixen
  # ─────────────────────────────────────────────────────────────────
  - phase: 1
    name: "DAT-Discovery & Zuordnung"
    priority: blocking
    description: |
      Ohne korrekte DAT-Zuordnung ist alles andere wertlos.
      Romulus muss alle 1.645 DATs korrekt erkennen und dem richtigen
      System zuordnen — ohne handgepflegten Katalog fuer jede einzelne.

    tasks:
      # ── BLOCKING ───────────────────────────────────────────────
      - id: P1-B01
        title: "DAT-Header-Parsing als universeller Fallback"
        severity: blocking
        status: "[x]"
        description: |
          Beim Fallback-Scan (nicht-katalogisierte DATs) den XML-Header
          (<header><name>...) parsen und daraus den System-Namen extrahieren.
          Gegen consoles.json matchen fuer korrekte ConsoleKey-Zuordnung.
          Macht Stem-Sanitization als primaere Zuordnung obsolet.
        affected_files:
          - src/Romulus.Infrastructure/Orchestration/RunEnvironmentBuilder.cs
          - src/Romulus.Infrastructure/Dat/DatRepositoryAdapter.cs
        test_requirement: |
          - Unit: DAT-Header mit verschiedenen Formaten (No-Intro, Redump, TOSEC, MAME) parsen
          - Unit: System-Name → ConsoleKey Mapping mit consoles.json
          - Integration: 1.645 DATs aus C:\dat korrekt zuordnen
          - Edge: Malformed/leere Header, fehlende <name>-Elemente

      - id: P1-B02
        title: "Nicht-katalogisierte DAT-Gruppen unterstuetzen"
        severity: blocking
        status: "[x]"
        description: |
          853 DATs aus Hearto-No-Intro (244), PropeR-No-Intro (239),
          McLean-No-Intro (187), Hearto-Redump (54), PropeR-Redump (54),
          McLean-Redump (40), Laserdisc (35) werden aktuell nicht korrekt
          zugeordnet. Mit DAT-Header-Parsing (P1-B01) werden alle diese
          Gruppen automatisch erkannt, da sie denselben <header><name>
          wie die Originale tragen.
        depends_on: [P1-B01]
        affected_files:
          - src/Romulus.Infrastructure/Orchestration/RunEnvironmentBuilder.cs
        test_requirement: |
          - Integration: Hearto/PropeR/McLean DATs werden zum gleichen ConsoleKey wie No-Intro/Redump gemergt
          - Unit: Supplemental-Merging ueber DAT-Header statt Katalog-ConsoleKey

      - id: P1-B03
        title: "TOSEC-DAT-Support (300 DATs)"
        severity: blocking
        status: "[x]"
        description: |
          300 TOSEC-DATs in C:\dat\TOSEC-ISO\ sind komplett unberuecksichtigt.
          Der Katalog hat null TOSEC-Eintraege. TOSEC-Dateinamen matchen auf
          keinen Katalog-Eintrag. RomVault zeigt TOSEC als eigene Gruppe.
          TOSEC-DATs haben eigenes XML-Format mit <header><name> — 
          muss per P1-B01 erkannt werden.
        depends_on: [P1-B01]
        affected_files:
          - data/dat-catalog.json (optional: TOSEC-Eintraege ergaenzen)
          - src/Romulus.Infrastructure/Dat/DatRepositoryAdapter.cs (TOSEC-XML-Parser)
        test_requirement: |
          - Unit: TOSEC-DAT-XML-Format korrekt parsen
          - Unit: TOSEC-System-Name → ConsoleKey Mapping
          - Integration: 300 TOSEC-DATs korrekt zuordnen

      # ── WARNING ────────────────────────────────────────────────
      - id: P1-W01
        title: "Supplemental-DAT-Merging fuer Header-basierte Zuordnung"
        severity: warning
        status: "[x]"
        description: |
          Aktuell funktioniert Supplemental-Merging nur fuer Katalog-Eintraege
          mit identischem ConsoleKey. Wenn 5 Varianten (No-Intro, Hearto,
          PropeR, McLean, Original) denselben DAT-Header-Namen haben, muessen
          alle in denselben Index gemergt werden.
        depends_on: [P1-B01]
        affected_files:
          - src/Romulus.Infrastructure/Orchestration/RunEnvironmentBuilder.cs

      - id: P1-W02
        title: "DAT-Ordnerstruktur als Group-Hint nutzen"
        severity: suggestion
        status: "[x]"
        description: |
          Die Ordnerstruktur (C:\dat\No-Intro\, C:\dat\Redump\, etc.) wird
          bei der ConsoleKey-Aufloesung nicht genutzt. Das uebergeordnete
          Verzeichnis sagt bereits die DAT-Gruppe. Diese Information als
          Fallback-Hint nutzen wenn Header-Parsing nicht moeglich.
        affected_files:
          - src/Romulus.Infrastructure/Orchestration/RunEnvironmentBuilder.cs

  # ─────────────────────────────────────────────────────────────────
  # PHASE 2: MATCHING — Multi-Hash & Performance
  # ─────────────────────────────────────────────────────────────────
  - phase: 2
    name: "Multi-Hash-Index & Performance"
    priority: blocking
    description: |
      DatIndex muss alle Hash-Typen gleichzeitig indizieren (CRC32 + SHA1 + MD5).
      ZIP-CRC32 aus Headern lesen statt rehashen. Ohne das: 0 Treffer wenn
      DAT CRC32 hat und Romulus SHA1 sucht.

    tasks:
      # ── BLOCKING ───────────────────────────────────────────────
      - id: P2-B01
        title: "DatIndex Multi-Hash-Keys (CRC32 + SHA1 + MD5 gleichzeitig)"
        severity: blocking
        status: "[x]"
        description: |
          DatIndex laedt pro Session NUR einen Hash-Typ. RomVault indiziert
          CRC32+SHA1+MD5 gleichzeitig. Wenn ein DAT nur CRC32 hat (MAME, FBNeo)
          und Romulus auf SHA1 laedt, findet er NICHTS.
          
          Fix: DatIndex muss pro ROM alle verfuegbaren Hashes speichern.
          Lookup-Kette: SHA1 → CRC32 → MD5. Ein ROM hat dann bis zu 3
          Lookup-Keys statt einem.
        affected_files:
          - src/Romulus.Contracts/Models/DatIndex.cs
          - src/Romulus.Infrastructure/Dat/DatRepositoryAdapter.cs
          - src/Romulus.Infrastructure/Orchestration/EnrichmentPipelinePhase.cs
        test_requirement: |
          - Unit: DatIndex mit Multi-Hash-Entries erstellen und per SHA1/CRC32/MD5 lookupen
          - Unit: Fallback-Kette SHA1 → CRC32 → MD5
          - Regression: Bestehende Single-Hash-Lookups muessen weiterhin funktionieren
          - Edge: ROM mit nur CRC32 im DAT, Lookup per SHA1 muss CRC32-Fallback nutzen

      - id: P2-B02
        title: "CRC32 aus ZIP-Header lesen (Fast Path)"
        severity: blocking
        status: "[x]"
        description: |
          Romulus rehasht jeden ZIP-Eintrag komplett per Stream. RomVault liest
          CRC32 direkt aus dem ZIP Central Directory — 100x schneller.
          Bei 50.000 ZIPs ist das der Unterschied zwischen 2 Minuten und 3 Stunden.
          
          .NET ZipArchiveEntry.Crc32 existiert — nutzen statt rehashen.
          Nur bei Hash-Mismatch oder fehlendem Header rehashen.
        affected_files:
          - src/Romulus.Infrastructure/Hashing/ArchiveHashService.cs
        test_requirement: |
          - Unit: CRC32 aus ZIP-Header stimmt mit recomputed CRC32 ueberein
          - Performance: 1000 ZIPs via Header vs. via Stream — Speedup-Faktor messen
          - Edge: Korrupte ZIP-Header → Fallback auf Stream-Rehash

      # ── WARNING ────────────────────────────────────────────────
      - id: P2-W01
        title: "FamilyDatStrategy vereinfachen"
        severity: warning
        status: "[ ]"
        description: |
          FamilyDatStrategyResolver mit 6 Strategien ist overengineered
          fuer den aktuellen Zustand. RomVault hasht alles und matcht gegen
          alles. Erst die Basis-Matching-Rate erhoehen, dann differenzieren.
          
          Pruefen ob Strategien nach Multi-Hash-Index noch noetig sind oder
          ob eine einzige Default-Strategie (immer alle Hash-Typen) genuegt.
        depends_on: [P2-B01]
        affected_files:
          - src/Romulus.Infrastructure/Dat/FamilyDatStrategyResolver.cs

  # ─────────────────────────────────────────────────────────────────
  # PHASE 3: REPORTING — Set-Completeness & Missing-ROMs
  # ─────────────────────────────────────────────────────────────────
  - phase: 3
    name: "Set-Completeness & Missing-ROM-Reports"
    priority: warning
    description: |
      RomVault zeigt pro DAT-Set: Got, Total, Missing, Wrong-Name.
      Romulus hat DatAuditStatus aber keinen Set-Completeness-Report.
      Das ist der eigentliche User-Mehrwert — der Ueberblick ueber die Sammlung.

    tasks:
      - id: P3-W01
        title: "Set-Completeness-Report pro DAT/Konsole"
        severity: warning
        status: "[x]"
        description: |
          Report pro DAT-Set: "PS1: 8.934 von 49.237 verifiziert (18%),
          3 falsch benannt". Analog zu RomVaults Got/ROM/Missing-Spalten.
          
          Basis: DatAuditClassifier hat bereits Have/HaveWrongName/Miss/Unknown.
          Fehlt: Aggregation pro Konsole und Set-Completeness-Berechnung.
        depends_on: [P2-B01]
        affected_files:
          - src/Romulus.Core/Audit/DatAuditClassifier.cs (Aggregation)
          - src/Romulus.Infrastructure/Reporting/ (neuer Report-Typ)
          - src/Romulus.UI.Wpf/ (GUI-Darstellung)
        test_requirement: |
          - Unit: Completeness-Berechnung mit bekanntem DAT-Set
          - Unit: Wrong-Name-Zaehlung
          - Parity: GUI/CLI/API zeigen identische Set-Completeness-Zahlen

      - id: P3-W02
        title: "Missing-ROM-Report (bidirektionaler Abgleich)"
        severity: warning
        status: "[x]"
        description: |
          RomVault zeigt nicht nur "welche ROMs habe ich die zu einem DAT
          passen", sondern auch "welche ROMs fehlen mir im DAT".
          Romulus matcht nur eigene Dateien → DAT. Die Gegenrichtung
          (DAT → "Was fehlt dir?") fehlt komplett.
          
          Fuer Sammler DAS Killer-Feature: "Dir fehlen noch 1.203 PS1-Games".
        depends_on: [P3-W01]
        affected_files:
          - src/Romulus.Infrastructure/Orchestration/EnrichmentPipelinePhase.cs
          - src/Romulus.Infrastructure/Reporting/ (Missing-Report)
        test_requirement: |
          - Unit: Missing-ROMs korrekt identifizieren (DAT-Eintraege ohne Match)
          - Edge: DAT mit 100k Eintraegen, Sammlung mit 10 → 99.990 Missing

  # ─────────────────────────────────────────────────────────────────
  # PHASE 4: ARCADE & ADVANCED — MAME/Set-Typen & Headerless
  # ─────────────────────────────────────────────────────────────────
  - phase: 4
    name: "Arcade & Advanced Matching"
    priority: warning
    description: |
      MAME-spezifische Matching-Features und erweiterte Headerless-Unterstuetzung.

    tasks:
      - id: P4-W01
        title: "MAME Merged/Split/Non-Merged Set-Verstaendnis"
        severity: warning
        status: "[x]"
        description: |
          RomVault zeigt separate Spalten fuer merged/non-merged/split MAME Sets.
          Romulus hat kein Konzept fuer ROM-Set-Typen. MAME ROMs in Split-Sets
          werden nicht korrekt gegen Parent/Clone-Beziehungen aufgeloest.
          
          ParentGameName im DatIndexEntry wird gespeichert, aber nirgends
          fuer Set-Typ-Erkennung genutzt.
        affected_files:
          - src/Romulus.Contracts/Models/DatIndex.cs
          - src/Romulus.Infrastructure/Dat/DatRepositoryAdapter.cs
          - src/Romulus.Core/Audit/DatAuditClassifier.cs
        test_requirement: |
          - Unit: Parent/Clone-Aufloesung fuer Split-Sets
          - Unit: Merged-Set-Erkennung (alle ROMs eines Parent+Clones in einem ZIP)
          - Edge: Clone ohne Parent im DAT

      - id: P4-S01
        title: "Headerless-Hash-Support erweitern"
        severity: suggestion
        status: "[x]"
        description: |
          Headerless-Hash-Unterstuetzung ist auf 4 Konsolen beschraenkt
          (NES, SNES, 7800, Lynx). No-Intro-DATs verwenden headerless Hashes
          fuer mehr Plattformen (z.B. N64, Mega Drive bei manchen Dumps).
        affected_files:
          - src/Romulus.Infrastructure/Hashing/HeaderRepairService.cs
        test_requirement: |
          - Unit: Headerless-Hash fuer erweiterte Plattformen
          - Regression: Bestehende NES/SNES/7800/Lynx-Hashes unveraendert

      - id: P4-S02
        title: "Per-Track SHA1 fuer Redump Multi-Track CDs"
        severity: suggestion
        status: "[x]"
        description: |
          Romulus extrahiert nur Raw-SHA1 aus CHD-Headers. Redump-DATs
          speichern haeufig per-Track-SHA1. Wenn die Raw-SHA1 nicht matcht,
          gibt es keinen Fallback auf Track-Level.
          
          Langfristig: chdman-Integration fuer Track-Level-SHA1-Extraktion.
          Kurzfristig: Name-Fallback mit strengem Matching verbessern.
        affected_files:
          - src/Romulus.Infrastructure/Hashing/FileHashService.cs
          - src/Romulus.Infrastructure/Tools/ (chdman-Integration)
        test_requirement: |
          - Unit: Per-Track-SHA1-Extraktion via chdman
          - Edge: Multi-Track-CDs mit abweichender Raw-SHA1 aber korrektem Track-Hash

# ═══════════════════════════════════════════════════════════════════
# ZUSAMMENFASSUNG
# ═══════════════════════════════════════════════════════════════════

summary:
  total_tasks: 14
  blocking: 5
  warning: 5
  suggestion: 4

  verification:
    targeted_tests: "97/97 gruen (DAT/Enrichment/Completeness relevante Testdateien)"
    solution_build: "Core/Infrastructure/CLI/API/WPF gruen; Romulus.Tests durch bestehenden, themenfremden Compile-Blocker in RetroAchievementsComplianceServiceTests rot"
  
  phase_order: |
    Phase 1 (DAT-Discovery) → Phase 2 (Multi-Hash) → Phase 3 (Reports) → Phase 4 (Advanced)
    
    Phase 1 ist Voraussetzung fuer alles — ohne korrekte DAT-Zuordnung
    sind Multi-Hash-Index und Reports wertlos.
    
    Phase 2 ist Voraussetzung fuer Phase 3 — Set-Completeness braucht
    Multi-Hash-Matching um aussagekraeftig zu sein.
    
    Phase 4 ist unabhaengig und kann parallel zu Phase 3 begonnen werden.

  romvault_parity_after: |
    Nach Phase 1+2: Romulus matcht alle 1.645 DATs mit Multi-Hash-Lookup.
    Nach Phase 3: Romulus zeigt Set-Completeness und Missing-ROMs wie RomVault.
    Nach Phase 4: Romulus versteht MAME-Set-Typen und erweiterte Hash-Formate.
